# MkDocs Material site for World of Shadows documentation.
# Source lives under docs/ (docs-as-code). This does not replace the GitHub repo view;
# it provides search, nav tabs, and Mermaid rendering for readers who prefer a static site.

site_name: World of Shadows Documentation
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Documentation index: INDEX.md
  - Start here:
      - Overview: start-here/README.md
      - What is World of Shadows: start-here/what-is-world-of-shadows.md
      - How the system works: start-here/how-world-of-shadows-works.md
      - System map: start-here/system-map-services-and-data-stores.md
      - God of Carnage as an experience: start-here/god-of-carnage-as-an-experience.md
      - How AI fits: start-here/how-ai-fits-the-platform.md
      - Glossary (short): start-here/glossary.md
  - User:
