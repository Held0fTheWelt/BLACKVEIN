{% extends "base.html" %}
{% block title %}Log in – World of Shadows{% endblock %}
{% block content %}
<div class="card card-center">
    <h1>Log in</h1>
    <form method="post" action="{{ url_for('web.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrap">
                <input type="password" name="password" id="password" required autocomplete="current-password">
                <button type="button" class="password-toggle" aria-label="Show password" title="Show password"><span class="password-toggle-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span></button>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Log in</button>
    </form>
    <p class="form-hint">
        No account yet? <a href="{{ url_for('web.register') }}">Create one</a>
    </p>
    <p class="form-hint">
        <a href="{{ url_for('web.forgot_password') }}">Forgot your password?</a>
    </p>
</div>
{% endblock %}
