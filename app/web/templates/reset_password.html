{% extends "base.html" %}
{% block title %}Set new password – World of Shadows{% endblock %}
{% block content %}
<div class="card card-center">
    <h1>Set new password</h1>
    <form method="post" action="{{ url_for('web.reset_password', token=token) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="password">New password</label>
            <div class="password-wrap">
                <input type="password" name="password" id="password" required autocomplete="new-password">
                <button type="button" class="password-toggle" aria-label="Show password" title="Show password"><span class="password-toggle-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span></button>
            </div>
            <p class="form-hint small">At least 8 characters · One uppercase letter · One lowercase letter · One digit</p>
        </div>
        <div class="form-group">
            <label for="password_confirm">Confirm password</label>
            <div class="password-wrap">
                <input type="password" name="password_confirm" id="password_confirm" required autocomplete="new-password">
                <button type="button" class="password-toggle" aria-label="Show password" title="Show password"><span class="password-toggle-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span></button>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Set new password</button>
    </form>
    <p class="form-hint">
        <a href="{{ url_for('web.login') }}">Back to login</a>
    </p>
</div>
{% endblock %}
