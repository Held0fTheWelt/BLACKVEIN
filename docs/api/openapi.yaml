  version: 1.0.0
  description: 'Machine-readable inventory of Flask `/api/v1` routes. Human-readable request/response examples: `docs/api/REFERENCE.md`.
    Tag taxonomy: `docs/api/openapi-taxonomy.md`.'
servers:
- url: /
  description: Same origin as backend (set base URL in your client).
tags:
- name: AIStackGovernance
  description: AI stack inspector, evidence, release readiness.
- name: Admin
  description: Admin logs, metrics, moderator assignments, exports/imports.
- name: Analytics
  description: Admin analytics aggregates and timelines.
- name: Areas
  description: Feature areas and navigational areas CRUD.
- name: Auth
  description: JWT issuance, registration, password flows.
- name: Forum
  description: Categories, threads, posts, moderation, search, tags, notifications.
- name: GameAdmin
  description: Published experiences governance and runtime admin views.
- name: GameBootstrap
  description: Characters, runs, tickets, save slots, templates, play-service bridge.
- name: Improvement
  description: Improvement experiments, recommendations, variants.
- name: MCP
  description: MCP operations UI support and operator telemetry ingest.
- name: Roles
  description: Role CRUD for authorized admin clients.
- name: SessionsBridge
  description: In-process session bridge for operators/tests; not authoritative live play.
- name: SiteContent
  description: News, wiki, site settings, slogans, languages.
- name: System
  description: Health, system diagnosis, internal probes.
- name: Users
  description: User profiles, preferences, bans, bookmarks.
- name: WorldEngineConsole
  description: 'Admin proxy to the play service: readiness, runs, story sessions, diagnostics.'
- name: WritersRoom
  description: Writers-room review workflow API.
