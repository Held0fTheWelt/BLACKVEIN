{% extends "manage/base.html" %}
{% block title %}{{ t.manage_login_title | default('Log in') }}{% endblock %}
{% block content %}
<div class="manage-login-wrap">
    <div class="manage-login-card card">
        <h1 class="manage-login-title">{{ t.manage_login_title | default('Log in') }}</h1>
        <p class="muted">Sign in with a staff or admin account.</p>
        <form id="manage-login-form" class="manage-login-form" novalidate>
            <div class="form-group">
                <label for="manage-login-username">{{ t.manage_username | default('Username') }}</label>
                <input type="text" id="manage-login-username" name="username" required autocomplete="username" class="form-input">
            </div>
            <div class="form-group">
                <label for="manage-login-password">{{ t.manage_password | default('Password') }}</label>
                <input type="password" id="manage-login-password" name="password" required autocomplete="current-password" class="form-input">
            </div>
            <div id="manage-login-error" class="form-error" role="alert" hidden></div>
            <button type="submit" class="btn btn-primary btn-lg" id="manage-login-submit">{{ t.manage_login_btn | default('Log in') }}</button>
        </form>
        <p class="manage-login-back">
            <a href="{{ url_for('index') }}">Back to public site</a>
        </p>
    </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script src="{{ url_for('static', filename='manage_login.js') }}"></script>
{% endblock %}
