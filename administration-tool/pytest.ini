[pytest]
testpaths = tests
python_files = test_*.py
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (external deps)
    security: Security validation
    contract: API contract tests
    browser: Browser integration tests
    slow: Slow running tests
    foundation_gate: MVP01/02 foundation gate tests
    mvp1: MVP01 experience identity tests
    mvp2: MVP02 runtime state and actor lanes tests
    mvp3: MVP03 live dramatic scene simulator tests
    mvp4: MVP04 observability diagnostics and narrative gov tests
addopts = --capture=sys -ra --strict-markers
