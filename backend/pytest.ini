[pytest]
pythonpath = . ..
testpaths = tests
python_files = test_*.py
python_functions = test_*
asyncio_mode = strict
addopts = --capture=sys -v --tb=short
filterwarnings =
    ignore::sqlalchemy.exc.LegacyAPIWarning
markers =
    unit: Unit tests (fast, isolated, no external dependencies)
    integration: Integration tests (external deps like DB, API, auth)
    security: Security validation tests (OWASP, authZ/authN, input validation)
    contract: API contract and interface stability tests
    e2e: End-to-end workflow tests
    persistence: Save/load and persistence tests
    slow: Slow running tests that should be skipped in fast mode
    foundation_gate: MVP01/02 foundation gate tests
    mvp1: MVP01 experience identity tests
    mvp2: MVP02 runtime state and actor lanes tests
    mvp3: MVP03 live dramatic scene simulator tests
    mvp4: MVP04 observability diagnostics and narrative gov tests
    langfuse_live: Strict Langfuse + HTTP stack gate (requires RUN_LANGFUSE_LIVE=1)
    auth: Auth/JWT/permissions/sessions tests (Stage 2 backend-test-suite-split)
    observability: Langfuse/tracing/metrics/diagnostics tests
    runtime: Story runtime / engine / AI-turn tests
    runtime_global: app.runtime root-level global module tests
    runtime_ai: app.runtime.ai package tests
    runtime_ai_turn: app.runtime.ai_turn package tests
    runtime_cache: app.runtime.cache package tests
    runtime_narrative: app.runtime.narrative package tests
    runtime_presentation: app.runtime.presentation package tests
    runtime_routing: app.runtime.routing package tests
    runtime_session: app.runtime.session package tests
    runtime_supervisor: app.runtime.supervisor package tests
    runtime_turn: app.runtime.turn package tests
    runtime_validation: app.runtime.validation package tests
    routes_core: HTTP route handler tests (Flask blueprints)
    content: Content module / GoC / WoS canon tests
    services: Service-layer tests
    writers_room: Writers Room tests (folder-implicit; explicit for cross-folder selection)
    improvement: Improvement service tests
    mvp_handoff: MVP handoff/contract tests
    serial: Tests that must run sequentially even with --parallel (DB upgrade, login race, rate limiting)
    timing_sensitive: Wall-clock API smoke tests; flaky on shared runners - not ADR-0041 / feature gates
