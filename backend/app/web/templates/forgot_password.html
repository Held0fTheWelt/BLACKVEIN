{% extends "base.html" %}
{% block title %}Forgot password – World of Shadows{% endblock %}
{% block content %}
<div class="card card-center">
    <h1>Forgot password</h1>
    <p class="form-hint">Enter the email address associated with your account.</p>
    <form method="post" action="{{ url_for('web.forgot_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary">Send reset link</button>
    </form>
    <p class="form-hint">
        <a href="{{ url_for('web.login') }}">Back to login</a>
    </p>
</div>
{% endblock %}
