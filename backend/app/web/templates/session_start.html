{% extends "base.html" %}
{% block title %}Start Session – World of Shadows{% endblock %}
{% block content %}
<main class="app-shell">

  <section class="panel">
    <h2>Start a New Session</h2>
    <form method="POST" action="/play/start">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="module_id">Select Module</label>
        <select id="module_id" name="module_id">
          {% for mod in available_modules %}
          <option value="{{ mod }}">{{ mod }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn-primary">Start Session</button>
    </form>
  </section>

  <section class="panel">
    <h2>Load Existing Session</h2>
    <p class="muted">Session loading is not yet available. This will be enabled in a future update.</p>
  </section>

</main>
{% endblock %}
