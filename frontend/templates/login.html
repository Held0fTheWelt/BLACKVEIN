{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Login</h1>
  <form method="post">
    <label>Username
      <input name="username" required>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button type="submit">Login</button>
  </form>
  <p><a href="{{ url_for('frontend.forgot_password') }}">Forgot password?</a></p>
</section>
{% endblock %}
