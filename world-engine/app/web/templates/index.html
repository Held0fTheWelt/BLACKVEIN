<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World of Shadows Play Service Prototype</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="panel launcher">
      <h1>World of Shadows Play Service Prototype</h1>
      <p class="subtitle">One runtime for solo stories, group stories, and a future open world.</p>

      <div class="grid two-col">
        <div>
          <label for="playerName">Player name</label>
          <input id="playerName" type="text" placeholder="Hollywood">
        </div>
        <div>
          <label for="preferredRole">Preferred role id (optional)</label>
          <input id="preferredRole" type="text" placeholder="mediator">
        </div>
      </div>

      <div class="grid two-col">
        <div>
          <label for="templateSelect">Create from template</label>
          <select id="templateSelect"></select>
          <button id="createRunButton">Create run</button>
        </div>
        <div>
          <label for="activeRunSelect">Join active run</label>
          <select id="activeRunSelect"></select>
          <button id="joinRunButton">Join run</button>
        </div>
      </div>

      <div class="status-bar">
        <span id="connectionStatus">Disconnected</span>
        <span id="currentRunLabel">No run joined</span>
      </div>
    </section>

    <section class="grid layout-main">
      <article class="panel room-panel">
        <div class="panel-header">
          <div>
            <h2 id="roomTitle">No room</h2>
            <p id="roomDescription">Create or join a run to start exploring the prototype.</p>
          </div>
          <div class="badge-stack">
            <span class="badge" id="beatBadge">Beat: -</span>
            <span class="badge" id="tensionBadge">Tension: 0</span>
          </div>
        </div>

        <div class="room-columns">
          <div>
            <h3>Exits</h3>
            <div id="exitList" class="token-list"></div>
            <h3>Scene actions</h3>
            <div id="actionList" class="token-list"></div>
          </div>
          <div>
            <h3>Props in room</h3>
            <div id="propList" class="token-list"></div>
            <h3>Occupants</h3>
            <div id="occupantList" class="token-list"></div>
          </div>
        </div>
      </article>

      <article class="panel transcript-panel">
        <h2>Transcript</h2>
        <div id="transcript" class="transcript"></div>
      </article>

      <article class="panel command-panel">
        <h2>Quick commands</h2>
        <div class="command-grid">
          <textarea id="sayText" placeholder="Type something to say..."></textarea>
          <button id="sayButton">Say</button>
          <textarea id="emoteText" placeholder="Describe an emote, e.g. folds your arms and leans back"></textarea>
          <button id="emoteButton">Emote</button>
          <input id="inspectTarget" type="text" placeholder="prop or room id, e.g. tulips">
          <button id="inspectButton">Inspect</button>
        </div>
      </article>
    </section>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
