[pytest]
minversion = 7.0
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts =
    -v
    --tb=short
    -p no:warnings
markers =
    database: Database schema and migration tests
    migrations: Alembic migration tests
    schema: Database schema tests
    upgrade: Database upgrade tests
