# Tests import ``app`` from ../backend (see tests/conftest.py). Coverage MUST target that
# same tree — mirrors tests/run_tests.py suite ``database`` (BACKEND_APP_ROOT, fail-under 80).
# See docs/testing/COVERAGE_SEMANTICS.md
[pytest]
minversion = 7.0
pythonpath = ../backend ..
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts =
    --capture=sys
    -v
    --tb=short
    -p no:warnings
    --cov=app
    --cov-report=term-missing
markers =
    database: Database schema and migration tests
    migrations: Alembic migration tests
    schema: Database schema tests
    upgrade: Database upgrade tests
    foundation_gate: MVP01/02 foundation gate tests
    mvp1: MVP01 experience identity tests
    mvp2: MVP02 runtime state and actor lanes tests
    mvp3: MVP03 live dramatic scene simulator tests
    mvp4: MVP04 observability diagnostics and narrative gov tests
