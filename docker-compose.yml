# World of Shadows - local stack (docker compose up)
#
# Platform secrets (.env): use ``python docker-up.py init-env`` or any of ``python docker-up.py`` / ``up`` / ``build`` / ``restart``.
# docker-up.py materializes missing or placeholder secrets on the host **before** Compose runs (including image build); they are not baked into Dockerfiles.
# Then set OPENAI_API_KEY in .env if you plan to use AI features.
#
# Services: backend (API), frontend (player UI), administration-tool, play-service (world-engine), redis (runtime governance storage).
#
# Startup order (important): backend must be up before play-service can fetch governed runtime config.
# Do NOT make backend depend on play-service healthy — that deadlocks the stack. play-service, frontend,
# and administration-tool wait for backend healthcheck (GET /api/v1/health).
# Backend ships content/modules in the image; WOS_CONTENT_MODULES_ROOT points at that path.
#
# Secrets: Platform stable secrets (SECRET_KEY, JWT_SECRET_KEY, PLAY_SERVICE_SHARED_SECRET, etc.)
# are stored in .env (repo root) and injected by docker-compose.yml.
# The .env file is not committed; local secrets survive docker reset.
#
# Database: the backend image entrypoint runs `flask db upgrade` once before Gunicorn. The bind mount
# ./backend/instance:/app/instance persists SQLite (default wos.db); after pulling new migrations,
# rebuild/restart the backend container so the schema upgrades on startup.

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend/instance:/app/instance
    environment:
      - FLASK_APP=run:app
      - CORS_ORIGINS=http://localhost:5001,http://127.0.0.1:5001,http://localhost:5002,http://127.0.0.1:5002
      - FRONTEND_URL=http://localhost:5002
      - REDIS_URL=redis://redis:6379/0
      # RAG / AI Engineer Suite: repo root inside the image (slim layout: /app/app/..., see backend/Dockerfile).
      - WOS_REPO_ROOT=/app
      - WOS_CONTENT_MODULES_ROOT=/app/content/modules
      # Embedding governance (see docs/rag_in_world_of_shadows.md):
      # Uncomment WOS_RAG_DISABLE_EMBEDDINGS to force sparse-only fallback (e.g. CI without model cache).
      # - WOS_RAG_DISABLE_EMBEDDINGS=1
      # Uncomment WOS_RAG_EMBEDDING_CACHE_DIR to pin the fastembed ONNX model download location.
      # - WOS_RAG_EMBEDDING_CACHE_DIR=/app/.wos/embedding_cache
      # Backend → world-engine (Docker DNS). Browser-facing URLs use PUBLIC (host port).
      - PLAY_SERVICE_INTERNAL_URL=http://play-service:8000
      - PLAY_SERVICE_PUBLIC_URL=http://localhost:8001
      # Stable secrets from .env (do not edit these hardcoded values; manage in .env instead)
      - PLAY_SERVICE_SHARED_SECRET=${PLAY_SERVICE_SHARED_SECRET}
      - PLAY_SERVICE_INTERNAL_API_KEY=${PLAY_SERVICE_INTERNAL_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_VERSION=${ANTHROPIC_VERSION}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # INTERNAL_RUNTIME_CONFIG_TOKEN: pass through repo-root .env via env_file (no ${...} interpolation — avoids compose warnings when the key is missing before first init-env).
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Server-side requests from the container must use the compose service name, not localhost.
      - BACKEND_API_URL=http://backend:8000
      - FRONTEND_PORT=5002
      # Stable secret from .env (do not edit hardcoded value; manage in .env instead)
      - FRONTEND_SECRET_KEY=${FRONTEND_SECRET_KEY}
      # Browser WebSocket / public play URL (host port maps play-service 8000 → 8001)
      - PLAY_SERVICE_PUBLIC_URL=http://localhost:8001

  administration-tool:
    build:
      context: ./administration-tool
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_API_URL=http://backend:8000
      - PORT=5001

  play-service:
    build:
      context: .
      dockerfile: world-engine/Dockerfile
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - APP_TITLE=World of Shadows Play Service
      # Slim image layout: /app/app/... — same as backend WOS_REPO_ROOT for RAG / .wos paths.
      - WOS_REPO_ROOT=/app
      # Content modules (god_of_carnage, etc.) path - required for Scene Director and canonical rules
      - WOS_CONTENT_MODULES_ROOT=/app/content/modules
      # Embedding governance (see docs/rag_in_world_of_shadows.md):
      # Uncomment WOS_RAG_DISABLE_EMBEDDINGS to force sparse-only fallback (e.g. CI without model cache).
      # - WOS_RAG_DISABLE_EMBEDDINGS=1
      # Uncomment WOS_RAG_EMBEDDING_CACHE_DIR to pin the fastembed ONNX model download location.
      # - WOS_RAG_EMBEDDING_CACHE_DIR=/app/.wos/embedding_cache
      # Stable secrets from .env (do not edit hardcoded values; manage in .env instead)
      - PLAY_SERVICE_SECRET=${PLAY_SERVICE_SHARED_SECRET}
      - PLAY_SERVICE_INTERNAL_API_KEY=${PLAY_SERVICE_INTERNAL_API_KEY}
      # Provider API keys (must match backend configuration for model adapters)
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_VERSION=${ANTHROPIC_VERSION}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Governed runtime: play-service must fetch the same resolved config the Administration Center publishes.
      - BACKEND_RUNTIME_CONFIG_URL=http://backend:8000
      # INTERNAL_RUNTIME_CONFIG_TOKEN: from env_file .env (generated by python docker-up.py init-env).
      - RUN_STORE_BACKEND=json
    ports:
      - "8001:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

volumes:
  redis-data:
