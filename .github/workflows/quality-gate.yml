name: Quality Gate (Combined)

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  requirements-hygiene:
    name: Requirements hygiene (hub pyproject vs backend pins)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install pytest only
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pytest>=7,<9"
      - name: Static requirements chain (repo root)
        run: python -m pytest tests/requirements_hygiene/ -q

  security-tests:
    name: Security-Only Tests
    runs-on: ubuntu-latest
    needs: [ requirements-hygiene ]

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run security tests
        working-directory: ./backend
        run: |
          set +e
          python -m pytest tests/ -m security -v --tb=short --no-cov
          ec=$?
          set -e
          if [ "$ec" -eq 0 ]; then exit 0; fi
          if [ "$ec" -eq 5 ]; then echo "::notice::No tests matched -m security (pytest exit 5)."; exit 0; fi
          exit "$ec"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: test_reports/
          retention-days: 30

  contract-tests:
    name: Contract Tests (API Contracts)
    runs-on: ubuntu-latest
    needs: [ requirements-hygiene ]

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run contract tests
        working-directory: ./backend
        run: |
          python -m pytest tests/ -m contract -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-results
          path: test_reports/
          retention-days: 30

  bridge-contract-tests:
    name: Bridge Contract Tests (Backend-Engine)
    runs-on: ubuntu-latest
    needs: [ requirements-hygiene ]

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            backend/requirements.txt
            backend/requirements-dev.txt
            world-engine/requirements.txt
            world-engine/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
          pip install -r world-engine/requirements-dev.txt

      - name: Run bridge contract tests
        working-directory: ./world-engine
        run: |
          python -m pytest tests/test_backend_bridge_contract.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-test-results
          path: test_reports/
          retention-days: 30

  quality-gate-report:
    name: Quality Gate Report
    runs-on: ubuntu-latest
    needs:
      - requirements-hygiene
      - security-tests
      - contract-tests
      - bridge-contract-tests
    if: always()

    steps:
      - name: Enforce upstream job success
        run: |
          set -e
          test "${{ needs.requirements-hygiene.result }}" = "success" || { echo "::error::requirements-hygiene: ${{ needs.requirements-hygiene.result }}"; exit 1; }
          test "${{ needs.security-tests.result }}" = "success" || { echo "::error::security-tests: ${{ needs.security-tests.result }}"; exit 1; }
          test "${{ needs.contract-tests.result }}" = "success" || { echo "::error::contract-tests: ${{ needs.contract-tests.result }}"; exit 1; }
          test "${{ needs.bridge-contract-tests.result }}" = "success" || { echo "::error::bridge-contract-tests: ${{ needs.bridge-contract-tests.result }}"; exit 1; }

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-test-results

      - name: Generate summary
        run: |
          echo "# Quality Gate Status Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Requirements hygiene: ${{ needs.requirements-hygiene.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security tests: ${{ needs.security-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Contract tests: ${{ needs.contract-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Bridge contract tests: ${{ needs.bridge-contract-tests.result }}" >> $GITHUB_STEP_SUMMARY
