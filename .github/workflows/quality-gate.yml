name: Quality Gate (Combined)

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  security-tests:
    name: Security-Only Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run security tests
        working-directory: ./backend
        run: |
          python -m pytest tests/ -m security -v --tb=short || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: test_reports/
          retention-days: 30

  contract-tests:
    name: Contract Tests (API Contracts)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run contract tests
        working-directory: ./backend
        run: |
          python -m pytest tests/ -m contract -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-results
          path: test_reports/
          retention-days: 30

  bridge-contract-tests:
    name: Bridge Contract Tests (Backend-Engine)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            world-engine/requirements.txt
            world-engine/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
          pip install -r world-engine/requirements-dev.txt

      - name: Run bridge contract tests
        working-directory: ./world-engine
        run: |
          python -m pytest tests/test_backend_bridge_contract.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-test-results
          path: test_reports/
          retention-days: 30

  quality-gate-report:
    name: Quality Gate Report
    runs-on: ubuntu-latest
    needs: [ security-tests, contract-tests, bridge-contract-tests ]
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-test-results

      - name: Generate summary
        run: |
          echo "# Quality Gate Status Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Security Tests: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Contract Tests: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Bridge Contract Tests: Completed" >> $GITHUB_STEP_SUMMARY
