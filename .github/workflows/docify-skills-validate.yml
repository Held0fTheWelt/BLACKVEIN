# Validates markdown links under 'fy'-suites/docify/superpowers/ and Cursor skill copies vs hub.
name: Docify skill paths

on:
  pull_request:
    paths:
      - "'fy'-suites/docify/**"
      - "pyproject.toml"
      - ".github/workflows/docify-skills-validate.yml"
  push:
    branches: [main, master]
    paths:
      - "'fy'-suites/docify/**"
      - "pyproject.toml"
      - ".github/workflows/docify-skills-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
      - name: Install editable hub package (Docify imports)
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Validate Docify skill markdown paths
        run: python "./'fy'-suites/docify/tools/validate_docify_skill_paths.py"
      - name: Check Cursor Docify skill copies match hub
        run: python "./'fy'-suites/docify/tools/sync_docify_skills.py" --check
      - name: Docify unit tests
        run: python -m pytest "'fy'-suites/docify/tools/tests" -q
