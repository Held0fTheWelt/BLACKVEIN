name: Pre-Deployment Full Test Suite

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  full-suite:
    name: Full Test Suite (All Suites)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            backend/requirements.txt
            backend/requirements-dev.txt
            frontend/requirements.txt
            frontend/requirements-dev.txt
            administration-tool/requirements.txt
            administration-tool/requirements-dev.txt
            world-engine/requirements.txt
            world-engine/requirements-dev.txt
            ai_stack/pyproject.toml
            story_runtime_core/pyproject.toml
            tools/mcp_server/pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
          pip install -r frontend/requirements-dev.txt
          pip install -r administration-tool/requirements-dev.txt
          pip install -r world-engine/requirements-dev.txt
          python -m pip install -e "./story_runtime_core"
          python -m pip install -e "./ai_stack[test]"
          python -m pip install -e "./tools/mcp_server[test]"

      - name: Install frontend Node dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run full backend test suite with coverage
        working-directory: ./backend
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=85

      - name: Run full admin test suite
        working-directory: ./administration-tool
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run full engine test suite
        working-directory: ./world-engine
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run full frontend Python test suite
        working-directory: ./frontend
        run: |
          python -m pytest tests/ -v --tb=short --no-cov

      - name: Run frontend Jest suite
        working-directory: ./frontend
        run: |
          npm test -- --ci

      - name: Run database test suite
        working-directory: ./database
        run: |
          python -m pytest tests/ -v --tb=short --no-cov

      - name: Run ai_stack tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest ai_stack/tests -v --tb=short

      - name: Run story_runtime_core tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest story_runtime_core/tests/ -v --tb=short --no-cov --capture=no

      - name: Run architecture enforcement gates
        env:
          PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}:${{ github.workspace }}/world-engine
        run: |
          python -m pytest tests/gates/ -v --tb=short --no-cov
        # Gates enforce visitor absence, GoC content/profile separation. No continue-on-error.

      - name: Run root repository Python suites
        env:
          PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}:${{ github.workspace }}/world-engine
        run: |
          python -m pytest \
            tests/test_agency_capability_matrix_truth.py \
            tests/integration \
            tests/branching \
            tests/smoke \
            tests/tools \
            tools/mcp_server/tests \
            tests/requirements_hygiene \
            tests/e2e \
            tests/experience_scoring_cli \
            -v --tb=short --no-cov

      - name: Upload backend coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage-full

      - name: Upload all test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-suite-test-results
          path: test_reports/
          retention-days: 60

  pre-deployment-report:
    name: Pre-Deployment Report
    runs-on: ubuntu-latest
    needs: [ full-suite ]
    if: always()

    steps:
      - name: Generate deployment status
        env:
          FULL_SUITE_STATUS: ${{ needs.full-suite.result }}
        run: |
          if [ "$FULL_SUITE_STATUS" == "success" ]; then
            echo "Full test suite PASSED. Deployment approved." >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "Full test suite FAILED. Deployment blocked." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
