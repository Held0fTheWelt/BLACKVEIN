name: Pre-Deployment Full Test Suite

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  full-suite:
    name: Full Test Suite (All Suites)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            administration-tool/requirements.txt
            administration-tool/requirements-dev.txt
            world-engine/requirements.txt
            world-engine/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
          pip install -r administration-tool/requirements-dev.txt
          pip install -r world-engine/requirements-dev.txt

      - name: Run full backend test suite with coverage
        working-directory: ./backend
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=85

      - name: Run full admin test suite
        working-directory: ./administration-tool
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run full engine test suite
        working-directory: ./world-engine
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Upload backend coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage-full

      - name: Upload all test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-suite-test-results
          path: test_reports/
          retention-days: 60

  pre-deployment-report:
    name: Pre-Deployment Report
    runs-on: ubuntu-latest
    needs: [ full-suite ]
    if: always()

    steps:
      - name: Generate deployment status
        env:
          FULL_SUITE_STATUS: ${{ needs.full-suite.result }}
        run: |
          if [ "$FULL_SUITE_STATUS" == "success" ]; then
            echo "Full test suite PASSED. Deployment approved." >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "Full test suite FAILED. Deployment blocked." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
