name: Backend Tests

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
      - 'run_tests.py'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
      - 'run_tests.py'

jobs:
  backend-fast-tests:
    name: Backend Fast Tests (Unit Tests)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run backend fast tests
        working-directory: ./backend
        run: |
          python -m pytest tests/ -m "not slow" -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-fast-test-results
          path: test_reports/
          retention-days: 30

  backend-coverage-tests:
    name: Backend Coverage Tests (85% Gate)
    runs-on: ubuntu-latest
    needs: [ backend-fast-tests ]

    strategy:
      matrix:
        python-version: [ '3.10' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run backend full tests with coverage
        working-directory: ./backend
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=85

      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-test-results
          path: test_reports/
          retention-days: 30
