name: Backend Tests

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'backend/**'
      # Drift guard: builtins/models SSOT vs world-engine (story_runtime_core).
      - 'world-engine/app/content/builtins.py'
      - 'world-engine/app/content/models.py'
      # Backend tests under tests/ import ai_stack (e.g. test_goc_evidence_retrieval_governance, test_goc_semantic_parity).
      - 'ai_stack/**'
      - 'story_runtime_core/**'
      - 'tests/requirements_hygiene/**'
      - 'tests/experience_scoring_cli/**'
      - 'tests/tools/**'
      - 'scripts/g9_threshold_validator.py'
      - "'fy'-suites/docify/**"
      - 'docs/goc_evidence_templates/**'
      - '.github/workflows/backend-tests.yml'
      - 'tests/run_tests.py'
      - 'setup-test-environment.sh'
      - 'setup-test-environment.bat'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'backend/**'
      - 'world-engine/app/content/builtins.py'
      - 'world-engine/app/content/models.py'
      - 'ai_stack/**'
      - 'story_runtime_core/**'
      - 'tests/requirements_hygiene/**'
      - 'tests/experience_scoring_cli/**'
      - 'tests/tools/**'
      - 'scripts/g9_threshold_validator.py'
      - "'fy'-suites/docify/**"
      - 'docs/goc_evidence_templates/**'
      - '.github/workflows/backend-tests.yml'
      - 'tests/run_tests.py'
      - 'setup-test-environment.sh'
      - 'setup-test-environment.bat'

jobs:
  requirements-test-hygiene:
    name: Requirements-test file graph (no full install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pytest only
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'pytest>=7,<9'
      - name: Static requirements chain (repo root)
        run: python -m pytest tests/requirements_hygiene/ -q
      - name: G9 threshold validator CLI tests (repo root, no backend install)
        run: python -m pytest tests/experience_scoring_cli/ -q --tb=short

  backend-fast-tests:
    name: Backend Fast Tests (Unit Tests)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      # Collects all of backend/tests (pytest.ini testpaths); no per-file allowlist — new modules are always included.
      - name: Run backend fast tests
        working-directory: ./backend
        run: |
          python -m pytest tests/ -m "not slow" -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-fast-test-results
          path: test_reports/
          retention-days: 30

  # Explicit path proves Gate G7 Writers' Room tests execute in CI (not only via broad `pytest tests/`).
  writers-room-g7-contract-tests:
    name: Writers' Room G7 contract tests (explicit pytest path)
    runs-on: ubuntu-latest
    needs: [ requirements-test-hygiene ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
      - name: Run tests/writers_room (G7 operating contract)
        working-directory: ./backend
        run: |
          python -m pytest tests/writers_room/ -q --tb=short --no-cov

  # Explicit path proves Gate G8 Improvement tests execute in CI (not only via broad `pytest tests/`).
  improvement-g8-contract-tests:
    name: Improvement G8 contract tests (explicit pytest path)
    runs-on: ubuntu-latest
    needs: [ requirements-test-hygiene ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
      - name: Run tests/improvement (G8 operating contract)
        working-directory: ./backend
        run: |
          python -m pytest tests/improvement/ -q --tb=short --no-cov

  # Explicit pytest path for audit plan G10 §F backend trio. Green here = the integrated backend pytest surface runs in CI;
  # roadmap §6.11 step 11 still requires the authoritative G9/G9B repo bundle (e.g. g9_level_a_fullsix_20260410), not this job alone.
  g10-backend-e2e-evidence-path:
    name: Gate G10 evidence path (backend E2E trio, explicit pytest)
    runs-on: ubuntu-latest
    needs: [ requirements-test-hygiene ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
      - name: Run G10 audit trio (full lifecycle, bootstrap, area2 closure gates)
        working-directory: ./backend
        run: |
          python -m pytest tests/test_e2e_god_of_carnage_full_lifecycle.py tests/test_bootstrap_staged_runtime_integration.py tests/runtime/test_runtime_validation_commands_orchestration.py -q --tb=short --no-cov

  backend-coverage-tests:
    name: Backend Coverage Tests (85% Gate)
    runs-on: ubuntu-latest
    needs:
      [
        backend-fast-tests,
        writers-room-g7-contract-tests,
        improvement-g8-contract-tests,
        g10-backend-e2e-evidence-path,
      ]

    strategy:
      matrix:
        python-version: [ '3.10' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run backend full tests with coverage
        working-directory: ./backend
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=85

      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-test-results
          path: test_reports/
          retention-days: 30
