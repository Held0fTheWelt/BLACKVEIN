name: AI Stack Tests

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'ai_stack/**'
      - 'story_runtime_core/**'
      - '.github/workflows/ai-stack-tests.yml'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'ai_stack/**'
      - 'story_runtime_core/**'
      - '.github/workflows/ai-stack-tests.yml'

jobs:
  ai-stack-pytest:
    name: pytest ai_stack/tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            ai_stack/pyproject.toml
            ai_stack/requirements-test.txt

      - name: Install editable packages and test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./story_runtime_core"
          python -m pip install -e "./ai_stack[test]"

      - name: Run ai_stack test suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest ai_stack/tests -q --tb=short
