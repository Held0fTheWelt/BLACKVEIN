name: AI Stack Tests

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'ai_stack/**'
      - 'story_runtime_core/**'
      - 'tools/verify_goc_scene_identity_single_source.py'
      - '.github/workflows/ai-stack-tests.yml'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'ai_stack/**'
      - 'story_runtime_core/**'
      - 'tools/verify_goc_scene_identity_single_source.py'
      - '.github/workflows/ai-stack-tests.yml'

jobs:
  ai-stack-pytest:
    name: pytest ai_stack/tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            ai_stack/pyproject.toml
            ai_stack/requirements-test.txt

      # Merge bar for "ai_stack/tests green": keep in sync with scripts/install-ai-stack-test-env.* and README § Testing.
      - name: Install editable packages and test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./story_runtime_core"
          python -m pip install -e "./ai_stack[test]"

      # Packaging order guard: ai_stack must import after story_runtime_core (same as local dev / Docker).
      - name: Verify import order (story_runtime_core → ai_stack)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -c "import story_runtime_core; import ai_stack; print('ok', ai_stack.__name__)"

      # Fail CI if LangGraph runtime is missing — graph-heavy tests use importorskip locally;
      # this lane must not silently skip the whole graph surface.
      - name: Verify LangGraph runtime import (graph lane prerequisite)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -c "import ai_stack.langgraph_runtime as lg; print('langgraph_runtime', lg.__file__)"

      - name: Verify sole GoC scene→guidance mapping (ADR-0003)
        run: python tools/verify_goc_scene_identity_single_source.py

      # Full tree under ai_stack/tests (not a file allowlist); new test modules are always collected.
      - name: Run ai_stack test suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest ai_stack/tests -q --tb=short
