name: Frontend Tests (MVP5)

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'frontend/**'
      - 'frontend/tests/**'
      - '.github/workflows/frontend-tests.yml'
      - 'tests/run_tests.py'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'frontend/**'
      - 'frontend/tests/**'
      - '.github/workflows/frontend-tests.yml'
      - 'tests/run_tests.py'

jobs:
  frontend-mvp5-tests:
    name: Frontend MVP5 Tests (Block Renderer, Typewriter, Orchestration)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: frontend/requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r frontend/requirements-dev.txt

      - name: Install Node test dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend Python tests
        working-directory: ./frontend
        run: python -m pytest tests -v --tb=short --no-cov

      - name: Run frontend Jest tests
        working-directory: ./frontend
        run: npm test -- --ci

      - name: Run frontend suite with test runner
        run: |
          python tests/run_tests.py --mvp5 --verbose

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports-${{ matrix.python-version }}
          path: tests/reports/
          retention-days: 30
