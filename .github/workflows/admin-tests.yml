name: Administration Tool Tests

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'administration-tool/**'
      - '.github/workflows/admin-tests.yml'
      - 'tests/run_tests.py'
      - 'setup-test-environment.sh'
      - 'setup-test-environment.bat'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'administration-tool/**'
      - '.github/workflows/admin-tests.yml'
      - 'tests/run_tests.py'
      - 'setup-test-environment.sh'
      - 'setup-test-environment.bat'

jobs:
  admin-fast-tests:
    name: Admin Fast Tests (Unit Tests)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r administration-tool/requirements-dev.txt

      - name: Run admin fast tests
        working-directory: ./administration-tool
        run: |
          python -m pytest tests/ -m "not slow" -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-fast-test-results
          path: test_reports/
          retention-days: 30

  admin-full-tests:
    name: Admin Full Tests
    runs-on: ubuntu-latest
    needs: [ admin-fast-tests ]

    strategy:
      matrix:
        python-version: [ '3.10' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r administration-tool/requirements-dev.txt

      - name: Run admin full tests
        working-directory: ./administration-tool
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-full-test-results
          path: test_reports/
          retention-days: 30
