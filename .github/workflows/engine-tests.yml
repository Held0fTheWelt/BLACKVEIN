name: World Engine Tests

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'world-engine/**'
      - '.github/workflows/engine-tests.yml'
      - '.devcontainer/**'
      - 'run_tests.py'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'world-engine/**'
      - '.github/workflows/engine-tests.yml'
      - '.devcontainer/**'
      - 'run_tests.py'

jobs:
  engine-fast-tests:
    name: Engine Fast Tests (No Slow/WebSocket)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            world-engine/requirements.txt
            world-engine/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r world-engine/requirements-dev.txt

      - name: Run engine fast tests
        working-directory: ./world-engine
        run: |
          python -m pytest tests/ -m "not slow and not websocket" -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-fast-test-results
          path: test_reports/
          retention-days: 30

  engine-full-tests:
    name: Engine Full Tests (All Tests)
    runs-on: ubuntu-latest
    needs: [ engine-fast-tests ]

    strategy:
      matrix:
        python-version: [ '3.10' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            world-engine/requirements.txt
            world-engine/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r world-engine/requirements-dev.txt

      - name: Run engine full tests
        working-directory: ./world-engine
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-full-test-results
          path: test_reports/
          retention-days: 30
