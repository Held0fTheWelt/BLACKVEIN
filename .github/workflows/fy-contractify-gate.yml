name: FY-Contractify Enforcement Gate

on:
  pull_request:
    branches:
      - master
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  contractify-gate:
    runs-on: ubuntu-latest
    name: Contractify Drift Detection

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run contractify audit on PR branch
        id: contractify-audit
        run: |
          python -m contractify.tools audit --json --out "'fy'-suites/contractify/reports/pr_contract_audit.json" || true
          echo "audit_complete=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Compare against baseline
        id: baseline-compare
        run: python .github/scripts/contractify-gate-check.py
        continue-on-error: true

      - name: Load gate result
        id: load-result
        run: |
          python3 << 'PYEOF'
          import json
          with open("contractify_gate_result.json") as f:
              result = json.load(f)
          with open("$GITHUB_OUTPUT", "a") as f:
              f.write(f"gate_passed={'true' if result['passed'] else 'false'}\n")
          PYEOF

      - name: Comment PR on failure
        if: steps.load-result.outputs.gate_passed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('contractify_gate_result.json', 'utf8'));
            const failureList = result.failures.map(f => '- ' + f).join('\n');
            const comment = '## ❌ Contractify Enforcement Gate: FAILED\n\nYour PR introduces contract drift that must be resolved before merge.\n\n**Failures:**\n' + failureList + '\n\n**Summary:**\n- Contracts found: ' + result.summary.contracts_found + '\n- Conflicts: ' + result.summary.conflicts + '\n- Unresolved conflicts: ' + result.summary.unresolved_conflicts + '\n\nSee `\'fy\'-suites/fy_governance_enforcement.yaml` for enforcement policy.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Comment PR on success
        if: steps.load-result.outputs.gate_passed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = '## ✅ Contractify Enforcement Gate: PASSED\n\nNo contract drift detected.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Set gate status
        if: steps.load-result.outputs.gate_passed == 'false'
        run: exit 1
