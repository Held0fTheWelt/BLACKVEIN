[pytest]
testpaths = tests
python_files = test_*.py
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (external deps)
    security: Security validation
    contract: API contract tests
    config: Configuration and startup tests
    browser: Browser integration tests
    websocket: WebSocket tests
    persistence: Save/load and persistence tests
    slow: Slow running tests
    asyncio: Async tests
asyncio_mode = strict
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning:httpx.*
    ignore::UserWarning:app.config
    ignore:PLAY_SERVICE_SECRET not configured.*:UserWarning
