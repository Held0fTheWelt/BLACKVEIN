services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: world_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - world_engine_pg_data:/var/lib/postgresql/data

  play-service:
    build:
      context: ..
      dockerfile: world-engine/Dockerfile
    environment:
      APP_TITLE: World of Shadows Play Service Prototype
      PLAY_SERVICE_SECRET: local-dev-secret
      RUN_STORE_BACKEND: sqlalchemy
      RUN_STORE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/world_engine
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  world_engine_pg_data:
