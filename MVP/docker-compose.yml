# World of Shadows - Three-service local stack
# - backend: API/business/auth service
# - frontend: player/public web frontend
# - administration-tool: separate admin/management frontend
# - play-service: authoritative runtime service (world-engine)

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend/instance:/app/instance
    environment:
      - FLASK_APP=run:app
      - CORS_ORIGINS=http://localhost:5001,http://127.0.0.1:5001,http://localhost:5002,http://127.0.0.1:5002
      - FRONTEND_URL=http://localhost:5002
      - PLAY_SERVICE_INTERNAL_URL=http://play-service:8000
      - PLAY_SERVICE_PUBLIC_URL=http://play-service:8000
      - PLAY_SERVICE_SHARED_SECRET=local-dev-shared-secret
      - PLAY_SERVICE_INTERNAL_API_KEY=local-dev-internal-key
      - JWT_SECRET_KEY=local-dev-jwt-secret-32-bytes-minimum-value
    depends_on:
      - play-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    environment:
      # Server-side requests from the container must use the compose service name, not localhost.
      - BACKEND_API_URL=http://backend:8000
      - FRONTEND_PORT=5002
      - FRONTEND_SECRET_KEY=local-dev-frontend-secret
      - PLAY_SERVICE_PUBLIC_URL=http://localhost:8001

  administration-tool:
    build:
      context: ./administration-tool
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - BACKEND_API_URL=http://backend:8000
      - PORT=5001

  play-service:
    build:
      context: .
      dockerfile: world-engine/Dockerfile
    environment:
      - APP_TITLE=World of Shadows Play Service
      - PLAY_SERVICE_SECRET=local-dev-shared-secret
      - PLAY_SERVICE_INTERNAL_API_KEY=local-dev-internal-key
      - RUN_STORE_BACKEND=json
    ports:
      - "8001:8000"
