# Per-Scene Guidance for God of Carnage
# Constraints and context for each phase

phase_1_polite_opening:
  title: "Polite Opening"
  duration: "2-3 turns estimated"

  narrative_context: |
    Dinner party is underway. The two couples are eating; conversation is light and careful.
    The incident (child conflict at school) is being introduced for the first time.
    Everyone is aware something serious happened, but civility masks discomfort.

  ai_guidance:
    - "Keep tone social and performative; characters are *trying* to be civilized"
    - "The incident should be mentioned obliquely at first (e.g., 'You heard about the children?')"
    - "Introduce Véronique's moral defensiveness early; Michel's conflict avoidance"
    - "Show Annette's intellectual curiosity + slight provocation; Alain's mediation attempts"
    - "Use dinner/wine as natural pauses; avoid long speeches"

  trigger_watch:
    - "No triggers should fire in phase_1; watch for signs that civility is fraying"
    - "Listen for first real disagreement on facts or responsibility"

  constraint_enforcement:
    civility_required: true
    max_emotional_state: 60
    no_personal_attacks: true
    enforcement_note: "Any dialogue that violates these must be blocked; character stops themselves"

  exit_signal: "First substantive disagreement emerges; someone states a position that contradicts another's"

---

phase_2_moral_negotiation:
  title: "Moral Negotiation"
  duration: "3-4 turns estimated"

  narrative_context: |
    The incident is now openly discussed. Disagreement centers on parental responsibility:
    Whose child was at fault? Who should have intervened? What does proper parenting demand?
    Véronique defends her son and moral principles. Annette questions those principles.
    Michel wants to move past it. Alain tries to find common ground.

  ai_guidance:
    - "Introduce idealism vs. cynicism explicitly (Véronique vs. Annette)"
    - "Michel starts to feel pressure; hints of spousal alignment fracture"
    - "Positions harden; humor becomes sarcastic or edged"
    - "Disagreement is *about something real* (parental responsibility, child wellbeing, justice)"
    - "No personal attacks yet; debate is still possible"

  trigger_watch:
    - "contradiction: Listen for logical inconsistencies in Véronique's or Michel's defense"
    - "exposure: If anyone's parenting judgment is questioned, mark exposure trigger"
    - "Phase_2_to_phase_3: Spousal misalignment should start to crack"

  constraint_enforcement:
    civility_required: true
    max_escalation_level: 30
    enforcement_notes:
      - "Civility is still in effect but visibly straining"
      - "Escalation must not exceed 30; if it does, move toward phase_3"

  exit_signal: "Axis_1 (spousal alignment) begins to shift; one spouse challenges the other"

---

phase_3_faction_shifts:
  title: "Faction Shifts"
  duration: "2-3 turns estimated"

  narrative_context: |
    The critical moment: alliances shift. Maybe Michel sides with the guests against his wife's position.
    Or Annette suddenly aligns with Véronique against a hypocrisy she spotted.
    Votes are no longer "couple vs. couple"; they're scrambled.
    Voices are rising. Civility is brittle but still technically in place.

  ai_guidance:
    - "Engineer a *genuine* moment where someone changes position or allies change"
    - "The shift must feel motivated, not arbitrary (e.g., Michel capitulates to preserve peace)"
    - "Show the *impact* of the shift on the spouse left behind (shock, betrayal, anger)"
    - "Escalate emotion but keep it debate-like; personal attacks not yet overt"
    - "Use the power shift to destabilize Véronique's authority (host)"

  trigger_watch:
    - "contradiction, exposure, relativization: All three are now active"
    - "Watch for relativization in particular (Annette attacking moral universalism)"
    - "Phase_3_to_phase_4: Emotional control visibly weakening"

  constraint_enforcement:
    civility_required: true
    max_escalation_level: 50
    enforcement_notes:
      - "Civility is still enforced but very fragile"
      - "Voices rising, interruptions increasing"
      - "If emotional_state or escalation exceed bounds, move immediately to phase_4"

  exit_signal: "At least one character's emotional control visibly weakens; voices audibly rise"

---

phase_4_emotional_derailment:
  title: "Emotional Derailment"
  duration: "2-3 turns estimated"

  narrative_context: |
    Control is lost. Civility is explicitly abandoned by at least one character.
    Personal insults, tears, raised voices. Abstract disagreement becomes a weapon.
    Characters are no longer debating; they are attacking.
    Apology becomes possible but unlikely; breakdown becomes visible.

  ai_guidance:
    - "Characters speak without filter; honesty becomes cruelty"
    - "Introduce tears, voice breaking, contempt"
    - "Logical debate ends; emotional expression dominates"
    - "Show each character's breaking point in their own way"
    - "Alain may attempt de-escalation (futilely); Michel may capitulate or withdraw"
    - "Véronique becomes increasingly isolated and defensive"
    - "Annette intensifies attack; fully engaged intellectually and emotionally"

  trigger_watch:
    - "apology_or_non_apology, cynicism, flight_into_sideplots, all others: All active"
    - "Watch for moments where repair becomes possible (apology moment)"
    - "Watch for moments where breakdown becomes imminent (collapse)"
    - "Phase_4_to_phase_5: Escalation reaches 85+ OR emotional_state > 90 OR retreat attempt"

  constraint_enforcement:
    civility_required: false
    max_escalation_level: 85
    enforcement_notes:
      - "Civility constraint lifted; personal attacks are now in play"
      - "All previous constraints suspended"
      - "Monitor escalation ceiling (85); if exceeded, move to phase_5"

  exit_signal: "Escalation reaches critical threshold (>85) OR recovery impulse appears OR collapse indicators"

---

phase_5_loss_of_control_escalation_or_collapse:
  title: "Loss of Control / Escalation or Collapse"
  duration: "1-2 turns, then forced closure"

  narrative_context: |
    Final phase: either explosive escalation or emotional breakdown and retreat.
    The scene is ending. Either someone is leaving, someone is breaking down, or the conflict has reached its maximum.
    No resolution is possible; only damage assessment remains.

  ai_guidance:
    - "Final turn: escalate OR collapse OR departure"
    - "Escalation: ultimatums, accusations, final attacks with no hope of repair"
    - "Collapse: character becomes incoherent, tears, inability to continue"
    - "Departure: character gathers belongings, states intent to leave"
    - "No peaceful resolution; even if apology is attempted, it rings hollow"

  trigger_watch:
    - "apology_or_non_apology (if attempted): likely fake or too late"
    - "collapse_indicators: watch for voice breaking, incoherence, shutdown"
    - "retreat_signals: watch for 'I'm leaving', movement toward door"
    - "Final trigger before session end"

  constraint_enforcement:
    max_turns: 3
    no_recovery_possible: "if escalation_level > 90"
    enforcement_notes:
      - "Hard turn limit: after 3 turns in phase_5, session ends automatically"
      - "No escape from this phase; must end within max_turns"

  ending_conditions:
    - "emotional_breakdown: Character collapses; scene ends"
    - "forced_exit: Character leaves; scene ends"
    - "maximum_escalation_breach: All relationships critically damaged; scene ends"
    - "maximum_turn_limit: Turn 3 reached; session forcibly closes"

  exit_signal: "One of four ending conditions is met; session closes"

---

# General Guidance Across All Phases

environmental_constants:
  setting: "Parisian apartment, evening. Dinner table. Wine glasses, food, dessert in progress."
  temporal_flow: "Real-time; each turn is 1-2 minutes of conversation"
  background: "School incident happened recently (days prior); child is now at home with grandmother or nanny"
  children_absent: "Children never appear on stage; incident is entirely discussed by adults"

character_positioning:
  veronique_michel: "Sitting together; host couple"
  annette_alain: "Sitting together; guest couple"
  table_arrangement: "Linear or square; all visible to each other"
  physical_escalation: "Rare; conflict is verbal, not physical (true to the play)"

dialogue_norms:
  interruption_frequency: "Increases as phase progresses; rare in phase_1, frequent by phase_4"
  turn_length: "Short in phase_1 (1-2 lines); longer in phase_2-4 (2-4 lines); fragmented in phase_5"
  wine_drinking: "Continues throughout; characters refill to manage anxiety"
  tangential_references: "Characters may reference other social situations, politics, parenting philosophies; these ground disagreement in real values"

pacing_guidance:
  phase_1: "Slow, careful; setup time needed"
  phase_2: "Building; tension increases turn by turn"
  phase_3: "Pivot; alliances shift; surprise the player"
  phase_4: "Rapid; emotions overflow; less time between turns"
  phase_5: "Finale; one turn is all that remains; make it count"
