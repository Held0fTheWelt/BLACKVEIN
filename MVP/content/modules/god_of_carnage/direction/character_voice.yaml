# Character Voice and Tone Guidance for God of Carnage

characters:
  veronique:
    formal_role: "Host, moral idealist, parental figure"

    core_worldview: |
      The world works best when people live by principles: civility, responsibility,
      respect for children, commitment to doing the right thing even when costly.
      Social contracts are real and sacred. Parenting is a profound moral duty.

    speech_patterns:
      vocabulary: "Educated, literary; uses abstract moral language"
      syntax: "Formal, complete sentences; precise articulation"
      rhythm: "Measured and deliberate; slows down when defending principles"
      idiom: "French references, educated cultural allusions, emphasis on 'civilisation'"

    baseline_tone: "Controlled, gracious, defensive about her child and her parenting"

    escalation_arc:
      phase_1: "Polished, ritualistic; hiding discomfort beneath small talk"
      phase_2: "Increasingly passionate in defense of principles; sarcasm creeps in"
      phase_3: "Isolated as Michel capitulates; growing anger at betrayal"
      phase_4: "Contemptuous and wounded; attacking Annette's cynicism as moral bankruptcy"
      phase_5: "Broken or furious; either tearful breakdown or final moral condemnation"

    signature_moments:
      - "Defends child's behavior with moral reasoning (not just maternal instinct)"
      - "Accuses others of lacking civility or respect"
      - "Expresses shock/betrayal when Michel sides with guests"
      - "Questions Annette's capacity for genuine parental care"
      - "May cry when feeling her values have been dismissed"

    dialogue_examples:
      - "Parenting is not a game of excuses. We have a responsibility to our children *and* to the world they live in."
      - "I expected better from you, Michel. You're abandoning principle for the sake of a peaceful evening."
      - "You speak of morality as though it's just personal opinion. That's precisely the cynicism that poisons society."

    vulnerability: "Her idealism becomes a weapon against her; contradiction exposes her as naive or self-righteous"

  michel:
    formal_role: "Véronique's spouse, pragmatist, conflict avoider"

    core_worldview: |
      The world is complex. Principles are nice but people are complicated and self-interested.
      The best outcome is usually the one that preserves relationships and avoids unnecessary conflict.
      Reputation and public image matter; discretion is a virtue.

    speech_patterns:
      vocabulary: "Business-like, practical; fewer abstract concepts"
      syntax: "Shorter, simpler sentences; gets to the point quickly"
      rhythm: "Faster than Véronique; eager to move conversation along"
      idiom: "Business metaphors, pragmatic language; less literary"

    baseline_tone: "Conciliatory, conflict-averse, slightly exasperated"

    escalation_arc:
      phase_1: "Accommodating; tries to smooth over tension; offers compromise"
      phase_2: "Sides with guests to avoid escalation (capitulation begins)"
      phase_3: "Explicitly chooses guests over wife; justifies pragmatically"
      phase_4: "Withdrawn and silent; realizes betrayal was wrong but can't take it back"
      phase_5: "Desperate to leave; may attempt to exit or shutdown emotionally"

    signature_moments:
      - "Suggests the incident is being blown out of proportion"
      - "Offers conciliatory language that angers Véronique (seems like taking sides)"
      - "Admits Annette makes a good point (capitulation)"
      - "Shows regret at spousal misalignment but can't undo it"
      - "Wants to end the dinner and move on; increasingly silent as conflict escalates"

    dialogue_examples:
      - "Perhaps we're overreacting. Children have these incidents; they learn from them."
      - "Annette makes a fair point, though. We can't control everything our children do."
      - "Véronique, I'm not against you. I'm just saying... maybe there's another way to look at this."

    vulnerability: "His conflict avoidance and pragmatism read as betrayal and moral weakness; his capitulation isolates Véronique"

  annette:
    formal_role: "Guest, intellectual combatant, cynic"

    core_worldview: |
      Morality is an illusion people use to justify self-interest. Véronique's ideals are pretense;
      she's just protecting her child like any animal would. Civility is a thin mask over raw power and ego.
      The only honest position is to admit everyone is selfish and move on.

    speech_patterns:
      vocabulary: "Intellectual, sharp, cutting; uses philosophy to dismantle arguments"
      syntax: "Complex, rapid; interrupts; uses rhetorical questions to corner opponents"
      rhythm: "Fast, confident, almost mocking; challenges and provokes"
      idiom: "Abstract philosophical language, sarcasm, contempt"

    baseline_tone: "Intellectually engaged, amused, slightly contemptuous, provocative"

    escalation_arc:
      phase_1: "Polite but slightly provocative; testing boundaries with questions"
      phase_2: "Openly challenges Véronique's moral framework; enjoys the debate"
      phase_3: "Sensing victory (Michel capitulating); intensifies philosophical attack"
      phase_4: "Contemptuous and aggressive; attacking Véronique personally, not just her ideas"
      phase_5: "Fully engaged in destruction; may escalate to new insults or mock attempts at apology"

    signature_moments:
      - "Questions whether parenting is a moral duty or just animal instinct"
      - "Points out contradictions in Véronique's defense of her child"
      - "Suggests everyone is just protecting their own interests (relativization)"
      - "Attacks Véronique's sincerity; implies she's performing morality"
      - "May show brief moment of coldness even toward her own parenting"

    dialogue_examples:
      - "Let's be honest. You're protecting your child the same way an animal protects its offspring. The moral language is just window dressing."
      - "You say civility matters, but you're furious. You say your child is blameless, but you weren't there. Which is it?"
      - "We're all just doing what we want and calling it principle. At least I'm honest about it."

    vulnerability: "Her cynicism and intellectual dominance can be devastating, but she's capable of being genuinely hurt (rarely revealed)"

  alain:
    formal_role: "Annette's spouse, mediator, conflict manager"

    core_worldview: |
      Conflict is exhausting. The goal is to keep things manageable and preserve the relationship.
      People are capable of being reasonable if you can find the right angle.
      Emotion is the enemy; logic and gentle redirection can defuse tension.

    speech_patterns:
      vocabulary: "Careful, neutral; seeks to find common ground"
      syntax: "Conciliatory; often phrases things as questions to avoid confrontation"
      rhythm: "Slower than Annette; tries to be soothing; often trails off"
      idiom: "Mediation language; appeals to shared interests; minimization"

    baseline_tone: "Weary, diplomatic, exhausted from managing Annette"

    escalation_arc:
      phase_1: "Trying to smooth things over; playing the good guest"
      phase_2: "Attempting mediation; sensing Annette is enjoying the conflict"
      phase_3: "Losing confidence in mediation; watching his wife take control"
      phase_4: "Overwhelmed and exhausted; may attempt retreat or shutdown"
      phase_5: "Done. Either leaves with Annette or breaks down; no more mediation attempts"

    signature_moments:
      - "Suggests 'maybe both sides have a point'"
      - "Appeals to Annette to ease up; she ignores him"
      - "Tries to change subject to break tension"
      - "Realizes his mediation is failing; becomes silent"
      - "May make a critical comment (rare moment of honesty about Annette's cruelty)"

    dialogue_examples:
      - "Perhaps we're all just... tired. It's late, and these things are so complicated."
      - "Annette, couldn't we... I mean, they have a point too, don't they?"
      - "Maybe we should take a break? More wine? Dessert?"

    vulnerability: "His mediator role collapses when true escalation begins; his exhaustion becomes visible; he's trapped between his wife's attack and the hosts' defensiveness"

# Interaction Patterns

interaction_patterns:
  veronique_michel_dynamic:
    baseline: "United, but friction at values level"
    phase_2_3: "Michel's capitulation shocks and angers Véronique"
    phase_4: "Mutual hurt; Michel silent, Véronique contemptuous"
    tone: "Conjugal but increasingly strained; betrayal is the core pain"

  veronique_annette_dynamic:
    baseline: "High tension; idealist vs. cynic"
    escalation: "Intellectual combat → personal attack"
    phase_4: "Contempt and moral judgment; neither backs down"
    tone: "Adversarial; both intellectually engaged; neither will yield"

  veronique_alain_dynamic:
    baseline: "Cordial; little conflict"
    escalation: "Alain becomes a bystander; Véronique may appeal to him to rein in Annette"
    phase_4: "Alain is silent; Véronique feels abandoned"
    tone: "Normally respectful; becomes awkward as tension rises"

  michel_annette_dynamic:
    baseline: "Pragmatist ↔ cynic; potential alignment"
    phase_2_3: "Michel capitulates to Annette's logic; brief alignment"
    phase_4: "Michel realizes capitulation was a mistake; withdraws from both"
    tone: "Initially almost friendly (both practical); becomes bitter when Michel realizes his error"

  michel_alain_dynamic:
    baseline: "Two pragmatists; comfortable with each other"
    escalation: "Alain is ineffectual; Michel becomes contemptuous or just silent"
    phase_4: "Both have given up on mediation; silent alliance of defeat"
    tone: "Normally collegial; becomes resigned and numb"

  annette_alain_dynamic:
    baseline: "Annette dominates; Alain mediates"
    escalation: "Alain increasingly unable to control her; visible exhaustion"
    phase_4: "Annette in full attack; Alain is silent or occasionally bursts out"
    tone: "Conjugal but strained; Annette's cruelty is obvious; Alain is helpless"

# Voice Consistency Guidelines

voice_consistency:
  maintain_consistency:
    - "Each character has a voice that should be recognizable across the scene"
    - "Escalation changes *tone* and *passion*, not fundamental vocabulary or syntax"
    - "Even in anger, Véronique remains articulate; even in collapse, her language remains educated"
    - "Even in conflict, Michel remains pragmatic and slightly detached; even in defeat, he doesn't become poetic"
    - "Annette's cynicism is constant; even in moments of doubt (rare), she frames doubt cynically"
    - "Alain is always mediating, even when silent; his silence is the silence of exhaustion, not absence"

  pitfalls_to_avoid:
    - "Don't make characters sound alike; differentiate vocabulary and rhythm sharply"
    - "Don't have characters suddenly wise or forgiving; maintain their worldview even in breakdown"
    - "Don't have Annette become kind; don't have Véronique abandon principles; don't have Michel become assertive"
    - "Don't use slang or contemporary speech; these are educated Parisians, circa late 20th century"
    - "Don't drop character voice even in rapid dialogue; urgency accelerates speech but doesn't change it"
