# Relationship Axes for God of Carnage
# Four primary relationship axes govern character dynamics and emotional state tracking

relationship_axes:
  axis_1:
    id: axis_1
    name: "Spousal Internal"
    description: "Solidarity within couples vs. cross-couple dynamics"

    # Relationships involved
    relationships:
      - veronique_michel
      - annette_alain
      - veronique_annette
      - veronique_alain
      - michel_annette
      - michel_alain

    # Baseline state (session start)
    baseline:
      status: "Assumed alignment within couples; nominal deference between couples"
      stability: 80              # High initial trust within couples
      dominance_shift: 0         # Equal power initially

    # Escalation states
    escalation:
      condition: "Spouses split on key judgments"
      examples:
        - "Véronique defends child; Michel sides with guests"
        - "Annette escalates; Alain attempts de-escalation"
      stability_impact: -30      # Drops when spouses diverge

  axis_2:
    id: axis_2
    name: "Host ↔ Guest Power"
    description: "Véronique/Michel as authority (their home, rules) vs. Annette/Alain as challengers"

    relationships:
      - hosts_vs_guests
      - veronique_guests
      - michel_guests

    baseline:
      status: "Guests nominally defer to hosts"
      stability: 70              # Initial host authority
      dominance_shift: 5         # Hosts +5 (slight advantage)

    escalation:
      condition: "Guests dominate conversation; hosts lose control"
      examples:
        - "Annette controls topic despite host objection"
        - "Guests override host boundary (civility rule)"
      stability_impact: -40      # Major shift when control lost

  axis_3:
    id: axis_3
    name: "Moral vs. Pragmatic Worldview"
    description: "Véronique's idealism (rules, principles, sacred) vs. Annette's cynicism (all self-interest)"

    relationships:
      - veronique_annette

    baseline:
      status: "Tension acknowledged but contained within civility"
      stability: 60              # Fundamental disagreement
      dominance_shift: 0         # Initial balance

    escalation:
      condition: "Mutual contempt; no shared moral ground found"
      examples:
        - "Véronique calls Annette amoral; Annette dismisses Véronique as naive"
        - "Core worldview positions become weapons"
      stability_impact: -50      # Complete breakdown when worldviews collide

  axis_4:
    id: axis_4
    name: "Latent Dominance / Devaluation"
    description: "Individual status claims (who superior: parent, intellectual, moralist, pragmatist)"

    relationships:
      - veronique_annette
      - michel_annette
      - veronique_alain
      - all_characters_pairwise

    baseline:
      status: "Masks of civility; unstated hierarchy"
      stability: 70              # Civility covers underlying contempt
      dominance_shift: 0         # Hidden dynamics

    escalation:
      condition: "Contempt becomes explicit; status claims overt"
      examples:
        - "Annette dismisses Véronique as narrow-minded"
        - "Véronique questions Annette's capacity for genuine parental care"
        - "Michel asserts superior business judgment"
      stability_impact: -45      # Contempt incompatible with civility

# Relationship definitions (pairwise)
relationships:
  veronique_michel:
    id: veronique_michel
    type: spousal
    axis_membership: [axis_1]
    baseline_stability: 85
    baseline_dominance_shift: 0
    description: "Married couple; normally aligned; vulnerable to spousal split"

  annette_alain:
    id: annette_alain
    type: spousal
    axis_membership: [axis_1]
    baseline_stability: 75
    baseline_dominance_shift: 5  # Alain slightly subordinate (mediator role)
    description: "Married couple; higher baseline tension; Alain mediates"

  veronique_annette:
    id: veronique_annette
    type: host_guest
    axis_membership: [axis_1, axis_2, axis_3, axis_4]
    baseline_stability: 50
    baseline_dominance_shift: 5  # Véronique initially dominant (host)
    description: "Idealist vs. cynic; high conflict potential"

  veronique_alain:
    id: veronique_alain
    type: host_guest
    axis_membership: [axis_1, axis_2, axis_4]
    baseline_stability: 70
    baseline_dominance_shift: 10 # Véronique dominant (host authority)
    description: "Host to mediator; normally civil; little direct conflict"

  michel_annette:
    id: michel_annette
    type: host_guest
    axis_membership: [axis_1, axis_2, axis_4]
    baseline_stability: 60
    baseline_dominance_shift: 5  # Michel initially dominant (host)
    description: "Pragmatist to cynic; business-minded; potential alignment vs. Véronique"

  michel_alain:
    id: michel_alain
    type: host_guest
    axis_membership: [axis_1, axis_2]
    baseline_stability: 75
    baseline_dominance_shift: 5  # Michel dominant (host)
    description: "Pragmatist to mediator; potential alliance"

# Stability bounds (0-100)
stability_constraints:
  min_stable: 30                 # Below this: relationship in crisis
  min_civil: 50                  # Below this: civility abandoned
  baseline_broken: 0             # Relationship severed
