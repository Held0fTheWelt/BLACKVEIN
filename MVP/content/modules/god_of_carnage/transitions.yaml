# Scene Transitions for God of Carnage
# Conditions and mechanics for moving between scene phases

phase_transitions:
  phase_1_to_phase_2:
    from_phase: phase_1
    to_phase: phase_2
    trigger_conditions:
      - "contradiction"
    engine_checks:
      - "Monitor for contradiction trigger activation"
      - "Track position divergence across relationship axes"
      - "Check max_emotional_state against phase_1 limit (60)"
    transition_action: "Move to moral negotiation phase; activate phase_2 constraints"

  phase_2_to_phase_3:
    from_phase: phase_2
    to_phase: phase_3
    trigger_conditions:
      - "relativization"
    engine_checks:
      - "Verify at least one axis has shifted"
      - "Check relationship_stability for affected pairings"
      - "Confirm emotional_state rising across group"
    transition_action: "Recalculate power dynamics; update dominance shifts; escalate constraints"

  phase_3_to_phase_4:
    from_phase: phase_3
    to_phase: phase_4
    trigger_conditions:
      - "cynicism"
    engine_checks:
      - "Check relationship_stability < 50"
      - "Verify emotional_state escalating rapidly"
      - "Confirm civility_required constraint released"
    transition_action: "Activate all emotional triggers; remove civility constraint; escalate_level jumps to 60+; monitor recovery possibility"

  phase_4_to_phase_5:
    from_phase: phase_4
    to_phase: phase_5
    trigger_conditions:
      - "collapse_indicators"
    engine_checks:
      - "Check escalation_level >= 85 OR emotional_state >= 90"
      - "Look for collapse_indicators or retreat_signals"
      - "Verify no further de-escalation possible"
    transition_action: "Enter final phase; set max_turns limit; prepare for forced closure"

# Transition timing
transition_mechanics:
  automatic_check_frequency: "After each turn / player action"
  retroactive_transition: "If conditions met mid-turn, apply at turn boundary"
  no_skipping_phases: "Must progress linearly; no phase jumps"
  phase_reversion: "If conditions reverse (e.g., apology in phase 4), do not revert to earlier phase; apply local recovery mechanics instead"

# Transition state preservation
state_on_transition:
  carry_forward:
    - "All character emotional_state and escalation_level values"
    - "All relationship stability and dominance_shift values"
    - "Turn count and engagement tracking"
    - "Active trigger set (may expand in new phase)"
  reset:
    - "Phase-specific constraint values update (e.g., max_escalation_level)"
    - "Active trigger set expands per new phase definition"
    - "Enforced constraints swap per new phase"

# Safety bounds (prevent softlock)
transition_safeguards:
  force_transition_after_turns:
    phase_1: 4        # Force exit to phase_2 after 4 turns if no exit condition met
    phase_2: 5        # Force exit to phase_3 after 5 turns
    phase_3: 4        # Force exit to phase_4 after 4 turns
    phase_4: 4        # Force exit to phase_5 after 4 turns
    phase_5: 3        # Force session end after 3 turns (hard stop)
  minimum_turns_per_phase: 1    # Cannot exit phase in same turn entered (except phase_5)
