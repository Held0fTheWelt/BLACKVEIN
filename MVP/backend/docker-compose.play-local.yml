services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      SECRET_KEY: local-dev-secret
      JWT_SECRET_KEY: local-dev-jwt-secret
      FLASK_APP: run:app
      PLAY_SERVICE_INTERNAL_URL: http://play-service:8000
      PLAY_SERVICE_PUBLIC_URL: http://localhost:8001
      PLAY_SERVICE_SHARED_SECRET: local-dev-shared-secret
      PLAY_SERVICE_INTERNAL_API_KEY: local-dev-internal-key
      DEV_SECRETS_OK: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./instance:/app/instance
    depends_on:
      - play-service

  play-service:
    build:
      context: ..
      dockerfile: world-engine/Dockerfile
    environment:
      APP_TITLE: World of Shadows Play Service
      PLAY_SERVICE_SECRET: local-dev-shared-secret
      PLAY_SERVICE_INTERNAL_API_KEY: local-dev-internal-key
      RUN_STORE_BACKEND: sqlalchemy
      RUN_STORE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/world_engine
    ports:
      - "8001:8000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: world_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - world_engine_pg_data:/var/lib/postgresql/data

volumes:
  world_engine_pg_data:
