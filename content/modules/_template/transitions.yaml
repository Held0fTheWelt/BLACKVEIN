phase_transitions:
  phase_1_to_phase_2:
    from_phase: phase_1
    to_phase: phase_2
    trigger_conditions:
      - first_substantive_disagreement
    engine_checks:
      - opening_handover_complete
      - civility_surface_established
    transition_action: "Advance when politeness no longer contains the pressure."

  phase_2_to_phase_3:
    from_phase: phase_2
    to_phase: phase_3
    trigger_conditions:
      - relationship_axis_destabilized
    engine_checks:
      - central_pressure_visible
      - no_unseeded_revelation
    transition_action: "Advance when the main relationship pressure breaks containment."

transition_mechanics:
  default_policy: validate_before_advance
  allow_hold_current_phase: true

state_on_transition:
  preserve_open_pressures: true
  carry_relationship_state: true

transition_safeguards:
  prevent_skip_from_opening_to_ending: true
