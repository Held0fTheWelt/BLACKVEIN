phase_1_polite_opening:
  title: "Polite Opening"
  duration: "2-3 turns estimated"
  reference_context:
    canonical_path_refs:
      - canonical_path/index.yaml#paths.opening
    location_refs:
      - locations/appartment/main_room.yaml
    object_refs:
      - objects/appartment/main_room/focal_table.yaml
      - objects/building/threshold_door.yaml
    character_refs:
      - characters/index.yaml
      - characters/relationships.yaml
  ai_guidance:
    - "Establish roles, object pressure, and surface politeness from refs."
    - "Do not front-load final accusations or hidden facts."
  trigger_watch:
    - "No major trigger should fire before the first pressure marker."
  constraint_enforcement:
    civility_required: true
    no_personal_attacks: true
  exit_signal: "A first substantive disagreement appears."

phase_2_pressure:
  title: "Pressure"
  duration: "4-6 turns estimated"
  reference_context:
    phase_policy_ref: scenes.yaml#scene_phases.phase_2
    character_refs:
      - characters/relationships.yaml
      - characters/actor_pressure_profiles.yaml
  ai_guidance:
    - "Let concrete contradictions matter."
    - "Escalate through character-specific pressure, not generic hostility."
  trigger_watch:
    - contradiction
    - exposure
  constraint_enforcement:
    preserve_voice: true
  exit_signal: "The primary relationship axis is visibly damaged."

phase_3_rupture:
  title: "Rupture"
  duration: "4-6 turns estimated"
  reference_context:
    phase_policy_ref: scenes.yaml#scene_phases.phase_3
    ending_refs:
      - endings.yaml
  ai_guidance:
    - "Resolve the scene through authored endings or carry a named residual."
  trigger_watch:
    - collapse_indicator
  constraint_enforcement:
    no_unseeded_revelation: true
  exit_signal: "An authored ending condition becomes true."
