ending_types:
  forced_exit:
    id: forced_exit
    name: "Forced Exit"
    description: "A character leaves, is asked to leave, or the scene can no longer continue in the room."
    trigger_conditions:
      - exit_pressure_uncontained
    outcome:
      closure_type: rupture
      preserve_residual_pressure: true
    closure_action:
      - summarize_immediate_consequence

  fragile_stalemate:
    id: fragile_stalemate
    name: "Fragile Stalemate"
    description: "No one wins; the room remains intact but the relationship cost is visible."
    trigger_conditions:
      - pressure_exhausted_without_resolution
    outcome:
      closure_type: unresolved
      preserve_residual_pressure: true
    closure_action:
      - hold_final_image
