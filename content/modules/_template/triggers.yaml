trigger_types:
  contradiction:
    id: contradiction
    name: "Contradiction"
    description: "A character's account, value, or public posture conflicts with another's."
    recognition_markers:
      - direct_factual_disagreement
      - polite_correction_with_pressure
    escalation_impact:
      relationship_stability_delta: -10
    active_in_phases: [phase_2, phase_3]
    character_vulnerability:
      protagonist: medium
      counterpart: medium

  exposure:
    id: exposure
    name: "Exposure"
    description: "A protected identity, motive, or private contradiction becomes visible."
    recognition_markers:
      - someone_names_the_hidden_cost
      - private_motive_becomes_public
    escalation_impact:
      emotional_state_delta: 15
    active_in_phases: [phase_2, phase_3]
    character_vulnerability:
      protagonist: high
      counterpart: medium

  collapse_indicator:
    id: collapse_indicator
    name: "Collapse Indicator"
    description: "The social container fails enough to permit rupture or ending."
    recognition_markers:
      - civility_abandoned
      - exit_or_breakdown_attempted
    escalation_impact:
      emotional_state_delta: 25
    active_in_phases: [phase_3]
    character_vulnerability:
      protagonist: high
      counterpart: high

trigger_recognition:
  prefer_structured_markers_over_keywords: true
  require_scene_context: true

trigger_state:
  initial_active_triggers: []
