# Scene graph for God of Carnage.
# Runtime/compatibility index. Directed story order lives in canonical_path/.
# Location descriptions live in locations/.

scene_graph:
  id: goc_scene_graph_v1
  authority: module_runtime_scene_index
  primary_opening_document: direction/opening.md
  primary_direction_document: canonical_path/index.yaml
  modularity_policy_ref: knowledge/modularity_policy.yaml
  phase_layer: phase_beat_policy.yaml#phase_beat_policy.phases
  default_start_node_id: prologue_park_edge
  first_playable_node_id: first_playable_courtesy_gap

  nodes:
    - id: prologue_park_edge
      phase_id: opening
      sequence: 1
      title: "Parc Montsouris edge"
      location_id: park_edge
      scene_function: opening_prologue_establish
      visibility: narrator_only
      canonical_path_step_id: opening_001_parc_montsouris_edge
      required_event_ids:
        - event_01_triggering_incident
      summary: "Runtime node for canonical path step opening_001; place detail is sourced from location_id."

    - id: basketball_court_cluster
      phase_id: opening
      sequence: 2
      title: "Boys around the Boulevard Jourdan court"
      location_id: basketball_court
      scene_function: opening_group_pressure
      visibility: narrator_only
      canonical_path_step_id: opening_001_parc_montsouris_edge
      required_event_ids:
        - event_01_triggering_incident
      summary: "Runtime node for the opening group-pressure beat; place detail is sourced from location_id."

    - id: boys_argument
      phase_id: opening
      sequence: 3
      title: "Argument between the boys"
      location_id: basketball_court
      scene_function: opening_conflict_turns
      visibility: narrator_only
      canonical_path_step_id: opening_002_argument_stick_blow
      required_event_ids:
        - event_01_triggering_incident
      summary: "Runtime node for the boys' argument beat; action order is sourced from canonical_path_step_id."

    - id: stick_and_turn
      phase_id: opening
      sequence: 4
      title: "Stick, call, turn"
      location_id: park_edge
      scene_function: opening_irreversible_beat
      visibility: narrator_only
      canonical_path_step_id: opening_002_argument_stick_blow
      required_event_ids:
        - event_01_triggering_incident
      summary: "Runtime node for the irreversible prologue beat; action order is sourced from canonical_path_step_id."

    - id: strike_and_aftermath
      phase_id: opening
      sequence: 5
      title: "Strike and aftermath"
      location_id: park_edge
      scene_function: opening_consequence
      visibility: narrator_only
      canonical_path_step_id: opening_003_bicycle_disappearance
      required_event_ids:
        - event_01_triggering_incident
        - event_02_adult_consequence
      summary: "Runtime node for prologue aftermath; action order is sourced from canonical_path_step_id."

    - id: apartment_threshold
      phase_id: opening
      sequence: 6
      title: "Dark building hallway"
      location_id: building_hallway
      scene_function: move_to_stage
      visibility: narrator_only
      canonical_path_step_id: opening_004_dark_building_hallway
      required_event_ids:
        - event_03_arrival_threshold
      summary: "Runtime node for threshold transition; place and prevented-exit detail is sourced from location_id."

    - id: living_room_arrival
      phase_id: phase_1
      sequence: 7
      title: "Living room arrival"
      location_id: apartment_entry
      scene_function: ritual_entry
      visibility: narrator_and_actor_action
      canonical_path_step_id: opening_006_apartment_entry_greetings
      required_event_ids:
        - event_04_apartment_as_stage
      summary: "Runtime node for threshold greeting; place detail is sourced from locations/."

    - id: living_room_arrangement
      phase_id: phase_1
      sequence: 8
      title: "Living room arrangement"
      location_id: living_room
      scene_function: establish_play_space
      visibility: narrator_and_actor_action
      canonical_path_step_id: opening_007_living_room_arrangement
      required_event_ids:
        - event_04_apartment_as_stage
      summary: "Runtime node for arranging the social room; room and object detail is sourced from locations/ and objects/."

    - id: selected_role_anchor
      phase_id: phase_1
      sequence: 9
      title: "Selected role anchor"
      location_id: living_room
      scene_function: player_anchor
      visibility: narrator_only
      required_event_ids:
        - event_05_role_anchor
      summary: "Runtime node for player role anchoring without forced speech or inner decision."

    - id: first_playable_courtesy_gap
      phase_id: phase_1
      sequence: 12
      title: "First playable courtesy gap"
      location_id: living_room
      scene_function: ready_to_play
      visibility: playable
      canonical_path_step_id: opening_013_first_playable_courtesy_gap
      required_event_ids:
        - event_06_first_playable_moment
      summary: "Runtime node for the first playable courtesy gap."

    - id: written_statement_negotiation
      phase_id: phase_1
      sequence: 10
      title: "Written statement negotiation"
      location_id: living_room
      object_focus_id: coffee_table
      scene_function: establish_procedure
      visibility: playable
      canonical_path_step_ids:
        - opening_008_statement_on_table
        - opening_009_wording_dispute_armed_carrying
        - opening_010_injury_detail_dental_consequence
        - opening_011_courtesy_community_pressure
      summary: "Runtime node for statement and wording pressure; directed beats live in canonical_path/."

    - id: coffee_and_courtesy
      phase_id: phase_1
      sequence: 11
      title: "Coffee and courtesy"
      location_id: living_room
      scene_function: ritual_civility
      visibility: playable
      canonical_path_step_id: opening_012_tulips_and_hospitality
      summary: "Runtime node for hospitality pressure; object detail is sourced from objects/."

    - id: player_response_ripple
      phase_id: phase_1
      sequence: 13
      title: "Player response ripple"
      location_id: living_room
      scene_function: player_action_consequence
      visibility: playable
      canonical_path_step_id: opening_014_player_response_ripple
      summary: "Runtime node for converting player action into social consequence without shortcutting the plot."

    - id: phone_exit_pressure
      phase_id: phase_1
      sequence: 14
      title: "Phone and exit pressure"
      location_id: living_room
      scene_function: divided_attention_available
      visibility: playable
      canonical_path_step_ids:
        - opening_015_phone_exit_pressure
        - opening_016_sustained_play_pressure_field
      summary: "Runtime node for opening-phase exit pressure; prevented exits are sourced from building locations and objects."

    - id: parenting_principles
      phase_id: phase_2
      sequence: 15
      title: "Parenting principles"
      location_id: living_room
      scene_function: moral_negotiation
      visibility: playable
      summary: "Responsibility, education, and parental judgment become explicit pressure."

    - id: blame_pressure
      phase_id: phase_2
      sequence: 16
      title: "Blame pressure"
      location_id: living_room
      scene_function: raise_pressure
      visibility: playable
      summary: "The discussion begins to test whether either family will accept a version of blame."

    - id: phone_intrusion
      phase_id: phase_2
      sequence: 17
      title: "Phone intrusion"
      location_id: living_room
      scene_function: divided_attention
      visibility: playable
      summary: "Outside obligations interrupt the meeting and expose priorities."

    - id: spouse_alignment_cracks
      phase_id: phase_3
      sequence: 18
      title: "Spouse alignment cracks"
      location_id: living_room
      scene_function: alliance_shift
      visibility: playable
      summary: "Each couple risks turning disagreement inward."

    - id: hospitality_breakdown
      phase_id: phase_4
      sequence: 19
      title: "Hospitality breakdown"
      location_id: living_room
      scene_function: emotional_derailment
      visibility: playable
      summary: "The objects and rituals of hosting stop protecting anyone."

    - id: exit_attempt
      phase_id: phase_5
      sequence: 20
      title: "Exit attempt"
      location_id: building_hallway
      scene_function: closure_pressure
      visibility: playable
      summary: "Runtime node for closure pressure; prevented-exit detail is sourced from location_id."

  edges:
    - from: prologue_park_edge
      to: basketball_court_cluster
      condition: start_opening
    - from: basketball_court_cluster
      to: boys_argument
      condition: group_pressure_visible
    - from: boys_argument
      to: stick_and_turn
      condition: argument_turns_serious
    - from: stick_and_turn
      to: strike_and_aftermath
      condition: physical_consequence
    - from: strike_and_aftermath
      to: apartment_threshold
      condition: meeting_arranged
    - from: apartment_threshold
      to: living_room_arrival
      condition: guests_enter
    - from: living_room_arrival
      to: living_room_arrangement
      condition: threshold_ritual_complete
    - from: living_room_arrangement
      to: selected_role_anchor
      condition: room_established
    - from: selected_role_anchor
      to: written_statement_negotiation
      condition: player_anchor_complete
    - from: written_statement_negotiation
      to: coffee_and_courtesy
      condition: hospitality_pressure
    - from: coffee_and_courtesy
      to: first_playable_courtesy_gap
      condition: courtesy_gap_available
    - from: first_playable_courtesy_gap
      to: player_response_ripple
      condition: player_action_or_silence_registered
    - from: player_response_ripple
      to: phone_exit_pressure
      condition: opening_pressure_sustained
    - from: phone_exit_pressure
      to: parenting_principles
      condition: substantive_disagreement
    - from: parenting_principles
      to: blame_pressure
      condition: culpability_named_or_implied
    - from: blame_pressure
      to: phone_intrusion
      condition: divided_attention_available
    - from: blame_pressure
      to: spouse_alignment_cracks
      condition: alliance_shift
    - from: phone_intrusion
      to: spouse_alignment_cracks
      condition: interruption_exposes_priorities
    - from: spouse_alignment_cracks
      to: hospitality_breakdown
      condition: civility_fails
    - from: hospitality_breakdown
      to: exit_attempt
      condition: closure_pressure
