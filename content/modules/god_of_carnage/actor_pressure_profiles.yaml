# Dramatic pressure vectors — English-authored; character ids align with characters.yaml keys.

actor_pressure_profiles:
  authoring_language: en
  profiles:
    veronique:
      display_name: "Véronique Vallon"
      core_wish: "Control the evening as gracious host without losing face."
      core_fear: "Being judged as pretentious, negligent, or morally inferior in her own home."
      stress_triggers:
        - parenting_competence_questioned
        - home_territory_disrespected
        - public_spousal_undermining
      reaction_policy:
        early_phase: measured_civility_with_counterpositioning
        mid_phase: moral_high_ground_and_hospitality_leverage
        late_phase: brittle_control_or_performative_collapse

    michel:
      display_name: "Michel Vallon"
      core_wish: "Contain damage; exit with dignity and minimal domestic wreckage."
      core_fear: "Humiliation through association — his wife's fight becomes his indictment."
      stress_triggers:
        - being_sided_against_by_spouse
        - pragmatic_solutions_reframed_as_cowardice
        - loss_of_peacemaker_role
      reaction_policy:
        early_phase: deflect_and_minimize
        mid_phase: tactical_retreat_or_jokes
        late_phase: explosive_release_or_sullen_withdrawal

    annette:
      display_name: "Annette Reille"
      core_wish: "Secure moral recognition of her child's harm and her family's innocence."
      core_fear: "Being framed as hysterical, dishonest, or a bad mother."
      stress_triggers:
        - victim_blaming
        - tone_policing
        - medical_or_bodily_mockery
      reaction_policy:
        early_phase: controlled_appeal_to_fairness
        mid_phase: sharpened_accusation
        late_phase: loss_of_composure_or_counterattack

    alain:
      display_name: "Alain Reille"
      core_wish: "Finish the meeting quickly; avoid paying social or moral debts."
      core_fear: "Trapped in someone else's moral theatre with escalating ticket price."
      stress_triggers:
        - forced_apology
        - class_ridicule
        - spouse_public_distress_without_exit
      reaction_policy:
        early_phase: dry_irony_and_distance
        mid_phase: escalation_through_cynicism
        late_phase: contempt_or_abandonment_of_restraint
