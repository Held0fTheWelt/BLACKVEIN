canonical_path_step:
  sequence: 17
  id: opening_017_alain_second_walter_call
  path_id: goc_opening_canonical_path
  name: "017 - Alain's second Walter call: A.S.M. strategy, Dennis chained"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 5
    summary: >-
      Alain's phone vibrates. Second Walter call: strategy questions about the
      shareholders' meeting. Letter-to-the-editor is rejected. Walter describes
      the specific side effect 'ataxia' (loss of balance, uneven gait). Alain
      hangs up and immediately calls Dennis: 'You have known about the risks for
      two and a half years.' Dennis reacts. In the background Alain shovels in
      cobbler. Annette throws at him: 'Alain, we are all waiting for you.'

  duration_target_seconds: 90
  duration_max_seconds: 120

  theme_coverage_phase_refs:
    - actor: alain
      phase_id: pharma_crisis_second_call
      realization_step: true

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
    use_fields: [plausible_actions]
  object_refs:
    - object_id: alain_mobile_phone
      source: objects/appartment_vallon/living_room/mobile_phone_alain.yaml
    - object_id: cobbler_dish_on_tray
      source: objects/appartment_vallon/kitchen/cobbler.yaml

  present:
    named_characters: [veronique, michel, annette, alain]
    offstage_voices: [walter, dennis]

  preconditions:
    inherited_from_previous_step:
      - first_civility_crack_logged_irreversible
      - alain_pharma_crisis_active

  mandatory_beats:

    - id: second_walter_call_chained_pattern
      order: 1
      duration_target_seconds: 80
      beat_pattern_ref: phone_interruption_recurrent
      beat_pattern_params:
        call_partner: walter
        call_topic: asm_litigation_contingency
        interrupted_in_step_id: opening_017_alain_second_walter_call
        interrupted_at_beat_id: annette_novel_way_carryover
        alain_visible_facts:
          - "letter_to_editor_token: no letters to the editor, fan the flames"
          - "scheduled_token: was it scheduled â€” no, they let it run"
          - "ataxia_explained_token: ataxia is loss of balance, uneven gait"
          - "normal_doses_token: rare at normal doses"
          - "two_and_a_half_years_token: two and a half years"
          - "no_recall_token: no recall action"
          - "chapter_13_token: basically bankruptcy filing"
          - "half_billion_revenue_token: revenue in the half-billion range"
        call_audible_duration_seconds: 50
        returns_to_room_with: silent_continuation_of_prior_thread
        leaves_phone_in_view: true
      player_status: observer_window_open

    - id: alain_chains_to_dennis_immediately
      order: 2
      duration_target_seconds: 15
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: chain_immediately_to_dennis_about_known_risks
        required_facts:
          - "dennis_call_token: Dennis"
          - "talked_to_him_token: did you talk to him"
          - "known_risks_token: you have known about the risks for two and a half years"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_dennis_call
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "three short lines, harried"
        forbidden_drift: [explain_to_the_room_what_dennis_is_about]
      player_status: observer_window_open

    - id: alain_eats_cobbler_while_talking
      order: 3
      duration_target_seconds: 5
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Alain shovels cobbler into himself during the phone conversation."
      player_status: observer_window_open

    - id: annette_we_are_all_waiting
      order: 4
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: call_out_alain_we_are_all_waiting
        required_facts: ["waiting_token: Alain, we are all waiting for you"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_dennis_call
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "five or six words, quietly irritated"
      forces_response_chain:
        target_actor: alain
        target_intent: defer_with_yeah_one_second
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: alain_yeah_one_second
      order: 5
      duration_target_seconds: 2
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: defer_with_one_second
        required_facts: ["one_second_token: yes, one second"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_dennis_call
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "two words, without looking up"
      player_status: observer_window_open

  optional_micro_beats:
    - id: hosts_visible_irritation
      trigger: during(alain_chains_to_dennis_immediately)
      condition: any_visible_fact_lands
      director_instruction:
        narrator_perception_only:
          - "Veronique raises her eyebrows."
          - "Michel looks at the floor."
        player_status: observer_window_open

  themes_realized_here:
    - actor: alain
      theme: deny_deny_deny_directive
      mechanism: "forbid letter-to-editor + scheduled-no confrontation"
      evidence_required: [alain_speaks_letter_to_editor_token]
      blocks_progression_if_missing: true
    - actor: alain
      theme: no_letters_to_the_editor
      mechanism: "explicit strategy statement"
      evidence_required: [alain_speaks_letter_to_editor_token]
      blocks_progression_if_missing: true
    - actor: alain
      theme: dennis_chained_call
      mechanism: "second call immediately chained shows pharma_crisis_active in foreground"
      evidence_required: [alain_speaks_dennis_call_token, alain_speaks_known_risks_token]
      blocks_progression_if_missing: true

  state_changes_committed:
    - key: runtime_intelligence.second_call_overheard_facts
      to_value:
        - letter_to_editor_rejected
        - ataxia_explained
        - normal_doses_rare
        - no_recall_chapter_13_risk
        - half_billion_revenue_confirmed
      commit_irreversible: true
    - key: runtime_intelligence.alain_call_dependency_pattern
      to_value: { chained_calls: 2_calls_back_to_back, eating_during_calls: true }
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 80
    escape_via_player_initiative:
      allowed: false

  next_point:
    step_id: opening_018_hamster_inquiry_annette_pushback
    handoff: >-
      After Alain finally hangs up, the hamster topic returns more sharply.
      Annette asks the moral question explicitly. First alliance breaks become
      visible.
    carry_forward:
      - second_call_overheard_facts_irreversible
      - alain_call_dependency_visible_to_room
      - annette_visible_irritation_at_husband
