    narrator_tasks:
      - keep_opening_playable_long_enough_for_player_choice_to_matter
      - avoid_repeating_the_exterior_incident
      - carry_quote_anchors_as_optional_pressure_cues
    must_not:
      - force_phase_2_on_timer_alone
      - close_the_statement_too_cleanly
      - make_quote_anchors_mandatory_verbatim_lines

  next_point:
    step_id: null
    transition: "Continue phase_1 play through scene_graph until substantive disagreement justifies phase_2."
    carry_forward:
      - phase_1_opening_pressure_field
      - multiple_playable_handles_available
      - first_substantive_disagreement_not_yet_forced
