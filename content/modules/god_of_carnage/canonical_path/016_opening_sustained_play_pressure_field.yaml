    - object_id: window
      source: objects/appartment_vallon/living_room/window.yaml
    - object_id: television
      source: objects/appartment_vallon/living_room/television.yaml

  theme_threads:
    - opening_as_playable_pressure_field
    - procedure_hospitality_parenthood_triangle
    - transition_to_phase_1_without_forced_escalation
  play_model:
    estimated_minutes: 2
    interaction_density: medium
    total_opening_minutes_if_played: "20-30"
    player_agency: "continue statement, hospitality, exit pressure, injury detail, or silence thread"

  path_point:
    unresolved_handles:
      - statement_wording
      - dental_consequence
