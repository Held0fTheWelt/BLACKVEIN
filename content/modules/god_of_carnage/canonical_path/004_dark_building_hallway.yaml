canonical_path_step:
  sequence: 4
  id: opening_004_dark_building_hallway
  path_id: goc_opening_canonical_path
  name: "004 - Building hallway, prevented exits"
  mode: narrator_path_transition

  location_ref:
    location_id: building_hallway
    source: locations/building/building_hallway.yaml
    use_fields:
      - description
      - entrances_exits
      - sensory_tags
      - prevented_actions
  support_refs:
    - location_id: building_stairwell
      source: locations/building/building_stairwell.yaml
      use_fields: [playable_access, entrances_exits, prevented_actions]
    - object_id: elevator
      source: objects/building/elevator.yaml
      use_fields: [description, prevented_actions, interaction_notes]

  path_point:
    present:
      named_characters:
        - annette
        - alain
      implied_hosts:
        - veronique
        - michel
    action_policy_refs:
      prevented_not_forbidden:
        - locations/building/building_hallway.yaml#location.prevented_actions
        - locations/building/building_stairwell.yaml#location.prevented_actions
        - objects/building/elevator.yaml#object.prevented_actions
    narrator_tasks:
      - establish_threshold_using_location_ref
      - show_exit_pressure_as_prevented_not_forbidden
      - move_directly_toward_living_room
    must_not:
      - open_playable_stairwell_scene
      - make_elevator_functional_exit
      - duplicate_location_description

  next_point:
    step_id: opening_005_living_room_threshold
    handoff: "Pass through the apartment door and convert arrival into social pressure."
    carry_forward:
      - urgent_call_pressure
      - prevented_exit_pressure
      - guests_crossing_host_threshold
