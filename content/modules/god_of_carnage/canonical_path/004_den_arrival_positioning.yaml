canonical_path_step:
  sequence: 4
  id: opening_004_den_arrival_positioning
  path_id: goc_opening_canonical_path
  name: "004 - Study arrival, four positions taken around the laptop"
  mode: narrator_perception_transition

  scene_anchor:
    scene: 2
    summary: >-
      Four adults have crossed through the living room and now stand around the
      laptop in the study. Veronique is seated at the device, Michel stands
      beside her in a friendly way, Annette and Alain two steps back in
      office clothes. No one has spoken yet.
  scene_transition:
    kind: hard_cut
    trigger: non_player_agitated_scene_break
    output_mode: explicit_cut_and_scene_change
    applies_to: first_visible_block_only
    source_language: en
    direction:
      - break_out_of_smooth_continuous_narration
      - open_with_concise_cut_or_scene_change_cue_in_session_output_language
      - establish_current_place_as_private_study_in_vallon_apartment
      - do_not_narrate_travel_path_through_apartment_unless_authored
      - then_stage_the_adults_around_the_laptop_as_a_tableau
    avoid:
      - soft_causal_bridge_from_park_to_study
      - generic_room_inventory_opening
      - player_agency_explanation

  duration_target_seconds: 35
  duration_max_seconds: 55

  location_ref:
    location_id: study
    source: locations/appartment_vallon/study.yaml
    use_fields:
      - description
      - entrances_exits
      - sensory_tags
      - plausible_actions
  object_refs:
    - object_id: study_laptop
      source: objects/appartment_vallon/study/laptop.yaml
      use_fields: [description, sensory_tags]
    - object_id: study_desk
      source: objects/appartment_vallon/study/study_desk.yaml
      use_fields: [description, sensory_tags]
    - object_id: study_bookshelves
      source: objects/appartment_vallon/study/study_bookshelves.yaml
      use_fields: [description, sensory_tags]
  character_refs:
    - characters/definitions/veronique.yaml
    - characters/definitions/michel.yaml
    - characters/definitions/annette.yaml
    - characters/definitions/alain.yaml

  present:
    named_characters:
      - veronique
      - michel
      - annette
      - alain
    coats_state:
      annette: laid_down_somewhere_offscreen
      alain: carried_over_arm
      veronique: not_present_as_outerwear
      michel: not_present_as_outerwear

  mandatory_beats:

    - id: room_perception_winter_light
      order: 1
      duration_target_seconds: 8
      director_instruction:
        narrator_perception_only:
          - "A narrow room used as a home office. Winter light through the single window."
          - "On a wall table, stacks of magazines and printouts, beside them a school notebook and a laptop."
        player_status: spectator_blocked

    - id: positions_around_laptop
      order: 2
      duration_target_seconds: 12
      director_instruction:
        narrator_perception_only:
          - "Veronique is seated at the laptop."
          - "Michel stands beside her in a friendly way, leaning slightly over her, already ready for words."
          - "Two steps back, Annette and Alain, in office clothes. Annette without a coat, Alain carrying his over his arm."
          - "All four are looking at the screen."
        player_status: spectator_blocked

    - id: mood_register_serious_cordial_tolerant
      order: 3
      duration_target_seconds: 10
      director_instruction:
        narrator_perception_only:
          - "The mood is composed, polite, carried by mutual forbearance."
          - "It is clear that these two couples are not close."
        player_status: observer_no_initiative
      # NOTE: This is the borderline case for narrator_perception_only â€”
      # "composed, polite, carried by mutual forbearance" is sensory enough
      # (faces, body posture, lack of physical closeness) to qualify. If the
      # lexical filter rejects it, the LDSS must fall back to pure body-state
      # description: "No one sits down. The distances between the couples
      # remain the same."

  player_intrusion_windows:
    - between: [positions_around_laptop, mood_register_serious_cordial_tolerant]
      allowed:
        - look_at_named_object
        - shift_weight_or_posture
        - silent_observation
      forbidden:
        - speak
        - leave_the_study
        - touch_the_laptop_or_papers
      redirect_policy: >-
        If the player speaks or moves before the hosts' first word, the
        director writes a brief narrator_perception
        ("No one answers. Veronique waits a breath longer than necessary.")
        and returns to the next mandatory_beat.

  souffleuse_cues:
    - id: opening_first_player_orientation
      trigger:
        after_mandatory_beat: mood_register_serious_cordial_tolerant
        timing: after_narrator_path_visible
      required_once: true
      capability: souffleuse.situational_stance
      voice_mode: second_person_inner
      internal_resolution_language: en
      guidance_kinds:
        - situation_orientation
        - character_stance
        - pre_action_inward_footing
      future_knowledge_policy: infer_baseline_stance_only_no_future_event_disclosure
      audience: current_human_actor
      prompt_key:
        de: world_engine.souffleuse.opening_orientation.de
        en: world_engine.souffleuse.opening_orientation.en
      source_refs:
        - characters/definitions/{current_human_actor}.yaml#character_document.opening_canon.player_agency_policy
        - characters/definitions/{current_human_actor}.yaml#character_document.opening_canon.situational_stance
        - characters/definitions/{current_human_actor}.yaml#character_document.opening_canon.later_development_attitude_refs
        - locations/appartment_vallon/study.yaml#location
        - canonical_path/004_den_arrival_positioning.yaml#canonical_path_step.player_intrusion_windows
        - canonical_path/index.yaml#canonical_path.paths.opening
      commit_impact: ui_guidance_only
      suppress_if:
        - narrator_already_established_player_role_and_playable_options
      must_not:
        - commit_player_action
        - force_exact_line
        - reveal_hidden_npc_intent
        - duplicate_narrator_description
        - become_canonical_fact
        - author_visible_text_here

  themes_realized_here:
    - actor: veronique
      theme: meeting_chair_by_seating_position
      mechanism: "seated at the laptop = meeting leadership implicitly assumed"
      evidence_required:
        - veronique_is_seated_others_are_standing
        - laptop_is_in_veroniques_hands
      blocks_progression_if_missing: true

    - actor: michel
      theme: amiable_supporter_posture
      mechanism: "leaning over Veronique, ready to nod"
      evidence_required:
        - michel_body_oriented_toward_veronique
      blocks_progression_if_missing: false

    - actor: alain
      theme: ready_to_leave_signal
      mechanism: "coat over his arm instead of set down"
      evidence_required:
        - alain_coat_state == carried_over_arm
      blocks_progression_if_missing: true

    - actor: annette
      theme: more_committed_to_staying_than_husband
      mechanism: "coat laid down offscreen"
      evidence_required:
        - annette_coat_state == laid_down_somewhere_offscreen
      blocks_progression_if_missing: false

  state_changes_committed:
    - key: environment_state.current_location
      to_value: study
      commit_irreversible: false
    - key: environment_state.actors_positioning
      to_value:
        veronique: seated_at_laptop
        michel: standing_behind_veronique_leaning_in
        annette: standing_two_steps_back
        alain: standing_two_steps_back_with_coat
      commit_irreversible: false
    - key: runtime_intelligence.meeting_authority_implicit
      to_value: veronique
      commit_irreversible: false
    - key: runtime_intelligence.exit_pressure_signal
      to_value:
        active: true
        carrier: alain
        evidence: coat_on_arm
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 25
    escape_via_player_initiative:
      allowed: false

  next_point:
    step_id: opening_005_statement_reading
    handoff: >-
      Four positions are set, no one is seated except Veronique, the laptop is
      playable. Handoff to Veronique's reading of the written statement.
    carry_forward:
      - meeting_authority_implicit_veronique
      - exit_pressure_signal_alain_coat
      - annette_more_committed_than_alain
      - statement_text_unread_yet
