canonical_path_step:
  sequence: 1
  id: opening_001_parc_montsouris_edge
  path_id: goc_opening_canonical_path
  name: "001 - Park edge and boys at the court"
  mode: narrator_only_prologue

  scene_anchor:
    scene: 1
    summary: >-
      Establishing image. The public edge of Parc Mont Sourire on an ordinary
      winter afternoon. About a dozen boys around the basketball court.
      Bicycles parked at the rack. No adult voices, no named characters
      yet. This is the world before the incident.

  duration_target_seconds: 18
  duration_max_seconds: 30

  theme_coverage_phase_refs: []

  location_ref:
    location_id: park_edge
    source: locations/opening/park_edge.yaml
    use_fields: [description, entrances_exits, sensory_tags]
  support_refs:
    - location_id: basketball_court
      source: locations/opening/basketball_court.yaml
      use_fields: [description, sensory_tags]
    - location_id: playground
      source: locations/opening/playground.yaml
      use_fields: [description, sensory_tags]
  object_refs:
    - object_id: bicycle_rack
      source: objects/opening/bicycle_rack.yaml
      use_fields: [description, sensory_tags]

  present:
    named_characters: []
    on_screen_groups:
      - id: boys_group
        count: about_a_dozen
        anchor_location_id: basketball_court

  preconditions: {}

  mandatory_beats:

    - id: park_edge_establishing_image
      order: 1
      duration_target_seconds: 8
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Winter afternoon. The public edge of Parc Mont Sourire."
          - "A dozen boys are spread around the basketball court."
          - "Bicycles lean against the rack at the entrance."
        sensory_anchors:
          - locations/opening/park_edge.yaml#sensory_tags
          - locations/opening/basketball_court.yaml#sensory_tags
      player_status: observer_no_initiative

    - id: ordinary_public_life_filler
      order: 2
      duration_target_seconds: 6
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Voices carry from the playground further in."
          - "Nobody at the rack. Nobody adult in view."
        sensory_anchors:
          - locations/opening/playground.yaml#sensory_tags
          - objects/opening/bicycle_rack.yaml#sensory_tags
      player_status: observer_no_initiative

  themes_realized_here: []

  state_changes_committed:
    - key: runtime_intelligence.opening_prologue_established
      to_value: park_edge_image_seen
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    minimum_seconds_elapsed: 12

  next_point:
    step_id: opening_002_argument_stick_blow
    handoff: "Move closer to the court: two boys begin to argue."
    carry_forward:
      - boys_group_at_court
      - ordinary_public_setting
      - bicycles_nearby
