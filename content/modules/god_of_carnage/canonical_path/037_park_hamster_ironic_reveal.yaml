canonical_path_step:
  sequence: 37
  id: opening_037_park_hamster_ironic_reveal
  path_id: goc_opening_canonical_path
  name: "037 - Park reveal: hamster alive, kids playing happily"
  mode: narrator_perception_transition

  scene_anchor:
    scene: 21
    summary: >-
      Cut to the exterior. At the base of an oak tree in the park, the
      hamster sits nibbling an acorn â€” fine. The camera reveals the same
      park where the opening incident occurred. The group of children who
      had fought are playing together happily. The adults' destruction
      offstage is rendered ironic: the children have reconciled and the
      hamster has survived.

  duration_target_seconds: 30
  duration_max_seconds: 50

  theme_coverage_phase_refs:
    - actor: cross_cutting
      phase_id: phase_F_ironic_reset
      realization_step: true
      climax: true

  location_ref:
    location_id: park_edge
    source: locations/exterior/park_edge.yaml
    use_fields: [description, sensory_tags]
  support_refs:
    - location_id: basketball_court
      source: locations/exterior/basketball_court.yaml
      use_fields: [sensory_tags]
    - location_id: oak_tree_base
      source: locations/exterior/oak_tree_base.yaml
      use_fields: [description, sensory_tags]
  object_refs:
    - object_id: ethan_hamster
      source: objects/exterior/ethan_hamster.yaml
      use_fields: [survival_states]
    - object_id: acorn
      source: objects/exterior/acorn.yaml

  present:
    named_characters: []
    on_screen_groups:
      - id: boys_group_reconciled
        anchor_location_id: basketball_court

  preconditions:
    inherited_from_previous_step:
      - act_one_closure_irreversible
      - all_four_actors_in_post_destruction_pose

  mandatory_beats:

    - id: hamster_alive_perception
      order: 1
      duration_target_seconds: 8
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "At the base of an oak tree, a hamster shakes itself out on the ground."
          - "Leaves and roots tangle around him."
          - "He nibbles on an acorn. He is very content."
        sensory_anchors:
          - locations/exterior/oak_tree_base.yaml#sensory_tags
          - objects/exterior/ethan_hamster.yaml#survival_states
      player_status: observer_no_initiative

    - id: camera_pulls_back
      order: 2
      duration_target_seconds: 8
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "The view widens."
          - "The same park as the opening of the film."
          - "Winter light, stark trees, patchy grass."
      player_status: observer_no_initiative

    - id: kids_playing_together_happily
      order: 3
      duration_target_seconds: 10
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "In the distance, the same group of children who had been in the fight."
          - "They are all playing together. Happily."
          - "No one is keeping score."
      player_status: observer_no_initiative

  themes_realized_here:
    - actor: cross_cutting
      theme: kids_reconciled_adults_destroyed
      mechanism: "explicit visual ironic counter â€” the adults' carnage is set against the survival and reconciliation of those they fought over"
      evidence_required: [hamster_alive_visible_beat, kids_playing_together_beat]
      blocks_progression_if_missing: true

  state_changes_committed:
    - key: environment_state.hamster_state
      to_value: alive_nibbling_acorn_at_oak_tree_base
      commit_irreversible: true
    - key: environment_state.boys_group_state
      to_value: playing_together_reconciled
      commit_irreversible: true
    - key: runtime_intelligence.alliance_configuration_active
      to_value: phase_F_ironic_reset
      commit_irreversible: false
    - key: runtime_intelligence.alliance_configuration_history
      append:
        - { from: phase_E_everyone_vs_everyone, to: phase_F_ironic_reset, at_step: "037" }
      commit_irreversible: true

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 25

  next_point:
    step_id: opening_038_handoff_or_terminal
    handoff: "Opening complete. Either phase_1 sustained play picks up, or terminal close."
    carry_forward:
      - hamster_alive_irreversible
      - boys_reconciled_irreversible
      - alliance_phase_F_ironic_reset_realized
