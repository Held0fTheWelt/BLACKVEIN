canonical_path_step:
  sequence: 30
  id: opening_030_veronique_darfur_rant
  path_id: goc_opening_canonical_path
  name: "030 - Veronique's Darfur rant, moral idealism unmasked"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 8
    summary: >-
      Veronique's principled mediation collapses into the Darfur rant. She
      delivers a heavy speech about the horror happening in 'that part of
      the world' that Michel will be ashamed not to have grasped. Michel
      counters with 'this crush you have on the Sudan sambos is spilling
      into everything'. Veronique declares 'I am horrified, how can you
      be openly despicable'. Climax of moral_idealism_breaks_open.

  duration_target_seconds: 95
  duration_max_seconds: 130

  theme_coverage_phase_refs:
    - actor: veronique
      phase_id: moral_idealism_breaks_open
      realization_step: true
      climax: true
    - actor: michel
      phase_id: cynical_pragmatist_unmasked
      realization_step: true
      climax: true

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml

  present:
    named_characters: [veronique, michel, annette, alain]

  preconditions:
    inherited_from_previous_step:
      - whiskey_in_play
      - veronique_principles_no_longer_mediated

  mandatory_beats:

    - id: veronique_blame_is_not_shared
      order: 1
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: declare_blame_is_not_shared_victim_and_criminal_not_same
        required_facts:
          - "not_shared_token: the blame is not shared"
          - "victim_and_criminal_token: the victim and the criminal are not the same"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_victim_criminal
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, principled-loud"
        tone_hint: moral_idealist_loud_and_unguarded
      forces_response_chain:
        target_actor: annette
        target_intent: register_word_criminal
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: annette_the_criminal
      order: 2
      duration_target_seconds: 2
      beat_pattern_ref: single_word_challenge
      beat_pattern_params:
        actor: annette
        challenge_target_word: criminal
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_victim_criminal
        max_words: 3
      player_status: observer_window_open

    - id: michel_oh_give_it_a_rest
      order: 3
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: tell_veronique_to_drop_idealistic_theories
        required_facts:
          - "give_it_a_rest_token: oh give it a fucking rest"
          - "idealistic_theories_token: enough of these idealistic theories"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_idealistic_theories
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, openly contemptuous"
        tone_hint: cynical_pragmatist_unmasked
      forces_response_chain:
        target_actor: veronique
        target_intent: which_i_believe_in
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: veronique_which_i_believe_in
      order: 4
      duration_target_seconds: 2
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: defend_which_i_believe_in
        required_facts: ["believe_in_token: which I believe in"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_idealistic_theories
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "three or four words, principled"
      player_status: observer_window_open

    - id: michel_sudan_sambos_outburst
      order: 5
      duration_target_seconds: 8
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: deride_veroniques_attachment_to_sudan_sambos
        required_facts:
          - "you_believe_token: yeah, you believe, you believe"
          - "sudan_sambos_token: this crush you have on these Sudan sambos"
          - "spilling_into_everything_token: is spilling over into everything"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_sudan_sambos
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "three clauses, openly despicable register"
        forbidden_drift: [amiable_softening]
        tone_hint: cynical_pragmatist_unmasked
      forces_response_chain:
        target_actor: veronique
        target_intent: how_can_you_be_so_openly_despicable
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: veronique_horrified_openly_despicable
      order: 6
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: state_horrified_how_can_you_be_so_openly_despicable
        required_facts:
          - "horrified_token: I am horrified"
          - "openly_despicable_token: how can you be so openly despicable"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_openly_despicable
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, raw"
      forces_response_chain:
        target_actor: michel
        target_intent: because_i_feel_like_it
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: michel_because_i_feel_like_it
      order: 7
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: own_it_because_i_feel_like_being_openly_despicable
        required_facts:
          - "because_i_feel_token: because I feel like it"
          - "feel_like_despicable_token: I feel like being openly despicable"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_openly_despicable
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, cold-flat"
      player_status: observer_window_open

    - id: veronique_one_day_youll_be_ashamed
      order: 8
      duration_target_seconds: 10
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: prophesy_one_day_youll_understand_sheer_horror
        required_facts:
          - "one_day_token: one day you will understand"
          - "sheer_horror_token: the sheer horror of what is happening in that part of the world"
          - "ashamed_inability_token: you will be ashamed of your inability to take action"
          - "nihilistic_token: of your contemptibly nihilistic attitude"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_sheer_horror
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "four clauses, sermon-loud-unguarded"
      forces_response_chain:
        target_actor: michel
        target_intent: yes_darjeeling_youre_so_wonderful_repeated
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: michel_yes_darjeeling_repeat
      order: 9
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: repeat_yes_darjeeling_youre_so_wonderful_mockingly
        required_facts:
          - "yes_darjeeling_repeat_token: yes, darjeeling, you're so wonderful"
          - "best_brightest_token: you are the best and brightest among us"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_yes_darjeeling
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, repeated cruelty"
      forces_response_chain:
        target_actor: veronique
        target_intent: yes_yes_i_am
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: veronique_yes_yes_i_am_again
      order: 10
      duration_target_seconds: 2
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: own_again_yes_i_am
        required_facts: ["yes_i_am_repeat_token: yes, yes I am"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_yes_darjeeling
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "three or four words"
      player_status: observer_window_open

    - id: annette_drinks_again_during_rant
      order: 11
      duration_target_seconds: 4
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Annette pours herself a second whiskey, then a third."
      player_status: observer_window_open

  themes_realized_here:
    - actor: veronique
      theme: darfur_book_publication_pride
      mechanism: "the principled rant ties back to her authored book"
      evidence_required: [veronique_speaks_sheer_horror_token]
      blocks_progression_if_missing: true
    - actor: veronique
      theme: sudan_devotion_overrides_room
      mechanism: "the room disappears for Veronique; she speaks as if from a podium"
      evidence_required: [veronique_speaks_nihilistic_token]
      blocks_progression_if_missing: true
    - actor: veronique
      theme: blame_is_not_shared
      mechanism: "explicit moral position stated"
      evidence_required: [veronique_speaks_not_shared_token]
      blocks_progression_if_missing: true
    - actor: veronique
      theme: victim_and_criminal_are_not_the_same
      mechanism: "explicit moral position stated"
      evidence_required: [veronique_speaks_victim_and_criminal_token]
      blocks_progression_if_missing: true
    - actor: michel
      theme: I_feel_like_being_openly_despicable
      mechanism: "open and willing register"
      evidence_required: [michel_speaks_feel_like_despicable_token]
      blocks_progression_if_missing: true
    - actor: michel
      theme: sudan_sambos_outburst
      mechanism: "racially loaded register, deliberate provocation"
      evidence_required: [michel_speaks_sudan_sambos_token]
      blocks_progression_if_missing: true

  state_changes_committed:
    - key: runtime_intelligence.veronique_voice_signature_transition_request
      to_value:
        from: openly_brittle_about_books
        to: moral_idealist_loud_and_unguarded
        ready_at_step: "030"
      commit_irreversible: false
    - key: runtime_intelligence.moral_register_now_dominant
      to_value: true
      commit_irreversible: true

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 85

  next_point:
    step_id: opening_031_spouses_vs_spouses
    handoff: "Alliances flip again into spouses-vs-spouses. Each attacks their own."
    carry_forward:
      - veronique_voice_transition_to_moral_idealist_logged
      - moral_register_dominant_irreversible
      - annette_drinking_faster
