canonical_path_step:
  sequence: 14
  id: opening_014_player_response_ripple
  path_id: goc_opening_canonical_path
  name: "014 - Player response ripple"
  mode: playable_opening_response

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
    use_fields: [plausible_actions]
  character_refs:
    - characters/veronique.yaml
    - characters/michel.yaml
    - characters/annette.yaml
    - characters/alain.yaml
  object_refs:
    - object_id: coffee_table
      source: objects/appartment_vallon/living_room/coffee_table.yaml

  theme_threads:
    - action_as_social_vote
    - alliance_signals
    - pressure_without_open_attack
  play_model:
    estimated_minutes: 3
    interaction_density: player_driven
    player_agency: "the player response determines which pressure becomes primary"

  path_point:
    response_branches:
      - if_player_softens_language_then_hosts_gain_surface_civility
      - if_player_challenges_language_then_statement_pressure_returns
      - if_player_asks_about_injury_then_body_consequence_moves_forward
      - if_player_silent_then_npcs_misread_or_fill_the_gap
      - if_player_moves_then_narrator_consequence_updates_location_state
    narrator_tasks:
      - treat_player_action_as_real_social_information
      - keep_npc_response_short_and_phase_1_appropriate
      - avoid_collapsing_branch_into_single_canonical_line
    must_not:
      - punish_silence_as_failure
      - let_npcs_override_player_action
      - jump_to_phase_2_before_substantive_disagreement

  next_point:
    step_id: opening_015_phone_exit_pressure
    handoff: "Introduce outside obligation only after the player has had room to act."
    carry_forward:
      - first_player_signal_registered
      - npc_responses_remain_civil
      - next_pressure_can_shift_to_exit_or_attention
