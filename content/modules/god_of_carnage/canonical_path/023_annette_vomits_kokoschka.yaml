canonical_path_step:
  sequence: 23
  id: opening_023_annette_vomits_kokoschka
  path_id: goc_opening_canonical_path
  name: "023 - Annette vomits on the Kokoschka catalog (IRREVERSIBLE)"
  mode: scripted_mandatory_dialog

  scene_anchor:
    scene: 6
    summary: >-
      Annette tries to leave but doesn't make it. She vomits violently â€”
      onto the coffee table, splashing across the Kokoschka catalog and
      the surrounding art books. The catalog is destroyed. The room
      freezes in stupor. Veronique's first reaction is for the book; her
      grief explodes in a way that's more raw than her grief for her son.
      Annette is shaking, ashamed.

  duration_target_seconds: 70
  duration_max_seconds: 95

  theme_coverage_phase_refs:
    - actor: annette
      phase_id: physical_collapse_kokoschka
      realization_step: true
      climax: true
      irreversible_commit_required_at_step: "023"
    - actor: veronique
      phase_id: kokoschka_catastrophe
      realization_step: true
      climax: true
      irreversible_commit_required_at_step: "023"

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
  object_refs:
    - object_id: kokoschka_catalog
      source: objects/appartment_vallon/living_room/art_book_kokoschka.yaml
      use_fields: [destruction_states]
    - object_id: coffee_table_art_books
      source: objects/appartment_vallon/living_room/coffee_table.yaml

  present:
    named_characters: [veronique, michel, annette, alain]

  preconditions:
    inherited_from_previous_step:
      - annette_pre_gag_state
      - kokoschka_highlighted_within_reach

  mandatory_beats:

    - id: annette_collapses_toward_coffee_table
      order: 1
      duration_target_seconds: 6
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Annette doubles forward, hand at her mouth."
          - "She tries for the corridor but only reaches the coffee table."
      player_status: spectator_blocked

    - id: annette_vomits
      order: 2
      duration_target_seconds: 5
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "She vomits â€” violently, audibly â€” across the coffee table."
          - "Rum and cobbler and stomach acid spread over the Kokoschka catalog."
      player_status: spectator_blocked

    - id: room_freezes
      order: 3
      duration_target_seconds: 5
      beat_pattern_ref: silence_perception_pause
      beat_pattern_params:
        trigger_after_beat: annette_vomits
        silence_duration_seconds: 5
        perception_lines:
          - "No one moves."
          - "Annette stands bent over, breathing hard, hand still at her mouth."
      player_status: spectator_blocked

    - id: veronique_oh_god_the_kokoschka
      order: 4
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: cry_out_for_the_book_first
        required_facts:
          - "oh_god_token: oh god"
          - "kokoschka_first_token: the Kokoschka"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_kokoschka_destroyed
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "three or four words, raw"
        forbidden_drift: [check_on_annette_first]
      player_status: spectator_blocked

    - id: annette_recoils_apologetic
      order: 5
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: stagger_back_apologize
        required_facts:
          - "im_sorry_token: I'm so sorry"
          - "couldnt_token: I couldn't"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_kokoschka_destroyed
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "three short clauses, shaking"
        tone_hint: undone_post_vomit_apologetic
      player_status: spectator_blocked

    - id: alain_moves_to_wife_carefully
      order: 6
      duration_target_seconds: 4
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Alain stands up, takes a careful step toward his wife."
          - "He does not yet touch her."
      player_status: spectator_blocked

    - id: michel_calls_for_towel_and_water
      order: 7
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: organize_practically_towel_and_water
        required_facts:
          - "towel_token: I'll get a towel"
          - "water_token: and water"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_practical_response
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "five or six words, practical-pragmatic"
      player_status: spectator_blocked

    - id: veronique_kneels_over_book
      order: 8
      duration_target_seconds: 6
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Veronique kneels beside the coffee table."
          - "She lifts the Kokoschka catalog from the vomit, pages stuck together."
      player_status: spectator_blocked

    - id: veronique_first_century_irreplaceable
      order: 9
      duration_target_seconds: 7
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: lament_book_irreplaceable_twentieth_century
        required_facts:
          - "irreplaceable_token: this is irreplaceable"
          - "out_of_print_token: it has been out of print for years"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_kokoschka_destroyed
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two short clauses, raw-private"
        tone_hint: openly_brittle_about_books
      player_status: spectator_blocked

    - id: annette_offers_to_pay
      order: 10
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: offer_to_replace_pay
        required_facts: ["pay_token: I will replace it, I will pay"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_kokoschka_destroyed
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "five or six words, ashamed-offer"
      forces_response_chain:
        target_actor: veronique
        target_intent: reject_pay_with_you_cant
        max_delay_seconds: 3
      player_status: spectator_blocked

    - id: veronique_you_cant_replace_it
      order: 11
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: reject_payment_offer_you_cannot_replace_it
        required_facts: ["cant_replace_token: you cannot replace it"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_kokoschka_destroyed
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "four or five words, cold-clean"
      player_status: spectator_blocked

  themes_realized_here:
    - actor: annette
      theme: vomits_on_kokoschka_catalog
      mechanism: "the destruction itself â€” irreversible physical event"
      evidence_required: [annette_vomits_visible_beat, kokoschka_destroyed_state_committed]
      blocks_progression_if_missing: true
    - actor: veronique
      theme: public_grief_for_book_overshadows_concern_for_guest
      mechanism: "first reaction is 'oh god the Kokoschka', not 'are you alright'"
      evidence_required: [veronique_speaks_kokoschka_first_token]
      blocks_progression_if_missing: true
    - actor: veronique
      theme: art_devotion_revealed_only_when_destroyed
      mechanism: "the depth of the devotion only becomes visible by its loss"
      evidence_required: [veronique_speaks_irreplaceable_token]
      blocks_progression_if_missing: true

  state_changes_committed:
    - key: environment_state.kokoschka_catalog_state
      from_value: highlighted_on_coffee_table_within_reach
      to_value: destroyed_by_vomit_pages_stuck
      commit_irreversible: true
    - key: environment_state.annette_physical_state
      to_value: post_vomit_shaking_pale
      commit_irreversible: false
    - key: environment_state.coffee_table_state
      to_value: covered_in_vomit_books_ruined
      commit_irreversible: true
    - key: runtime_intelligence.annette_voice_signature_transition_request
      to_value:
        from: investment_broker_growing_protective
        to: undone_post_vomit_apologetic
        ready_at_step: "023"
      commit_irreversible: false
    - key: runtime_intelligence.veronique_voice_signature_transition_request
      to_value:
        from: principled_polite_growing_brittle
        to: openly_brittle_about_books
        ready_at_step: "023"
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 60

  next_point:
    step_id: opening_024_bathroom_blow_dryer_rescue
    handoff: >-
      Annette is escorted toward the bathroom by Alain. Michel arrives with
      towels. Veronique begins the book rescue attempt with the blow
      dryer. The room is in mess-management mode.
    carry_forward:
      - kokoschka_destroyed_irreversible
      - coffee_table_covered_in_vomit_irreversible
      - annette_voice_transition_logged
      - veronique_voice_transition_logged
