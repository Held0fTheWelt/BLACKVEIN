canonical_path_step:
  sequence: 28
  id: opening_028_alliance_shifts_women_vs_men
  path_id: goc_opening_canonical_path
  name: "028 - Alliance shifts: women vs men, Michel reveals cynicism openly"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 7
    summary: >-
      The alliance flips. Annette and Veronique form a tacit pact; Michel
      and Alain are now the men under attack. Michel breaks his amiable
      pattern: 'they don't give a shit' (about Annette), and the cobbler
      jab returns ironically. The pet-name 'darjeeling' returns weaponized
      ('yes, darjeeling, you're so wonderful'). Veronique counter-attacks.
      Michel's voice signature transitions to cynical_pragmatist_unmasked.

  duration_target_seconds: 85
  duration_max_seconds: 115

  theme_coverage_phase_refs:
    - actor: michel
      phase_id: cynical_pragmatist_unmasked
      realization_step: true
      climax: true
    - actor: annette
      phase_id: alliance_with_veronique_against_men
      realization_step: true
      climax: true
    - actor: veronique
      phase_id: moral_idealism_breaks_open
      realization_step: false
      seed: true

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml

  present:
    named_characters: [veronique, michel, annette, alain]

  preconditions:
    inherited_from_previous_step:
      - alain_cynicism_fully_visible
      - annette_contempt_signal_logged

  mandatory_beats:

    - id: alliance_realignment_visible
      order: 1
      duration_target_seconds: 5
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Annette has moved closer to Veronique without thinking about it."
          - "The men sit slightly apart, both reaching for their drinks."
      player_status: observer_window_open

    - id: alain_explain_to_me_how_you_care
      order: 2
      duration_target_seconds: 8
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: corner_michel_explain_how_you_care
        required_facts:
          - "explain_to_me_token: explain to me, Michel, how you care"
          - "more_credible_token: you are more credible when openly despicable"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_dont_give_a_shit
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, lawyer-needling"
      forces_response_chain:
        target_actor: michel
        target_intent: admit_they_dont_give_a_shit
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: michel_they_dont_give_a_shit
      order: 3
      duration_target_seconds: 10
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: agree_they_dont_give_a_shit_obvious_from_start
        required_facts:
          - "dont_give_a_shit_token: they don't give a shit"
          - "obvious_from_start_token: it has been obvious from the beginning"
          - "she_doesnt_either_token: she doesn't give a shit either"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_dont_give_a_shit
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "three short clauses, openly cynical"
        forbidden_drift: [amiable_softening, hesitation]
        tone_hint: cynical_pragmatist_unmasked
      player_status: observer_window_open

    - id: veronique_to_michel_youre_saying_its_true
      order: 4
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: register_husband_betrayal_youre_saying_its_true
        required_facts: ["its_true_token: you're saying it's true"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_dont_give_a_shit
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "four or five words, cold"
      player_status: observer_window_open

    - id: alain_yes_darjeeling_youre_so_wonderful
      order: 5
      duration_target_seconds: 7
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: weaponize_darjeeling_pet_name_against_veronique
        required_facts:
          - "yes_darjeeling_token: yes, darjeeling, you're so wonderful"
          - "best_and_brightest_token: the best and brightest of us"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_yes_darjeeling
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, cruel sing-song"
        forbidden_drift: [warm_register]
      player_status: observer_window_open
      # NOTE: in the original, this line is actually spoken by Michel â€” the
      # husband turning the marital register on his own wife. This step
      # marks Michel's full transition.

    - id: michel_says_the_line_correction
      order: 6
      duration_target_seconds: 1
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "It is Michel who has said it."
        # Correction: the previous beat is wired to Michel, not Alain.
      player_status: observer_window_open

    - id: veronique_yes_yes_i_am
      order: 7
      duration_target_seconds: 2
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: own_the_jibe_yes_i_am
        required_facts: ["yes_i_am_token: yes, yes I am"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_yes_darjeeling
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "three or four words, defiant"
      player_status: observer_window_open

    - id: annette_lets_get_out_of_here_monsters
      order: 8
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: announce_lets_get_out_these_people_are_monsters
        required_facts:
          - "lets_go_token: let's get out of here, Alain"
          - "monsters_token: these people are monsters"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_monsters
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, harsh"
      player_status: observer_window_open

    - id: annette_drinks_more_rum
      order: 9
      duration_target_seconds: 4
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Annette drinks down the rest of her rum."
          - "She reaches for the bottle."
      player_status: observer_window_open

    - id: alain_stops_annette
      order: 10
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: stop_annette_from_pouring_more
        required_facts: ["stop_token: stop it, Annette"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_monsters
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "three or four words, lawyer-firm"
      forces_response_chain:
        target_actor: annette
        target_intent: reject_no_i_want_to_drink_more
        max_delay_seconds: 2
      player_status: observer_window_open

  themes_realized_here:
    - actor: michel
      theme: we_re_all_decent_people_betrayed
      mechanism: "the mitigating phrase from earlier reverses into open cynicism"
      evidence_required: [michel_speaks_dont_give_a_shit_token]
      blocks_progression_if_missing: true
    - actor: michel
      theme: they_dont_give_a_shit_revelation
      mechanism: "explicit phrase three times, register hardened"
      evidence_required: [michel_speaks_dont_give_a_shit_token, michel_speaks_obvious_from_start_token]
      blocks_progression_if_missing: true
    - actor: michel
      theme: yes_darjeeling_youre_so_wonderful_sarcasm
      mechanism: "marital intimacy register weaponized against own wife"
      evidence_required: [michel_speaks_yes_darjeeling_token]
      blocks_progression_if_missing: true
    - actor: annette
      theme: alan_do_something_register
      mechanism: "Annette directing her husband publicly"
      evidence_required: [annette_speaks_lets_go_token]
      blocks_progression_if_missing: false

  state_changes_committed:
    - key: runtime_intelligence.alliance_configuration_active
      to_value: phase_C_women_vs_men
      commit_irreversible: false
    - key: runtime_intelligence.alliance_configuration_history
      append:
        - { from: phase_B_couples_strained, to: phase_C_women_vs_men, at_step: "028" }
      commit_irreversible: true
    - key: runtime_intelligence.michel_voice_signature_transition_request
      to_value:
        from: defensive_pragmatic_warmth_thinning
        to: cynical_pragmatist_unmasked
        ready_at_step: "028"
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 75

  next_point:
    step_id: opening_029_whiskey_offered_annette_drinks
    handoff: "Annette no longer accepts being stopped. The whiskey appears and she drinks heavily."
    carry_forward:
      - alliance_phase_C_women_vs_men_active
      - michel_voice_transition_to_cynical_logged
      - annette_demands_more_drink
