    - id: alain_starts_picking_up_phone_pieces
      order: 4
      duration_target_seconds: 6
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Alain begins gathering the pieces of his phone case from the coffee table."
          - "Annette stands in his way."
      player_status: observer_window_open

    - id: annette_stand_up_for_me
      order: 5
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: demand_alain_stand_up_for_her
        required_facts:
          - "stand_up_token: stand up for me"
          - "why_dont_you_token: why don't you stand up for me"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_stand_up_for_me
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, drunken-loud"
        tone_hint: drunk_unleashed_destructive
