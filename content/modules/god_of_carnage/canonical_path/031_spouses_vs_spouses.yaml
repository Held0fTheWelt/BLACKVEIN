      blocks_progression_if_missing: true
    - actor: veronique
      theme: where_do_you_get_off_spouting_opinions
      mechanism: "explicit counter, screaming register"
      evidence_required: [veronique_speaks_where_off_token]
      blocks_progression_if_missing: true

  state_changes_committed:
