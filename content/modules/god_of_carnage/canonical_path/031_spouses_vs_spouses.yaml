        max_delay_seconds: 2
      player_status: observer_window_open

    - id: alain_lets_go
      order: 6
      duration_target_seconds: 2
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: tell_wife_lets_go
        required_facts: ["lets_go_token: let's go"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_stand_up_for_me
