canonical_path:
  id: goc_canonical_path
  authority: module_authorial_path
  authoring_language: en
  primary_direction_surface: true
  schema_ref: _schema.yaml
  theme_coverage_map_ref: theme_coverage_map.yaml
  beat_library_ref: ../direction/beat_library/

  note: >-
    The canonical path is the numbered story spine for the God of Carnage
    opening. It directs sequence, beats, NPC speech, and narrator perception.
    Location, object, and character facts are pulled by reference from
    locations/, objects/, characters/.

  reference_policy:
    location_facts_live_under: locations/
    object_facts_live_under: objects/
    character_facts_live_under: characters/
    quote_anchors_live_under: knowledge/opening_quote_anchors.yaml
    beat_patterns_live_under: ../direction/beat_library/
    steps_must_reference_location_files: true
    steps_must_not_duplicate_location_descriptions: true
    steps_must_declare_scene_anchor: true

  paths:
    opening:
      id: goc_opening_canonical_path
      title: "Opening canonical path: prologue through act-one terminal/handoff"
      first_step_id: opening_001_parc_montsouris_edge
      first_playable_step_id: opening_004_den_arrival_positioning
      minimum_play_duration_minutes: 25
      target_play_duration_minutes: 40

