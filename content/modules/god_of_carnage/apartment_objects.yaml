# Object-level structured knowledge — English module truth; ids align with scene affordances.

apartment_objects:
  authoring_language: en
  default_placement_room_id: vallon_living_room
  objects:
    - id: window
      placement_room_id: vallon_living_room
      materiality: "Large sash window onto the street; cool glass, city hum beyond."
      interaction_notes:
        look_at: "Perception-only; does not change social geometry."
      risk_tags: []
      symbolic_roles:
        - exposure_surface
        - departure_surface

    - id: television
      placement_room_id: vallon_living_room
      materiality: "Flat panel in a corner; reflective black when off."
      interaction_notes:
        activate: "State change object; may redirect attention from dialogue."
        deactivate: "Restores quiet domestic baseline."
      risk_tags:
        - attention_diversion
      symbolic_roles:
        - attention_diversion
        - status_surface

    - id: dining_table
      placement_room_id: vallon_living_room
      materiality: "Central furniture; plates, glasses, moral geography of seating."
      interaction_notes: {}
      risk_tags:
        - territorial_anchor
      symbolic_roles:
        - territorial_anchor
        - hospitality_surface

    - id: apartment_door
      placement_room_id: building_stairwell
      materiality: "Apartment door between common building space and the living room threshold."
      interaction_notes:
        open: "Entry or exit must stay tied to scene pressure."
      risk_tags:
        - exit_pressure
      symbolic_roles:
        - threshold_surface
        - departure_surface

    - id: hallway_doors
      placement_room_id: hallway
      materiality: "A tight run of interior doors: kitchen, bathroom, pantry, study, and two locked bedrooms."
      interaction_notes:
        look_at: "Clarifies topology without granting access to locked rooms."
      risk_tags:
        - privacy_boundary
      symbolic_roles:
        - privacy_boundary
        - withheld_space

    - id: coffee_machine
      placement_room_id: kitchen
      materiality: "Domestic machine and cups; hospitality becomes mechanism."
      interaction_notes:
        activate: "May redirect attention into service ritual."
        deactivate: "Restores the kitchen's quieter baseline."
      risk_tags:
        - attention_diversion
      symbolic_roles:
        - hospitality_surface

    - id: glasses
      placement_room_id: kitchen
      materiality: "Clean glasses and faint clinks from the attached kitchen."
      interaction_notes:
        take: "Minor service object only; no weaponization without authored escalation."
      risk_tags:
        - fragile_hospitality
      symbolic_roles:
        - hospitality_surface

    - id: bathroom_mirror
      placement_room_id: bathroom
      materiality: "A private reflective surface that gives distance without new information."
      interaction_notes:
        look_at: "Perception-only; does not reveal offscreen dialogue."
      risk_tags:
        - isolation
      symbolic_roles:
        - self_exposure_surface

    - id: pantry_shelves
      placement_room_id: pantry
      materiality: "Narrow shelves and domestic stores, useful only at minor scale."
      interaction_notes:
        take: "Minor service item only; no major plot object may be discovered here."
      risk_tags:
        - minor_storage
      symbolic_roles:
        - domestic_order

    - id: study_desk
      placement_room_id: study
      materiality: "Private work surface with papers and household order."
      interaction_notes:
        look_at: "May establish privacy pressure."
        open: "Private documents require a scene gate."
      risk_tags:
        - privacy_boundary
      symbolic_roles:
        - private_order
