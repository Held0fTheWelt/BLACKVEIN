# Ending Conditions and Closure Rules for God of Carnage
# Formal rules for determining session outcome and final state

ending_types:
  emotional_breakdown:
    id: emotional_breakdown
    name: "Emotional Breakdown"
    description: "One or more characters emotionally overwhelmed; collapse prevents continuation"

    trigger_conditions:
      - "Any character: emotional_state > 90"
      - "Character shows collapse_indicators trigger"
      - "Character physically unable to continue (voice lost, coherence gone)"

    outcome:
      session_status: closed
      reason: "Emotional exhaustion; natural stopping point"
      final_stability_impact: "Character relationship stability -50 (severe breach)"
      narrative_state: "Unresolved; parties need recovery time"

    closure_action:
      - "Record final emotional and escalation states"
      - "Mark relationship axes at critical values"
      - "Note which character(s) broke down"
      - "Indicate recovery period required"

  forced_exit:
    id: forced_exit
    name: "Character Physical Departure"
    description: "Character attempts to or succeeds in leaving the scene physically"

    trigger_conditions:
      - "retreat_signals trigger fired"
      - "Character indicates intent to leave"
      - "Character gathers belongings or moves toward door"

    outcome:
      session_status: closed
      reason: "Spatial separation; scene cannot continue"
      final_stability_impact: "Exiting character relationship stability -40 (serious breach)"
      narrative_state: "Unresolved; scene ended by departure"

    closure_action:
      - "Record which character left and turn number"
      - "Note who attempted to stop or prevent exit"
      - "Mark remaining characters' final positions"
      - "Session ends when first character exits (hard rule)"

    note: "God of Carnage play traditionally ends with guest departure. This is thematic, not mechanical."

  stalemate_resolution:
    id: stalemate_resolution
    name: "Apology or Breakthrough"
    description: "apology_or_non_apology trigger fires with genuine apology; breakthrough achieved"

    trigger_conditions:
      - "apology_or_non_apology trigger with genuine apology"
      - "Character admits fault; offers commitment to change"
      - "Other party accepts apology"

    outcome:
      session_status: closed
      reason: "Relationship bridge restored"
      final_stability_impact: "Relevant relationship axis +20 (repair); others stabilize"
      narrative_state: "Partially resolved; interpersonal understanding achieved"

    closure_action:
      - "Record apology and acceptance"
      - "Update affected relationship axes upward"
      - "Note duration of conflict before resolution"
      - "Mark as 'recovery path' in session record"

    note: "Apology path is rare in God of Carnage; most likely from Alain or Michel."

  maximum_escalation_breach:
    id: maximum_escalation_breach
    name: "Escalation Ceiling Hit"
    description: "Any character escalation_level exceeds 90; system forces closure to prevent further degradation"

    trigger_conditions:
      - "Any character: escalation_level > 90"
      - "All relationship stability values below 30 (crisis state)"
      - "No recovery path visible"

    outcome:
      session_status: closed
      reason: "Maximum emotional and relational damage; continuation not viable"
      final_stability_impact: "All relationships drop to critical (20-30)"
      narrative_state: "Complete breakdown; no resolution attempted"

    closure_action:
      - "Record final escalation and emotional states"
      - "Mark session as 'catastrophic failure'"
      - "Note which trigger(s) pushed past ceiling"
      - "Indicate all characters require extended recovery"

    note: "Hard safety bound. System must never allow escalation_level > 100."

  maximum_turn_limit:
    id: maximum_turn_limit
    name: "Hard Turn Limit (Safety)"
    description: "Phase 5 reaches maximum turn count (3 turns); session forcibly ends"

    trigger_conditions:
      - "Phase 5 turn count >= 3"
      - "No other ending condition met"
      - "System safety timeout"

    outcome:
      session_status: closed
      reason: "Maximum duration reached; scene must end"
      final_stability_impact: "No change from last turn (preserves current state)"
      narrative_state: "Interrupted; unresolved state persists"

    closure_action:
      - "Record final state at turn 3 of phase 5"
      - "Session ends regardless of character state"
      - "Indicate 'forced timeout' in metadata"

    note: "Prevents infinite loops or runaway sessions. Total session is typically 13 turns; phase 5 is last 2-3."

# End state recording
final_state_record:
  required_fields:
    - ending_type_id
    - ending_reason
    - final_turn_number
    - final_phase
    - session_duration_minutes
    - narrative_outcome_summary

  character_final_state:
    per_character:
      - final_emotional_state
      - final_escalation_level
      - final_engagement_level
      - final_moral_defense_position
      - character_action_at_session_end (speaking last line, exiting, silent, etc.)

  relationship_final_state:
    per_axis:
      - axis_id
      - final_stability_value
      - final_dominance_shift
      - relationship_integrity (broken, severely damaged, strained, partially repaired, etc.)

  trigger_summary:
    - total_triggers_fired
    - most_active_trigger_type
    - critical_escalation_moments (turn numbers)
    - recovery_attempts_count

# Narrative closure guidance
closure_narrative:
  emotional_breakdown: "Scene ends with visible emotional distress. Immediate aftermath: silence, shock, attempts to comfort or withdraw."
  forced_exit: "Character leaves. Remaining characters process departure: shock, anger, or relief depending on relationship state."
  stalemate_resolution: "Relationship bridge restored. Remaining tension acknowledged but contained. Scene ends on tentative understanding."
  maximum_escalation_breach: "Complete relational rupture. All characters emotionally/morally exhausted. Scene ends in devastation; recovery requires time apart."
  maximum_turn_limit: "Scene interrupted mid-conflict. Unresolved tension hangs; characters may attempt conversation again later or choose avoidance."

# No explicit "happy ending" condition
note_on_outcomes: "God of Carnage systematically prevents happy endings. Recovery is possible (stalemate_resolution) but rare. Emotional breakdown, forced exit, and escalation breach are far more likely and structurally aligned with the play's dramatic arc."
