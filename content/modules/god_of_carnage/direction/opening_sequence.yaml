# Session opening handover — God of Carnage (runtime-facing summary)
# Human-editable opening brief lives in direction/opening.md.
# Product contract: docs/ADR/adr-0035-story-opening-economy-and-warmup.md
# Dramaturgic reference (licensed where applicable): resources/carnage-2011.pdf
#
# Machine-oriented opening blueprint (narration_mode, hard prohibitions, narrative_events) lives in
# knowledge/opening_scene_sequence.yaml and knowledge/hard_forbidden_rules.yaml (English module truth).

opening_sequence_version: "1.1.0"
module_id: god_of_carnage
setting_anchor: "Paris park edge prologue into a Paris apartment, evening — hosts and guests meet over the incident between their children"

# Two movements before phase_1 “polite table” dialogue accelerates.
# Each part may map to one or more typed scene blocks (narrator / actor_line / actor_action)
# so the player shell can hand over attention block-by-block (ADR-0034 typewriter policy).

parts:
  part_1_background_and_premise:
    id: opening_part_1
    title: "Background / shared premise"
    dramaturgic_job: |
      Show the incident that forces this meeting as a brief scenic prologue at the edge of a
      Paris park: a dozen boys around a basketball court under a gray autumn sky, bare trees,
      a playground and bicycles nearby. Two boys play, argue, and separate; one takes a stick,
      turns back when the other calls after him, strikes, then leaves while the others help the
      injured boy and shout after him. Let the audience feel the gap between child-world
      bluntness and the adult appointment — without yet turning the apartment into a courtroom
      in direct speech.
    paris_module_notes: |
      Open with the park/basketball-court incident, then the apartment; keep the Reza spine —
      bourgeois parents laundering violence through procedure — not a generic "conflict
      resolution meeting." The incident is not a vague schoolyard rumor: it has weather,
      objects, witnesses, a stick, a bicycle kicked over, and a boy disappearing from view.
    suggested_block_emphasis:
      - "narrator — sensory and factual restraint; no omniscient moral verdict"
      - "narrator — concrete exterior image: park edge, basketball court, playground, bicycles, autumn sky"
      - "actor_action — the stick, the strike, the injured boy folding, the bicycle kicked over"
      - "optional environment_interaction — objects that carry the weight (coat, phone, papers)"
    narrator_bar:
      must: |
        Complete imagination (space, weather of mood, social temperature) at hinge moments.
      must_not: |
        Repeat verbatim what a dialogue block just said; restate no obvious stage business.
    npc_speech:
      must_not: |
        Accusatory or prosecutorial lines; no “X reacts immediately” attack dialogue.
        Do not have Alain perform primary host-of-the-house welcome (that footing is
        Véronique/Michel); he remains a guest alongside Annette.
      may: |
        Minimal ritual (greeting, apology formula deferred, procedural agreement) if it
        stays non-inflammatory.

  part_2_into_the_scene:
    id: opening_part_2
    title: "Into the room — ritual civility"
    dramaturgic_job: |
      Land the Paris living room: who hosts, who sits, the art books and tulips that advertise
      culture, the espresso machine, the dessert that will later become a weapon of manners.
      The four are trapped in politeness; let the last beat be a trapdoor into play (a
      glance, a poured cup, a sentence left unfinished) — not an opening salvo from Véronique
      or a prosecutorial line from Annette.
    suggested_block_emphasis:
      - "narrator — spatial completion, rhythm, subtext the staging implies"
      - "actor_action — seating, pouring, avoiding eye contact"
      - "actor_line — polite formula, small talk, oblique reference to the children only"
    narrator_bar:
      must: |
        Support the player’s mental staging; favour concrete sensual detail over abstract
        character essays.
      must_not: |
        Name every relationship axis or summarise the whole evening’s arc before play.
        Do not offload all character speech and blocking into one narrator “novel paragraph”;
        keep dialogue and gesture in their own per-person / per-beat channels so the shell can
        render typed transcript cards.

# Canonical fact seeds (non-dialogue); generation may adapt wording; do not contradict runtime.
premise_fact_seeds:
  - "At the edge of a Paris park, near a basketball court, two boys argued; one took a stick, struck the other, and left while other boys helped the injured child."
  - "The exterior prologue includes a gray autumn sky, bare trees, a playground, bicycles, and a small group of boys calling after one another."
  - "The hosts feel a written or agreed account of the facts may be necessary; guests may want to leave quickly."
  - "Everyone is performing civility while already judging the other side."

# Link to formal phase once opening handover completes
handover_to_scene_phase: phase_1
