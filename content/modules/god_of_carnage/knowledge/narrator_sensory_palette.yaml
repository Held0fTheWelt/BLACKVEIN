# English-authored sensory selection scaffolding for narrator / scene director.
# Room and object detail is referenced from locations/; this file does not own
# place descriptions.

narrator_sensory_palette:
  authoring_language: en
  modularity_policy_ref: knowledge/modularity_policy.yaml

  global_mood:
    opening: "civility_over_pressure"
    mid_tension: "ritual_objects_under_strain"
    late_breakdown: "control_surface_failing"

  rooms:
    building_hallway:
      ambient_ref:
        source: locations/building/building_hallway.yaml
        fields: [description, sensory_tags]
    building_stairwell:
      ambient_ref:
        source: locations/building/building_stairwell.yaml
        fields: [description, sensory_tags]
    living_room:
      ambient_ref:
        source: locations/appartment_vallon/living_room.yaml
        fields: [description, sensory_tags]
    hallway:
      ambient_ref:
        source: locations/appartment_vallon/hallway.yaml
        fields: [description, sensory_tags]
    kitchen:
      ambient_ref:
        source: locations/appartment_vallon/kitchen.yaml
        fields: [description, sensory_tags]
    bathroom:
      ambient_ref:
        source: locations/appartment_vallon/bathroom.yaml
        fields: [description, sensory_tags]
    pantry:
      ambient_ref:
        source: locations/appartment_vallon/pantry.yaml
        fields: [description, sensory_tags]
    study:
      ambient_ref:
        source: locations/appartment_vallon/study.yaml
        fields: [description, sensory_tags]

  objects:
    window:
      glance_ref:
        source: objects/appartment_vallon/living_room/window.yaml
        fields: [description, sensory_tags]
    television:
      glance_ref:
        source: objects/appartment_vallon/living_room/television.yaml
        fields: [description, sensory_tags]
