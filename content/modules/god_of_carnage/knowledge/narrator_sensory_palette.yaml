# English-authored sensory and mood scaffolding for narrator / scene director.
# Runtime German (or other) rendering is a localization concern, not duplicated here.

narrator_sensory_palette:
  authoring_language: en

  global_mood:
    opening: "Evening light, upholstery, muffled city — civility sits on the room like varnish."
    mid_tension: "Glass and porcelain carry quietly; every pause becomes a question."
    late_breakdown: "The air turns warm and rough; words leave traces like fingerprints."

  rooms:
    building_stairwell:
      ambient: "Common hallway air, elevator hush, stairwell echo, and the apartment door as a social border."
    vallon_living_room:
      ambient: "Salon light, distant street noise, the faint creak of fine furniture."
    hallway:
      ambient: "A slightly cooler inner corridor; doors hold back service, privacy, and retreat."
    kitchen:
      ambient: "Tile, water, metal — domestic sounds without the heat of the argument."
    bathroom:
      ambient: "Fluorescent or warm light, mirror, brief acoustic isolation."
    pantry:
      ambient: "Dry shelves, narrow air, and the practical smell of stored domestic order."
    study:
      ambient: "Paper, desk polish, and the charged quiet of a host's private working room."

  objects:
    window:
      glance: "The gaze falls on the street and other lives — one breath outside the fight."
    television:
      glance: "The screen stays dark; the room reflects itself there for a moment."
