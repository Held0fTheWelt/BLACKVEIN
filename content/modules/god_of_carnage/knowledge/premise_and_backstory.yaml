# Canonical premise and backstory — English-authored module truth.
# Localized player/runtime prose belongs under locale/ and session_output_language.

premise_and_backstory:
  authoring_language: en

  module_premise: >-
    Two couples meet to resolve, with civility, a playground injury between their sons;
    politeness decays into moral accusation and relational collapse.

  canonical_facts:
    - id: playground_incident
      fact: >-
        At the edge of Parc Montsouris, near the Boulevard Jourdan basketball court, two boys
        argued; one grabbed a stick, struck the other, kicked over a bicycle as he left, and
        the surrounding boys helped the injured child up while calling after him.
      authority: canonical_module
      player_visibility: public_diegetic
      subtext: "Each family protects its self-image as competent parents."

    - id: park_prologue_environment
      fact: >-
        The remembered prologue carries ordinary public details: gray autumn sky, bare trees,
        sloping lawns, winding paths, a playground, bicycles, boys clustered at the edge of play,
        and background Paris life near the Cité Universitaire/RER edge of the park.
      authority: canonical_module
      player_visibility: public_diegetic
      subtext: "The violence is small in scale but public enough that no family can keep it private."

    - id: host_guest_asymmetry
      fact: >-
        Hosts control hospitality resources; guests carry an obligation to restraint — until they
        do not.
      authority: canonical_module
      player_visibility: public_diegetic
      subtext: "Power oscillates with shame, debt, and who claims the moral high ground."

    - id: marriage_pressure_cooker
      fact: "Each marriage is on display; alliances can invert within minutes."
      authority: canonical_module
      player_visibility: implied
      subtext: >-
        Spouses may punish each other for humiliation suffered in front of the other couple.

  non_canonical_player_invention_policy: >-
    Players may propose new micro-details; the engine must not treat them as backstory truth
    until committed under governance.
