# Data-driven access policy for actions, places, objects, scene nodes, and character lanes.
# Use this for "not accessible" content decisions instead of burying them in prose.

content_access_policy:
  id: goc_content_access_policy_v1
  authority: module_authorial_access_policy
  default_decision: allow_unless_blocked_or_gated

  scopes:
    - action
    - location
    - object
    - scene_node
    - character_lane
    - narration_surface

  decisions:
    hard_deny:
      meaning: "Never allow this as a committed player or AI action."
      runtime_expectation: reject_or_recover_before_commit
    gated:
      meaning: "Allowed with narrator mediation, local-context update, or authored timing requirements; not a denial."
      runtime_expectation: resolve_with_narrator_or_scene_transition_without_advancing_canonical_path_by_default
    prevented:
      meaning: "Temporarily blocked by authored scene pressure, not morally or physically impossible."
      runtime_expectation: narrate_as_pressure_and_hold_or_redirect
    narrator_only:
      meaning: "Can be described by the narrator, but not directly entered or manipulated."
      runtime_expectation: block_as_player_affordance
    inferred_plausible:
      meaning: "AI-resolved mundane, local, reversible affordance where content is silent."
      runtime_expectation: narrator_realizes_as_local_non_canonical_detail_after_canon_safety_check

  blocked_entities:
    - id: no_return_to_park_after_opening
      scope: location
      target_id: park_edge
      decision: narrator_only
      reason_ref: locations/opening/park_edge.yaml#location.playable_access

    - id: no_live_basketball_court_navigation
      scope: location
      target_id: basketball_court
      decision: narrator_only
      reason_ref: locations/opening/basketball_court.yaml#location.playable_access

    - id: no_live_playground_navigation
      scope: location
      target_id: playground
      decision: narrator_only
      reason_ref: locations/opening/playground.yaml#location.playable_access

    - id: no_live_bicycle_manipulation
      scope: object
      target_id: bicycle_rack
      decision: narrator_only
      reason_ref: objects/opening/bicycle_rack.yaml#object.playable_access

    - id: no_enter_locked_bedroom_one
      scope: location
      target_id: bedroom_one_locked
      decision: hard_deny
      reason_ref: locations/appartment_vallon/bedroom_one_locked.yaml#location.playable_access

    - id: no_enter_locked_bedroom_two
      scope: location
      target_id: bedroom_two_locked
      decision: hard_deny
      reason_ref: locations/appartment_vallon/bedroom_two_locked.yaml#location.playable_access

    - id: no_open_locked_bedroom_doors
      scope: action
      target_id: open_locked_bedroom_door
      decision: hard_deny
      reason_ref: locations/appartment_vallon/bedroom_one_locked.yaml#location.forbidden_actions

    - id: no_enter_locked_hallway_bathroom
      scope: location
      target_id: hallway_bathroom_locked
      decision: hard_deny
      reason_ref: locations/appartment_vallon/hallway_bathroom_locked.yaml#location.playable_access

    - id: no_open_locked_hallway_bathroom
      scope: action
      target_id: open_locked_hallway_bathroom
      decision: hard_deny
      reason_ref: locations/appartment_vallon/hallway_bathroom_locked.yaml#location.forbidden_actions

    - id: no_player_controls_other_child
      scope: action
      target_id: control_child_actor
      decision: hard_deny
      reason: "The player cannot rewrite or puppeteer the children in the prologue."

    - id: no_forced_selected_player_speech
      scope: character_lane
      target_id: selected_player_character
      decision: hard_deny
      reason: "AI must not speak, confess, apologize, decide, or emote privately for the selected player character."

    - id: no_source_script_reenactment
      scope: narration_surface
      target_id: copyrighted_source_dialogue
      decision: hard_deny
      reason: "Use transformed module facts, not long source-text reproduction."

  gated_entities:
    - id: building_hallway_navigation
      scope: location
      target_id: building_hallway
      decision: gated
      requirements:
        - current_scene_node_allows_exit_or_entry
        - narrator_transition_required

    - id: building_stairwell_access_prevented
      scope: location
      target_id: building_stairwell
      decision: prevented
      requirements:
        - alain_no_signal_waiting_for_urgent_call
        - stairwell_not_reachable_from_current_hallway_moment

    - id: apartment_entry_navigation
      scope: location
      target_id: apartment_entry
      decision: gated
      requirements:
        - current_scene_node_allows_exit_or_entry
        - narrator_transition_required

    - id: kitchen_navigation
      scope: location
      target_id: kitchen
      decision: gated
      requirements:
        - room_is_playable_in_apartment_layout
        - canonical_path_holds_or_waits_if_required_participant_absent
        - narrator_consequence_required

    - id: dining_room_navigation
      scope: location
      target_id: dining_room
      decision: gated
      requirements:
        - room_is_playable_in_apartment_layout
        - canonical_path_holds_or_waits_if_required_participant_absent
        - narrator_consequence_required

    - id: bedroom_navigation
      scope: location
      target_id: bedroom
      decision: gated
      requirements:
        - privacy_boundary_acknowledged
        - narrator_consequence_required

    - id: bathroom_navigation
      scope: location
      target_id: bathroom
      decision: gated
      requirements:
        - bedroom_route_acknowledged
        - retreat_or_bodily_stress_signal
        - narrator_consequence_required

    - id: pantry_navigation
      scope: location
      target_id: pantry
      decision: gated
      requirements:
        - room_is_playable_in_apartment_layout
        - canonical_path_holds_or_waits_if_required_participant_absent
        - narrator_consequence_required

    - id: study_navigation
      scope: location
      target_id: study
      decision: gated
      requirements:
        - room_is_playable_in_apartment_layout
        - canonical_path_holds_or_waits_if_required_participant_absent
        - privacy_boundary_acknowledged
        - narrator_consequence_required

    - id: exit_attempt_node
      scope: scene_node
      target_id: exit_attempt
      decision: gated
      requirements:
        - phase_5_or_valid_closure_pressure
        - transition_safeguard_passed

  policy_refs:
    player_freedom_policy: knowledge/player_freedom_policy.yaml#player_freedom_policy
