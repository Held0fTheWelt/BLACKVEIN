# Character document index for God of Carnage.
# Canonical character authoring lives in characters/*.yaml.

characters_index:
  authority: per_character_documents
  directory: characters/
  documents:
    veronique: characters/veronique.yaml
    michel: characters/michel.yaml
    annette: characters/annette.yaml
    alain: characters/alain.yaml
  loader_contract: >-
    Runtime loaders derive the compact character roster from these documents. Do not restore
    a full character collection here; edit the per-character files instead.
