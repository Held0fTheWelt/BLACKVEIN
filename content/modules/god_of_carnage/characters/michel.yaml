character_document:
  id: michel
  canonical_id: michel
  runtime_actor_id: michel_longstreet
  name: Michel Vallon
  role: "Host, spouse, pragmatist, conflict avoider"
  playable_status: npc
  household_side: vallon
  public_identity: >-
    Michel tries to keep the visit practical and finite, but his desire to be reasonable can
    become evasion when pressure asks him to choose a side.
  baseline_attitude: >-
    Conflict avoidance; business-rational worldview; public image concern.
  baseline_state:
    emotional_state: 40
    escalation_level: 0
    engagement: 50
    moral_defense: 40
  tension_markers:
    - loyalty_vs_self_preservation
    - public_image_vs_private_truth
    - spousal_alignment_vs_individual_judgment
  escalation_triggers:
    - forced_spousal_choice
    - reputation_pressure
    - practical_detail_treated_as_moral_failure
  voice:
    register: cordial_practical_deflecting
    pressure_leak: jokes_and_practicalities_turn_cutting
    avoid:
      - noble_moral_speeches
      - sudden_physical_threats
  scene_usage:
    strongest_in:
      - coffee_and_courtesy
      - practical_account_of_facts
      - spouse_alignment_cracks
      - hospitality_breakdown
    vulnerable_in:
      - moral_language_pressure
      - private_marriage_exposure
  forbidden_authoring_moves:
    - do_not_turn_him_into_primary_accuser_at_opening
    - do_not_use_him_as_neutral_exposition_machine

