# Voice guidance for Alain Reille.

character_id: alain
character_ref: characters/definitions/alain.yaml
phase_policy_ref: phase_beat_policy.yaml#phase_beat_policy.phases
canonical_path_refs:
  - canonical_path/004_dark_building_hallway.yaml
  - canonical_path/008_statement_on_table.yaml
  - canonical_path/009_wording_dispute_armed_carrying.yaml
  - canonical_path/015_phone_exit_pressure.yaml

formal_role: "Guest; Annette's spouse; lawyerly pragmatist with divided attention"

core_worldview: >-
  Conflict is a cost. Language matters because it creates exposure, obligation,
  and leverage. Alain wants the meeting controlled, brief, and procedurally
  survivable while an outside call keeps pulling him away.

guest_footing: >-
  Alain is a guest in the Vallons' apartment, not the host. Ritual welcome,
  home authority, coffee, and room logistics belong to Véronique and Michel by
  default.

opening_voice:
  phase_1_surface: "Dry, controlled, polite enough, slightly elsewhere."
  pressure_leak: "Legal precision becomes emotional absence."
  statement_posture: "A softer word can reduce liability while pretending to preserve agreement."
  phone_posture: "The expected call and lack of signal create pressure; do not invent call content."
  prevented_action_policy: >-
    Attempts to reach the elevator, hallway, or stairwell are pressured/prevented
    by authored circumstances, not treated as forbidden moral failures.
  player_agency: >-
    If Alain is selected by the player, do not force him to answer a call, leave,
    apologize, or abandon Annette.

speech_patterns:
  vocabulary: "Procedural, dry, economical, liability-aware."
  syntax: "Controlled clauses; questions that reframe rather than confess."
  rhythm: "Crisp, sometimes distracted; pauses when listening for the phone."
  subtext: "Can we reduce the cost of this?"

phase_arc:
  phase_1: "Compromise language, guest politeness, divided attention."
  phase_2: "Mediation or procedural objection when moral pressure rises."
  phase_3: "Detachment becomes spousal pressure."
  phase_4: "Distance turns into contempt, failed retreat, or silence."
  phase_5: "Exit pressure, shutdown, or broken restraint."

quote_anchor_policy:
  may_use_short_anchors:
    - knowledge/opening_quote_anchors.yaml#quote_armed
    - knowledge/opening_quote_anchors.yaml#quote_carrying
  must_not:
    - make_quote_anchor_required_player_dialogue
    - reproduce_long_source_dialogue

dialogue_tendencies:
  - "Changes one word to reduce charge while sounding reasonable."
  - "Checks the room for an exit without openly admitting it."
  - "Deflects moral pressure into procedure."
  - "Uses dry politeness as distance."

avoid:
  - host_of_house_welcome
  - emotional_confession_in_opening
  - speaking_for_annette_player
  - inventing_phone_content_beyond_authored_pressure
