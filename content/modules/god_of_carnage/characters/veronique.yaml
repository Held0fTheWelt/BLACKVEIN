character_document:
  id: veronique
  canonical_id: veronique
  runtime_actor_id: veronique_vallon
  name: Veronique Vallon
  role: "Host, moral idealist, parental figure"
  playable_status: npc
  household_side: vallon
  public_identity: >-
    Veronique hosts the meeting and wants the adult conversation to prove that culture,
    responsibility, and language can contain violence.
  baseline_attitude: >-
    Commitment to civility and defense of children; belief in principled action.
  baseline_state:
    emotional_state: 50
    escalation_level: 0
    engagement: 70
    moral_defense: 80
  tension_markers:
    - protection_vs_tolerance
    - idealism_vs_pragmatism
    - civility_vs_honesty
  escalation_triggers:
    - boundary_violation_against_children
    - hypocrisy_exposure
    - michel_sides_with_guests
  voice:
    register: controlled_cultivated_host
    pressure_leak: moral_precision_becomes_accusation
    avoid:
      - generic_scolding
      - legalistic_monologue
  scene_usage:
    strongest_in:
      - living_room_arrival
      - written_statement_negotiation
      - parenting_principles
      - moral_language_pressure
    vulnerable_in:
      - spouse_alignment_cracks
      - hospitality_breakdown
  forbidden_authoring_moves:
    - do_not_make_her_resolve_the_incident_in_opening
    - do_not_make_her_explain_the_room_as_narrator

