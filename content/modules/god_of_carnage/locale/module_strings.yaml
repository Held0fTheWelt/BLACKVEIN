# Player shell and diegetic player-line templates (ADR-0036 session_output_language selects row).
# Keys are stable API identifiers; de/en values are module-authored content (not engine literals).
version: 1
strings:
  player_shell.second_person:
    de: "Du"
    en: "You"
  player_shell.npc_responder_label:
    de: "NPC am Zug"
    en: "NPC responder"
  player_shell.player_identity_line:
    de: "Du spielst: {role}"
    en: "You play: {role}"
  greeting.polite_line:
    de: "Hallo {addressee}, vielen Dank für die Einladung."
    en: "Hello {addressee}, thank you for having us."
  greeting.attributed_outcome:
    de: "{player_shell_name} sagt: \u201e{diegetic}\u201c"
    en: '{player_shell_name} says: "{diegetic}"'
  player_outcome.speech_question:
    de: "{name} fragt: \u201e{raw}\u201c"
    en: '{name} asks: "{raw}"'
  player_outcome.speech_statement:
    de: "{name} sagt: \u201e{raw}\u201c"
    en: '{name} says: "{raw}"'
  player_outcome.action_display:
    de: "{name} f\u00fchrt aus: \u201e{raw}\u201c"
    en: '{name} acts: "{raw}"'
  player_outcome.mixed_display:
    de: "{name} meint: \u201e{raw}\u201c"
    en: '{name} says: "{raw}"'
  player_outcome.mixed_stand_speech:
    de: "{name} steht auf und sagt: \u201e{speech}\u201c"
    en: '{name} stands up and says: "{speech}"'
  player_outcome.action_toward_room:
    de: "{name} geht in Richtung {room}."
    en: "{name} moves toward {room}."
  player_outcome.perception_at_window:
    de: "{name} tritt ans Fenster und schaut hinaus."
    en: "{name} steps to the window and looks out."
  player_outcome.perception_generic:
    de: "{name} schaut aufmerksam."
    en: "{name} looks carefully."
  # Perception framed as a question (player asks what they see) — not diegetic quoted speech (PLAYER-ACTION-INTENT-01).
  player_outcome.perception_question_at_window:
    de: "{name} tritt ans Fenster und betrachtet die Aussicht."
    en: "{name} steps to the window and studies the view."
  # Action-resolution synthetic surfaces (keys only; {target_label} from resolved entity, not raw input).
  action_resolution.narrator.generic:
    de: "Die Szene verschiebt sich leise um dich herum."
    en: "The scene shifts quietly around you."
  action_resolution.narrator.move_offscreen:
    de: "Du gehst kurz abseits Richtung {target_label}; im Salon bleibt die Anspannung hörbar."
    en: "You step aside toward {target_label}; tension remains audible in the salon."
  action_resolution.narrator.move_local:
    de: "Du setzt dich in Bewegung; der Raum reagiert mit kleinen, spürbaren Verschiebungen."
    en: "You move; the room responds with small, perceptible shifts."
  action_resolution.narrator.perception_object:
    de: "Du richtest deine Aufmerksamkeit auf {target_label}."
    en: "You focus your attention on {target_label}."
  action_resolution.narrator.perception_generic:
    de: "Du nimmst die Umgebung bewusst wahr."
    en: "You take in the surroundings deliberately."
  action_resolution.narrator.partial:
    de: "Das lässt sich gerade nur teilweise klären; du bleibst im Ungefähren."
    en: "That can only be partly clarified for now; you stay approximate."
  action_resolution.clarification.unknown_target:
    de: "Das Ziel ist unklar. Worauf genau bezieht sich deine Aktion?"
    en: "The target is unclear. What exactly do you mean?"
  action_resolution.clarification.ambiguous:
    de: "Mehrere Deutungen sind möglich. Worauf willst du hinaus?"
    en: "Several readings are possible. What do you intend?"
  action_resolution.blocked.generic:
    de: "Das geht hier gerade nicht."
    en: "That is not possible here right now."
  action_resolution.graph_failure:
    de: "Der Zug konnte technisch nicht vollständig geladen werden. Bitte versuche es erneut."
    en: "This turn could not be fully loaded. Please try again."
