# Verb / action-kind ontology for player action resolution (data-driven; no per-utterance branches).
# Patterns are applied in order; first match wins within each action_kind scan.
version: 1
locale: de
action_kinds:
  movement:
    narrator_owned: true
    npc_reaction_allowed: optional
    verb_map:
      - verb: move_to
        patterns:
          - "(?is)\\b(?:gehe?|lauf(?:e)?|bewege\\s+mich|geh\\b|go|walk|move)\\b"
      - verb: stand_up
        patterns:
          - "(?is)\\b(?:stehe?\\s+auf|steh\\s+auf|rise|stand\\s+up)\\b"
  perception:
    narrator_owned: true
    npc_reaction_allowed: optional
    verb_map:
      - verb: look_at
        patterns:
          - "(?is)\\b(?:schaue?|schau|blicke?|look|watch|observe|peek)\\b"
      - verb: listen_to
        patterns:
          - "(?is)\\b(?:h[oö]re?|lausche|listen)\\b"
  object_interaction:
    narrator_owned: true
    npc_reaction_allowed: optional
    verb_map:
      # Separable / periphrastic device & object control (German imperative, accusative object).
      - verb: activate
        patterns:
          - "(?is)\\bschalt(?:e|est|et|en)?\\b.{0,140}\\b(?:ein|an)\\b"
          - "(?is)\\bmacht?\\b.{0,100}\\b(?:an)\\b"
      - verb: deactivate
        patterns:
          - "(?is)\\bschalt(?:e|est|et|en)?\\b.{0,140}\\b(?:aus)\\b"
          - "(?is)\\bmacht?\\b.{0,100}\\b(?:aus)\\b"
      - verb: open
        patterns:
          - "(?is)\\böffn(?:e|est|et|en)?\\b"
          - "(?is)\\bmacht?\\b.{0,100}\\b(?:auf)\\b"
      - verb: place
        patterns:
          - "(?is)\\bleg(?:e|est|et|en)?\\b"
      - verb: take
        patterns:
          - "(?is)\\b(?:nimm|nehme)\\b"
  speech:
    narrator_owned: false
    npc_reaction_allowed: true
    verb_map:
      - verb: say
        patterns:
          - "(?is)\\b(?:sage|sagt|say)\\b"
  social_action:
    narrator_owned: partial
    npc_reaction_allowed: true
    verb_map:
      - verb: greet
        patterns:
          - "(?is)\\b(?:begr[üu]ße?|gr[üu]ße?|greet|hello|hi)\\b"
  manipulation:
    narrator_owned: true
    npc_reaction_allowed: optional
    verb_map:
      - verb: take
        patterns:
          - "(?is)\\b(?:grab|pick\\s+up|take)\\b"

priority_order:
  - movement
  - perception
  - object_interaction
  - social_action
  - manipulation
  - speech
