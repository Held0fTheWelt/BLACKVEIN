# Escalation Axes for God of Carnage
# Four formal dimensions that track conflict intensity and progression

escalation_axes:
  axis_individual:
    id: axis_individual
    name: "Individual Emotional Escalation"
    description: "Per-character emotional state, activation level, and loss of control"

    measurement:
      metric: "emotional_state (0-100 per character)"
      baseline: 50
      civility_threshold: 60      # Above this, civility begins to crack
      breakdown_threshold: 85     # Above this, emotional control visibly lost
      collapse_threshold: 90      # At this level, character unable to continue

    escalation_drivers:
      - "Personal insult or attack"
      - "Exposure of hypocrisy"
      - "Feeling unsupported by spouse"
      - "Repeated contradiction of core belief"
      - "Contempt or dismissal of values"

    visible_signs:
      low: "Controlled speech, maintained composure"
      medium: "Raised voice, sarcasm, defensive posture"
      high: "Interruptions, trembling voice, tears"
      critical: "Incoherent speech, shutdown, breakdown"

    phase_bounds:
      phase_1: max_60
      phase_2: max_80
      phase_3: max_85
      phase_4: no_limit
      phase_5: no_limit

  axis_relationship:
    id: axis_relationship
    name: "Relationship Instability"
    description: "Stability of key relationships; decline indicates deterioration"

    measurement:
      metric: "relationship_stability (0-100 per relationship pair)"
      baseline: "50-85 depending on pair"
      civility_threshold: 50        # Below this: civility incompatible with relationship state
      crisis_threshold: 30          # Below this: relationship in active rupture
      broken_threshold: 0           # Relationship severed

    escalation_drivers:
      - "Spousal misalignment (axis_1 split)"
      - "Host authority challenged (axis_2 shift)"
      - "Moral framework attacked (axis_3 relativization)"
      - "Status claims revealed as false (axis_4 contempt)"

    visible_signs:
      stable: "Couple united, supportive of each other"
      strained: "Couple shows minor tension; eye contact reduced"
      fractured: "Couple argues; spouse no longer defends partner"
      ruptured: "Couple physically distant; active contempt between them"
      broken: "Separation; one leaves or refuses to engage"

    phase_bounds:
      phase_1: min_70 (baseline stability maintained)
      phase_2: min_50 (stability begins to decline)
      phase_3: min_30 (severe fracture possible)
      phase_4: min_20 (rupture stage)
      phase_5: any (may be fully broken)

  axis_conversation:
    id: axis_conversation
    name: "Conversation Breakdown"
    description: "Quality and structure of dialogue; decline indicates loss of engagement/coherence"

    measurement:
      metric: "conversation_coherence (0-100 composite)"
      components:
        - "Turn length (long=coherent, fragmented=breakdown)"
        - "Topic maintenance (on-topic=coherent, scattered=breakdown)"
        - "Listening quality (responsive=coherent, unheard=breakdown)"
        - "Speech clarity (articulate=coherent, incoherent=breakdown)"

      baseline: 80 (organized debate)
      structured_debate_threshold: 60
      chaotic_threshold: 40
      complete_breakdown_threshold: 0

    escalation_drivers:
      - "Interruptions increase"
      - "Tangential arguments introduced"
      - "Repeat assertions without listening"
      - "Shift from debate to attack"
      - "Emotional override of reason"

    visible_signs:
      organized: "Turn-taking, complete sentences, topic coherence"
      strained: "Frequent interruptions, short answers, tension obvious"
      chaotic: "Overlapping speech, tangents, loss of thread"
      breakdown: "Incoherent, no dialogue exchange, monologue/silence"

    phase_bounds:
      phase_1: min_70 (organized, civil)
      phase_2: min_50 (structured but tense)
      phase_3: min_40 (chaotic but still debate)
      phase_4: any (may be completely breakdown)
      phase_5: any (may be silence or monologue)

  axis_coalition:
    id: axis_coalition
    name: "Coalition Dynamics / Power Shifts"
    description: "Alignment of subgroups; shifts indicate fracture or realignment"

    measurement:
      metric: "coalition_stability (discrete state: aligned, fractured, realigned, dissolved)"
      states:
        initial: "couple_vs_couple (Véronique/Michel vs. Annette/Alain)"
        fractured: "spousal_misalignment (at least one spouse splits from partner)"
        realigned: "new_coalition_forms (e.g., pragmatists vs. idealists)"
        dissolved: "no_coherent_coalition (all individuals isolated)"

    escalation_drivers:
      - "Spouse sides with opposing party"
      - "Guest gains persuasive advantage"
      - "Moral framework splits group"
      - "Individual status claims override coupling"

    visible_signs:
      initial: "Couples sit together, present united front"
      fractured: "Spouse challenges spouse; visible shock"
      realigned: "New alignments form (e.g., Michel with guests); old couple separated"
      dissolved: "Each character isolated; no safe allies"

    phase_bounds:
      phase_1: initial_only
      phase_2: initial (beginning to show cracks)
      phase_3: fractured_or_realigned (shift must occur)
      phase_4: realigned_or_dissolved (original couples broken)
      phase_5: realigned_or_dissolved (unlikely to reform)

    critical_transitions:
      phase_2_to_phase_3: "Spousal alignment must shift; triggers axis_1 cascade"
      phase_3_to_phase_4: "Coalition must be fully fractured or realigned; individual isolation begins"

# Escalation Interaction Model

interaction_model:
  trigger_to_axis_mapping:
    contradiction:
      individual: "+15 emotional_state"
      conversation: "-10 coherence"
      relationship: "-20 stability"
      coalition: "potential realignment if contradicts axis_3 (moral framework)"

    exposure:
      individual: "+20 emotional_state"
      conversation: "-15 coherence"
      relationship: "-25 stability"
      coalition: "may trigger coalition shift if exposure is public"

    relativization:
      individual: "+12 emotional_state"
      conversation: "-8 coherence"
      relationship: "-30 stability (if attacks moral framework)"
      coalition: "strong realignment signal (axis_3 divides group)"

    apology_or_non_apology:
      individual: "-10 (apology) / +5 (non-apology)"
      conversation: "+15 (genuine apology) / -10 (fake)"
      relationship: "+15 (apology) / -10 (non-apology)"
      coalition: "may restore spousal alignment if partner accepts apology"

    cynicism:
      individual: "+18 emotional_state"
      conversation: "-15 coherence"
      relationship: "-35 stability"
      coalition: "deepens moral/pragmatic divide; strengthens axis_3 split"

    flight_into_sideplots:
      individual: "-5 to +5 (variable)"
      conversation: "-10 coherence (evasion signal)"
      relationship: "-15 stability (seen as avoidance/contempt)"
      coalition: "may preserve temporary coalition if deflection buys time"

    collapse_indicators:
      individual: "+15 to +25 emotional_state (internal distress)"
      conversation: "-30 coherence (breakdown of speech)"
      relationship: "-10 to +10 (may trigger compassion)"
      coalition: "may trigger temporary alliance or accelerate dissolution"

    retreat_signals:
      individual: "-5 to +20 (frustration at being stopped)"
      conversation: "-20 coherence (disengagement)"
      relationship: "-30 to -50 stability (exit intent signals rupture)"
      coalition: "dissolves coalition; removal of one party"

# Escalation Path Validation

path_validation:
  legal_escalation_sequence: "Individual → Conversation breakdown → Coalition shift → Relationship rupture"

  forbidden_states:
    - "Relationship stability > 50 AND conversation coherence < 20 (incoherent but stable is unrealistic)"
    - "Coalition dissolved AND relationship stability > 40 (if dissolved, must be ruptured)"
    - "Phase 5 AND conversation coherence > 60 (phase 5 requires serious breakdown)"

  minimum_valid_run:
    phase_1: "Start at baseline; individual ~50, relationships stable, coalition initial"
    phase_2: "Triggers fire; individual rises to 70+, conversation strained, coalition intact"
    phase_3: "Coalition shift occurs; relationships fracture, individuals escalate 80+, conversation chaotic"
    phase_4: "Conversation breakdown complete, individuals 85+, relationships crisis"
    phase_5: "Individual 90+ OR relationship 0 OR complete conversation breakdown; session ends"

# Escalation Measurement Formulas (Non-Binding)

measurement_notes: |
  These formulas are descriptive, not prescriptive. The engine may use alternative calculations
  as long as the four axes remain formally measurable and their interactions are explicit.

  Individual Escalation: Sum of per-character emotional_state values, then average
  Relationship Instability: Average of all relationship_stability values
  Conversation Breakdown: Composite based on turn structure, topic coherence, and speech clarity
  Coalition Dynamics: Discrete state tracking (initial → fractured → realigned → dissolved)

  Escalation Level (Meta-Metric): Weighted average of the four axes
    - Individual: 25% weight
    - Relationship: 30% weight (most sensitive)
    - Conversation: 25% weight
    - Coalition: 20% weight
    - Result: 0-100 escalation_level per scene phase
