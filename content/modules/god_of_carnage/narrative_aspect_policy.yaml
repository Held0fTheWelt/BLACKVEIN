narrative_aspect_policy:
  schema_version: narrative_aspect_policy.v1
  default_commit_impact: diagnostic
  aspects:
    - id: runtime_intent_trace
      enabled: true
      selection_source: module_policy
      activation:
        always: true
      commit_impact: diagnostic
      metadata:
        table_b_refs:
          - pi_13
      evidence:
        - id: action_resolution_recorded
          kind: ledger_aspect_status
          ledger_aspect: action_resolution
          status: passed
          required: false
    - id: runtime_governance_trace
      enabled: true
      selection_source: module_policy
      activation:
        always: true
      commit_impact: diagnostic
      metadata:
        table_b_refs:
          - pi_06
          - pi_30
      evidence:
        - id: validation_recorded
          kind: ledger_aspect_status
          ledger_aspect: validation
          status: passed
          required: false
    - id: runtime_agency_trace
      enabled: true
      selection_source: module_policy
      activation:
        always: true
      commit_impact: diagnostic
      metadata:
        table_b_refs:
          - pi_23
      evidence:
        - id: actor_authority_recorded
          kind: ledger_aspect_status
          ledger_aspect: npc_authority
          status: passed
          required: false
    - id: pi12_civilized_violence_pressure
      enabled: true
      selection_source: module_policy
      activation:
        always: true
      commit_impact: diagnostic
      metadata:
        table_b_refs:
          - pi_12
      semantic_policy:
        enabled: true
        required: false
        classifier_version: narrative_aspect_semantic_overlap_v1
        thresholds:
          min_aspect_alignment: 0.20
          min_dimension_alignment: 0.20
          min_matched_dimensions: 1
      semantic_profile:
        social_mask: >-
          civility civilized polite manners courtesy adult salon mask respect
          anstand hoeflich erwachsen fassade respekt
        violence_pressure: >-
          violence aggression wound damage strike force brutality konflikt
          gewalt verletzung eskalation
        material_anchor: >-
          apartment living room table sofa vase tulips rum coffee threshold
          wohnzimmer tisch sofa vase tulpen rum kaffee
        moral_friction: >-
          blame responsibility hypocrisy superiority shame accusation morality
          schuld verantwortung heuchelei moral vorwurf beschuldigung
