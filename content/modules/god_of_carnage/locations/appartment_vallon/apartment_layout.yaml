# Structured apartment topology — English module truth for semantic resolution, director, RAG.
# Player-language interpretation is handled by the engine AI adapter against this content.

apartment_layout:
  authoring_language: en
  setting_id: vallon_paris_evening_apartment
  narrative_anchor_area_id: living_room
  summary: An upscale Paris apartment in a working district where the salon hosts the confrontation. The building landing
    opens into the living room; an inner hallway branches to kitchen, dining room, pantry, study, a large master bedroom (ensuite
    bathroom beyond it), two locked bedroom doors, and a locked bathroom at the far end of the hall. Topology and access rules
    live in this file; place prose and inventory live in one location file per room under locations/appartment_vallon/ (see
    room_location_files).
  global_rules:
    offscreen_move_requires_narrator_consequence: true
    line_of_sight_default: interior_partitioned
    audio_bleed_between_adjacent_rooms: moderate
    locked_private_doors_are_not_playable_rooms: true
    prevented_actions_are_not_forbidden: true
  location_assignment:
    scene_nodes_use_location_id: true
    live_play_default_location_id: living_room
    playable_location_ids:
    - building_hallway
    - living_room
    - hallway
    - kitchen
    - dining_room
    - bathroom
    - bedroom
    - pantry
    - study
    prevented_location_ids:
    - building_stairwell
    non_playable_locked_location_ids:
    - hallway_bathroom_locked
    - bedroom_one_locked
    - bedroom_two_locked

  room_location_files:
    building_hallway: locations/building/building_hallway.yaml
    building_stairwell: locations/building/building_stairwell.yaml
    living_room: locations/appartment_vallon/living_room.yaml
    hallway: locations/appartment_vallon/hallway.yaml
    kitchen: locations/appartment_vallon/kitchen.yaml
    dining_room: locations/appartment_vallon/dining_room.yaml
    bedroom: locations/appartment_vallon/bedroom.yaml
    bathroom: locations/appartment_vallon/bathroom.yaml
    pantry: locations/appartment_vallon/pantry.yaml
    study: locations/appartment_vallon/study.yaml
    hallway_bathroom_locked: locations/appartment_vallon/hallway_bathroom_locked.yaml
    bedroom_one_locked: locations/appartment_vallon/bedroom_one_locked.yaml
    bedroom_two_locked: locations/appartment_vallon/bedroom_two_locked.yaml

  rooms:
  - id: building_hallway
    dramatic_role: common_building_hallway_and_exit_pressure
    privacy: public_common_area
    access_pattern: gated_entry_or_exit
    adjacent_room_ids:
    - living_room
    - building_stairwell
    visibility_from_room:
      can_directly_perceive_room_ids:
      - living_room
      - building_stairwell
      cannot_directly_perceive_room_ids:
      - hallway
      - kitchen
      - dining_room
      - bathroom
      - bedroom
      - hallway_bathroom_locked
      - pantry
      - study
      - bedroom_one_locked
      - bedroom_two_locked
    exits:
    - id: building_hallway_to_living_room
      to_room_id: living_room
      kind: apartment_door_threshold
    prevented_exits:
    - id: building_hallway_to_stairwell
      to_room_id: building_stairwell
      kind: unreachable_stairwell_access
      reason: alain_no_signal_waiting_for_urgent_call
    - id: building_hallway_to_elevator
      to_object_id: elevator
      kind: elevator_does_not_arrive
      reason: alain_no_signal_waiting_for_urgent_call
    inventory_policy: sparse_threshold_with_elevator_and_other_doors
    plausible_actions:
    - wait
    - listen_to
    - look_at
    - check_phone
    - enter_apartment
    - attempt_exit
    prevented_actions:
    - id: call_elevator
      action: call_elevator
      reason: elevator_does_not_arrive
      pressure_source: alain_no_signal_waiting_for_urgent_call
    - id: enter_elevator
      action: enter_elevator
      reason: elevator_does_not_arrive
      pressure_source: alain_no_signal_waiting_for_urgent_call
    - id: enter_stairwell
      action: enter_stairwell
      reason: stairwell_not_reachable_from_current_hallway_moment
      pressure_source: alain_no_signal_waiting_for_urgent_call
    forbidden_actions:
    - summon_unestablished_neighbors
    - access_private_apartment_without_scene_gate
    offscreen_presence_policy: hallway_noise_only_no_neighbor_scene
    location_ref:
      location_id: building_hallway
      source: locations/building/building_hallway.yaml
  - id: building_stairwell
    dramatic_role: unreachable_exit_pressure
    privacy: public_common_area
    access_pattern: prevented_currently
    adjacent_room_ids:
    - building_hallway
    visibility_from_room:
      can_directly_perceive_room_ids:
      - building_hallway
      cannot_directly_perceive_room_ids:
      - living_room
      - hallway
      - kitchen
      - dining_room
      - bathroom
      - bedroom
      - hallway_bathroom_locked
      - pantry
      - study
      - bedroom_one_locked
      - bedroom_two_locked
    exits: []
    prevented_exits:
    - id: stairwell_to_building_hallway
      to_room_id: building_hallway
      kind: unreachable_stairwell_access
      reason: alain_no_signal_waiting_for_urgent_call
    inventory_policy: inaccessible_threshold
    plausible_actions:
    - notice_stairwell
    - listen_to
    prevented_actions:
    - id: enter_stairwell
      action: enter_stairwell
      reason: stairwell_not_reachable_from_current_hallway_moment
      pressure_source: alain_no_signal_waiting_for_urgent_call
    forbidden_actions:
    - invent_unestablished_stairwell_scene
    offscreen_presence_policy: stairwell_may_exist_as_pressure_not_scene
    location_ref:
      location_id: building_stairwell
      source: locations/building/building_stairwell.yaml
  - id: living_room
