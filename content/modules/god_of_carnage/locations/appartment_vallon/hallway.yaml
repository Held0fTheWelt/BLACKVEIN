location:
  id: hallway
  name: "Small interior hallway"
  category: interior_transition
  playable_access: gated_scene_navigation
  description: >-
    A narrow inner corridor branching away from the living room; it can cool a
    scene down, carry overheard sound, and expose the apartment's private
    boundaries.
  room_profile:
    role: inner_corridor
    connected_place_ids:
      - living_room
      - kitchen
      - bathroom
      - pantry
      - study
      - bedroom_one_locked
      - bedroom_two_locked
  entrances_exits:
    exits:
      - id: hallway_to_living_room
        to_place_id: living_room
        kind: interior_threshold
      - id: hallway_to_kitchen
        to_place_id: kitchen
        kind: service_threshold
      - id: hallway_to_bathroom
        to_place_id: bathroom
        kind: private_room_door
      - id: hallway_to_pantry
        to_place_id: pantry
        kind: service_closet_door
      - id: hallway_to_study
        to_place_id: study
        kind: private_work_room_door
      - id: hallway_to_bedroom_one
        to_place_id: bedroom_one_locked
        kind: locked_private_door
      - id: hallway_to_bedroom_two
        to_place_id: bedroom_two_locked
        kind: locked_private_door
  inventory_policy: door_and_threshold_inventory
  sensory_tags: [narrow_space, doors, overheard_room, exit_pressure]
  plausible_actions: [look_at, listen_to, move_to_adjacent_room, pause_at_door]
  forbidden_actions: [enter_locked_bedroom]
