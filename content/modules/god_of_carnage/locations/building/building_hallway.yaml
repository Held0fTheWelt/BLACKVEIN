location:
  id: building_hallway
  name: "Dark building hallway and elevator landing"
  category: building_common_area
  playable_access: gated_scene_navigation
  description: >-
    The dim common hallway outside the Vallon apartment: other apartment doors,
    a silent elevator that does not arrive, weak phone reception, and the pressure
    of Alain waiting for an urgent call.
  room_profile:
    role: common_building_hallway
    connected_place_ids:
      - living_room
      - building_stairwell
  entrances_exits:
    exits:
      - id: building_hallway_to_living_room
        to_place_id: living_room
        kind: apartment_door_threshold
    prevented_exits:
      - id: building_hallway_to_stairwell
        to_place_id: building_stairwell
        kind: unreachable_stairwell_access
        reason: alain_no_signal_waiting_for_urgent_call
      - id: building_hallway_to_elevator
        to_object_id: elevator
        kind: elevator_does_not_arrive
        reason: alain_no_signal_waiting_for_urgent_call
  inventory_policy: sparse_threshold_with_elevator_and_other_doors
  inventory_object_ids:
    - elevator
    - apartment_door
  sensory_tags: [dark_hallway, other_apartment_doors, elevator_silence, weak_phone_signal, urgent_call_pressure]
  plausible_actions: [look_at, listen_to, wait, check_phone, enter_apartment, attempt_exit]
  prevented_actions:
    - id: call_elevator
      action: call_elevator
      reason: elevator_does_not_arrive
      pressure_source: alain_no_signal_waiting_for_urgent_call
    - id: enter_elevator
      action: enter_elevator
      reason: elevator_does_not_arrive
      pressure_source: alain_no_signal_waiting_for_urgent_call
    - id: enter_stairwell
      action: enter_stairwell
      reason: stairwell_not_reachable_from_current_hallway_moment
      pressure_source: alain_no_signal_waiting_for_urgent_call
  forbidden_actions: [summon_unestablished_neighbors, access_private_apartment_without_scene_gate]
