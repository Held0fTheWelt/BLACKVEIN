# Structured apartment topology — English module truth for resolution, director, RAG.
# Operational affordances (aliases, localized entry detail) remain in locale/scene_affordances.yaml.

apartment_layout:
  authoring_language: en
  setting_id: vallon_paris_evening_apartment
  narrative_anchor_area_id: vallon_living_room
  summary: >-
    An upscale Paris apartment in a working district where the salon hosts the confrontation;
    the building stairwell/elevator landing opens directly into the living room, while a small
    interior hallway gives access to service and private rooms.

  global_rules:
    offscreen_move_requires_narrator_consequence: true
    line_of_sight_default: interior_partitioned
    audio_bleed_between_adjacent_rooms: moderate
    locked_private_doors_are_not_playable_rooms: true

  location_assignment:
    scene_nodes_use_location_id: true
    live_play_default_location_id: vallon_living_room
    playable_location_ids:
      - building_stairwell
      - vallon_living_room
      - hallway
      - kitchen
      - bathroom
      - pantry
      - study
    non_playable_locked_location_ids:
      - bedroom_one_locked
      - bedroom_two_locked

  rooms:
    - id: building_stairwell
      dramatic_role: common_building_threshold
      privacy: public_common_area
      access_pattern: gated_entry_or_exit
      adjacent_room_ids:
        - vallon_living_room
      visibility_from_room:
        can_directly_perceive_room_ids:
          - vallon_living_room
        cannot_directly_perceive_room_ids:
          - hallway
          - kitchen
          - bathroom
          - pantry
          - study
          - bedroom_one_locked
          - bedroom_two_locked
      exits:
        - id: stairwell_to_living_room
          to_room_id: vallon_living_room
          kind: apartment_door_threshold
      inventory_policy: sparse_threshold
      plausible_actions:
        - wait
        - listen_to
        - enter_apartment
        - attempt_exit
      forbidden_actions:
        - summon_unestablished_neighbors
        - access_private_apartment_without_scene_gate
      offscreen_presence_policy: elevator_and_stairwell_noise_only

    - id: vallon_living_room
      dramatic_role: primary_stage
      privacy: semipublic_within_visit
      aliases_policy: inherits_from_scene_affordances_current_area
      adjacent_room_ids:
        - building_stairwell
        - hallway
        - kitchen
      visibility_from_room:
        can_directly_perceive_room_ids:
          - building_stairwell
          - hallway
          - kitchen
        cannot_directly_perceive_room_ids:
          - bathroom
          - pantry
          - study
          - bedroom_one_locked
          - bedroom_two_locked
      exits:
        - id: living_room_to_stairwell
          to_room_id: building_stairwell
          kind: apartment_door_threshold
        - id: living_room_to_inner_hallway
          to_room_id: hallway
          kind: interior_threshold
        - id: living_room_to_kitchen
          to_room_id: kitchen
          kind: attached_room
      inventory_policy: authored_salient_objects
      plausible_actions:
        - sit_down
        - stand_up
        - look_at
        - listen_to
        - move_to_adjacent_room
        - interact_with_hospitality_objects
      forbidden_actions:
        - leave_without_exit_pressure
        - access_locked_bedrooms
      offscreen_presence_policy: guests_and_hosts_audible_when_present

    - id: hallway
      dramatic_role: inner_corridor_and_buffer
      privacy: semiprivate
      adjacent_room_ids:
        - vallon_living_room
        - kitchen
        - bathroom
        - pantry
        - study
        - bedroom_one_locked
        - bedroom_two_locked
      visibility_from_room:
        can_directly_perceive_room_ids:
          - vallon_living_room
          - kitchen
        cannot_directly_perceive_room_ids:
          - bathroom
          - pantry
          - study
          - bedroom_one_locked
          - bedroom_two_locked
      exits:
        - id: hallway_to_living_room
          to_room_id: vallon_living_room
          kind: interior_threshold
        - id: hallway_to_kitchen
          to_room_id: kitchen
          kind: service_threshold
        - id: hallway_to_bathroom
          to_room_id: bathroom
          kind: private_room_door
        - id: hallway_to_pantry
          to_room_id: pantry
          kind: service_closet_door
        - id: hallway_to_study
          to_room_id: study
          kind: private_work_room_door
        - id: hallway_to_bedroom_one
          to_room_id: bedroom_one_locked
          kind: locked_private_door
        - id: hallway_to_bedroom_two
          to_room_id: bedroom_two_locked
          kind: locked_private_door
      inventory_policy: door_and_threshold_inventory
      plausible_actions:
        - listen_to
        - look_at
        - move_to_adjacent_room
        - pause_at_door
      forbidden_actions:
        - enter_locked_bedroom
      prevented_actions:
        - enter elevator
        - enter stairwell
      offscreen_presence_policy: footsteps_and_door_cues_ok

    - id: kitchen
      dramatic_role: service_and_cooling_off
      privacy: semiprivate
      access_pattern: attached_from_salon_or_hallway
      adjacent_room_ids:
        - vallon_living_room
        - hallway
      visibility_from_room:
        can_directly_perceive_room_ids:
          - vallon_living_room
          - hallway
        cannot_directly_perceive_room_ids:
          - bathroom
          - pantry
          - study
          - bedroom_one_locked
          - bedroom_two_locked
      exits:
        - id: kitchen_to_living_room
          to_room_id: vallon_living_room
          kind: attached_room
        - id: kitchen_to_hallway
          to_room_id: hallway
          kind: service_threshold
      inventory_policy: domestic_service_objects
      plausible_actions:
        - look_at
        - listen_to
        - take_glass_or_cup
        - prepare_or_handle_coffee
      forbidden_actions:
        - discover_unseeded_weapon
        - invent_hidden_person
      offscreen_presence_policy: domestic_soundscape_only_no_dialogue_truth

    - id: bathroom
      dramatic_role: private_regroup
      privacy: private
      access_pattern: via_inner_hallway
      adjacent_room_ids:
        - hallway
      visibility_from_room:
        can_directly_perceive_room_ids: []
        cannot_directly_perceive_room_ids:
          - vallon_living_room
          - kitchen
          - pantry
          - study
          - bedroom_one_locked
          - bedroom_two_locked
      exits:
        - id: bathroom_to_hallway
          to_room_id: hallway
          kind: private_room_door
      inventory_policy: bathroom_fixtures_only
      plausible_actions:
        - look_at
        - wash_hands
        - pause
      forbidden_actions:
        - overhear_precise_dialogue_from_living_room
        - discover_unseeded_evidence
      offscreen_presence_policy: no_unauthorized_audience_knowledge

    - id: pantry
      dramatic_role: service_storage
      privacy: semiprivate
      access_pattern: via_inner_hallway
      adjacent_room_ids:
        - hallway
      visibility_from_room:
        can_directly_perceive_room_ids: []
        cannot_directly_perceive_room_ids:
          - vallon_living_room
          - kitchen
          - bathroom
          - study
          - bedroom_one_locked
          - bedroom_two_locked
      exits:
        - id: pantry_to_hallway
          to_room_id: hallway
          kind: service_closet_door
      inventory_policy: optional_minor_inventory
      plausible_actions:
        - look_at
        - take_minor_service_item
      forbidden_actions:
        - find_major_plot_object
        - hide_in_room_without_consequence
      offscreen_presence_policy: domestic_storage_only

    - id: study
      dramatic_role: private_work_room
      privacy: private_host_space
      access_pattern: via_inner_hallway
      adjacent_room_ids:
        - hallway
      visibility_from_room:
        can_directly_perceive_room_ids: []
        cannot_directly_perceive_room_ids:
          - vallon_living_room
          - kitchen
          - bathroom
          - pantry
          - bedroom_one_locked
          - bedroom_two_locked
      exits:
        - id: study_to_hallway
          to_room_id: hallway
          kind: private_work_room_door
      inventory_policy: authored_or_optional_work_inventory
      plausible_actions:
        - look_at
        - listen_to
        - inspect_work_surface
      forbidden_actions:
        - read_private_documents_without_scene_gate
        - invent_decisive_hidden_evidence
      offscreen_presence_policy: private_room_requires_narrator_consequence

    - id: bedroom_one_locked
      dramatic_role: locked_private_bedroom
      privacy: private_locked
      access_pattern: locked_non_playable
      adjacent_room_ids:
        - hallway
      visibility_from_room:
        can_directly_perceive_room_ids: []
        cannot_directly_perceive_room_ids:
          - vallon_living_room
          - kitchen
          - bathroom
          - pantry
          - study
          - bedroom_two_locked
      exits:
        - id: bedroom_one_to_hallway
          to_room_id: hallway
          kind: locked_private_door
      inventory_policy: hidden_not_authored_for_play
      plausible_actions:
        - notice_locked_door
      forbidden_actions:
        - enter_room
        - open_locked_door
        - search_room
      offscreen_presence_policy: no_access_no_interior_truth

    - id: bedroom_two_locked
      dramatic_role: locked_private_bedroom
      privacy: private_locked
      access_pattern: locked_non_playable
      adjacent_room_ids:
        - hallway
      visibility_from_room:
        can_directly_perceive_room_ids: []
        cannot_directly_perceive_room_ids:
          - vallon_living_room
          - kitchen
          - bathroom
          - pantry
          - study
          - bedroom_one_locked
      exits:
        - id: bedroom_two_to_hallway
          to_room_id: hallway
          kind: locked_private_door
      inventory_policy: hidden_not_authored_for_play
      plausible_actions:
        - notice_locked_door
      forbidden_actions:
        - enter_room
        - open_locked_door
        - search_room
      offscreen_presence_policy: no_access_no_interior_truth

  transitions:
    - from_area_id: building_stairwell
      to_area_id: vallon_living_room
      kind: apartment_door_threshold
    - from_area_id: vallon_living_room
      to_area_id: building_stairwell
      kind: apartment_door_threshold
    - from_area_id: vallon_living_room
      to_area_id: hallway
      kind: interior_threshold
    - from_area_id: hallway
      to_area_id: vallon_living_room
      kind: interior_threshold
    - from_area_id: vallon_living_room
      to_area_id: kitchen
      kind: attached_room
    - from_area_id: kitchen
      to_area_id: vallon_living_room
      kind: attached_room
    - from_area_id: hallway
      to_area_id: kitchen
      kind: service_threshold
    - from_area_id: kitchen
      to_area_id: hallway
      kind: service_threshold
    - from_area_id: hallway
      to_area_id: bathroom
      kind: offscreen_private
    - from_area_id: bathroom
      to_area_id: hallway
      kind: offscreen_private
    - from_area_id: hallway
      to_area_id: pantry
      kind: service_storage
    - from_area_id: pantry
      to_area_id: hallway
      kind: service_storage
    - from_area_id: hallway
      to_area_id: study
      kind: private_work_room
    - from_area_id: study
      to_area_id: hallway
      kind: private_work_room
    - from_area_id: hallway
      to_area_id: bedroom_one_locked
      kind: locked_private_door
      access: locked_non_playable
    - from_area_id: hallway
      to_area_id: bedroom_two_locked
      kind: locked_private_door
      access: locked_non_playable
