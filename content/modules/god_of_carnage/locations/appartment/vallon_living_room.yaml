location:
  id: vallon_living_room
  name: "Vallon living room"
  category: primary_play_space
  playable_access: active
  description: >-
    The primary social stage of the apartment, curated and exposed: art books,
    tulips, seating, coffee table, window, and the performance of civilized
    hospitality.
  room_profile:
    role: social_stage
    connected_place_ids:
      - building_stairwell
      - hallway
      - kitchen
  entrances_exits:
    exits:
      - id: living_room_to_stairwell
        to_place_id: building_stairwell
        kind: apartment_door_threshold
      - id: living_room_to_hallway
        to_place_id: hallway
        kind: interior_threshold
      - id: living_room_to_kitchen
        to_place_id: kitchen
        kind: attached_room
  inventory_policy: authored_salient_objects
  sensory_tags: [art_books, tulips, seating, social_display]
  plausible_actions: [look_at, listen_to, sit_down, stand_up, move_to_adjacent_room]
  forbidden_actions: [leave_without_exit_pressure, access_locked_bedrooms]
