canonical_path_step:
  sequence: 20
  id: opening_v2_020_drink_offering_rum_proposed
  path_id: goc_opening_canonical_path_v2
  name: "020 - Drink offering: rum proposed, civility begins to crack"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 5
    summary: >-
      The tone has cracked. Michel offers a strong drink to dissipate the
      pressure — rum from a Cuban friend, fifteen years old. Veronique
      questions whether it's the right moment. Michel insists. Annette
      accepts a small pour. Alain wavers. The civil meeting begins to
      convert into a salon evening.

  duration_target_seconds: 60
  duration_max_seconds: 85

  theme_coverage_phase_refs:
    - actor: michel
      phase_id: defending_pragmatic_realism
      realization_step: true
    - actor: annette
      phase_id: maternal_defense_first_signal
      realization_step: true
    - actor: alain
      phase_id: strategic_cynicism_revealed
      realization_step: true

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
  object_refs:
    - object_id: rum_bottle_cuban
      source: objects/appartment_vallon/living_room/rum_bottle.yaml
    - object_id: tumbler_glasses
      source: objects/appartment_vallon/kitchen/glasses.yaml

  present:
    named_characters: [veronique, michel, annette, alain]

  preconditions:
    inherited_from_previous_step:
      - meeting_premise_dismissed_irreversible
      - civility_crack_count_three

  mandatory_beats:

    - id: michel_offers_strong_drink
      order: 1
      duration_target_seconds: 8
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: offer_strong_drink_to_dissipate_pressure
        required_facts:
          - "drink_offer_token: what would everyone say to something strong"
          - "rum_token: rum from a Cuban friend"
          - "age_token: fifteen years old"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_rum_offer
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two short sentences, host-defusing"
      player_status: observer_window_open

    - id: veronique_is_this_the_moment
      order: 2
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: question_whether_this_is_the_right_moment
        required_facts: ["timing_question_token: is this really the moment"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_rum_offer
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "five to seven words, low-objection"
      forces_response_chain:
        target_actor: michel
        target_intent: insist_now_is_the_right_moment
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: michel_insists
      order: 3
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: insist_drink_will_help_pragmatically
        required_facts: ["pragmatic_token: a small drink will help"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_rum_offer
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "five to eight words, pragmatic-warm"
      player_status: observer_window_open

    - id: michel_pours_rum_perception
      order: 4
      duration_target_seconds: 6
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Michel fetches the rum bottle and four tumblers."
          - "He pours generously."
      player_status: observer_no_initiative

    - id: annette_accepts_small_pour
      order: 5
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: accept_a_small_pour_initially
        required_facts: ["small_pour_token: just a small one"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_rum_offer
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "three to four words, brittle-polite"
      player_status: observer_window_open

    - id: alain_wavers_then_accepts
      order: 6
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: waver_glance_at_watch_then_accept
        required_facts:
          - "watch_glance_token: another look at the watch"
          - "accept_token: alright, one"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_rum_offer
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "watch gesture + three short words"
      player_status: observer_window_open

    - id: veronique_unwilling_but_accepts
      order: 7
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: signal_unwillingness_then_accept_to_keep_unity
        required_facts: ["reluctant_accept_token: alright then, half"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_rum_offer
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "three or four words, reluctant"
      player_status: observer_window_open

    - id: first_sip_perception
      order: 8
      duration_target_seconds: 5
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Four glasses raised, awkwardly. A first sip."
          - "Annette swallows hard."
      player_status: observer_window_open

  themes_realized_here:
    - actor: michel
      theme: cobbler_pride_as_distraction_tactic
      mechanism: "shifts from cobbler to rum — same defusing pattern"
      evidence_required: [michel_speaks_rum_token]
      blocks_progression_if_missing: false
    - actor: alain
      theme: this_caring_parent_crap_register
      mechanism: "accepts drink to convert the meeting from ethical to social"
      evidence_required: [alain_speaks_accept_token]
      blocks_progression_if_missing: false

  state_changes_committed:
    - key: environment_state.beverage_state
      to_value: rum_poured_four_glasses
      commit_irreversible: false
    - key: runtime_intelligence.meeting_to_salon_conversion_logged
      to_value: { triggered_by: michel_rum_offer, accepted_by: all_four }
      commit_irreversible: true

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    minimum_seconds_elapsed: 50

  next_point:
    step_id: opening_v2_021_rum_poured_caring_parent_crap
    handoff: "Rum lands. Accusations resume but with new register. Alliance phase B still active but visibly straining."
    carry_forward:
      - rum_in_four_glasses
      - meeting_to_salon_conversion_irreversible
