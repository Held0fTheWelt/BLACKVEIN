canonical_path_step:
  sequence: 34
  id: opening_v2_034_phone_aftermath
  path_id: goc_opening_canonical_path_v2
  name: "034 - Phone destruction aftermath, Alain frozen, recovery attempts"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 8
    summary: >-
      Aftermath. Alain stands holding the dead phone. Annette weeps quietly.
      Veronique tries to address Annette. Michel attempts another joke
      that misfires. The room is broken; the conversation continues without
      a stable axis. The set-up for Veronique's tulip-smashing.

  duration_target_seconds: 55
  duration_max_seconds: 75

  theme_coverage_phase_refs:
    - actor: alain
      phase_id: dismantled_through_phone_loss
      realization_step: true
    - actor: veronique
      phase_id: smashing_collapse
      realization_step: false
      seed: true

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
  object_refs:
    - object_id: alain_mobile_phone
      source: objects/appartment_vallon/living_room/mobile_phone_alain.yaml
    - object_id: tulips_bouquet
      source: objects/appartment_vallon/living_room/tulips.yaml

  present:
    named_characters: [veronique, michel, annette, alain]

  preconditions:
    inherited_from_previous_step:
      - phone_destroyed_irreversible
      - alliance_phase_E_everyone_vs_everyone_active

  mandatory_beats:

    - id: alain_holds_phone_perception
      order: 1
      duration_target_seconds: 6
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Alain stands in the middle of the room holding the dead phone."
          - "He doesn't speak."
          - "Annette has sunk back into the armchair, weeping quietly."
      player_status: observer_window_open

    - id: veronique_to_annette_softening
      order: 2
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: address_annette_softly_a_question
        required_facts: ["softening_token: Annette"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_worst_day
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "two or three words, soft-tentative"
      player_status: observer_window_open

    - id: annette_weeps_quietly_perception
      order: 3
      duration_target_seconds: 5
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Annette does not answer."
          - "Her shoulders shake."
      player_status: observer_window_open

    - id: michel_dry_joke_misfires
      order: 4
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: try_a_dry_joke_about_the_phone_warranty
        required_facts: ["dry_joke_token: I don't think that was covered by warranty"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_phone_warranty
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "seven or eight words, mistimed-cynic"
        tone_hint: cynical_pragmatist_unmasked
      player_status: observer_window_open

    - id: veronique_michel_thats_enough
      order: 5
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: tell_michel_thats_enough_again_about_jokes
        required_facts: ["enough_repeat_token: Michel, that's enough"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_phone_warranty
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "four or five words, cold"
      player_status: observer_window_open

    - id: alain_attempts_to_speak_fails
      order: 6
      duration_target_seconds: 4
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Alain tries to say something."
          - "He doesn't."
          - "He sits down with the phone in his hand."
      player_status: observer_window_open

    - id: veronique_looks_at_tulips
      order: 7
      duration_target_seconds: 6
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Veronique sees the tulips."
          - "Water has spilled onto the table. Petals are bent."
          - "Her hand tightens on her handbag strap."
      player_status: observer_window_open

  themes_realized_here:
    - actor: alain
      theme: frozen_silent_after_phone_destruction
      mechanism: "Alain's full silence — voice signature realized as cornered_pragmatist"
      evidence_required: [alain_holds_phone_silent_beat, alain_attempts_to_speak_fails_beat]
      blocks_progression_if_missing: true

  state_changes_committed:
    - key: runtime_intelligence.veronique_about_to_smash_tulips
      to_value: true
      commit_irreversible: false
    - key: environment_state.coffee_table_state
      to_value: water_spilled_phone_pieces_present
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 45

  next_point:
    step_id: opening_v2_035_veronique_smashes_tulips
    handoff: "Veronique grabs her handbag and smashes the tulips. Second irreversible commit fires."
    carry_forward:
      - veronique_about_to_smash_tulips
      - alain_voice_now_cornered_pragmatist_realized
