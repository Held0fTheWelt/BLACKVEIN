canonical_path_step:
  sequence: 21
  id: opening_v2_021_rum_poured_caring_parent_crap
  path_id: goc_opening_canonical_path_v2
  name: "021 - Rum lands, 'caring parent crap', quartermaster-on-slave-ship jibe"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 5
    summary: >-
      With rum in hand, Alain doubles down on his cynicism. He repeats
      'this caring-parent crap' and adds the 'quartermaster on a slave
      ship' image about Veronique's shouting. Veronique reacts. Annette,
      now lubricated, begins to find her angry voice but still anchored
      to the household.

  duration_target_seconds: 75
  duration_max_seconds: 100

  theme_coverage_phase_refs:
    - actor: alain
      phase_id: strategic_cynicism_revealed
      realization_step: true
      climax: true
    - actor: annette
      phase_id: alliance_with_veronique_against_men
      realization_step: false
      seed: true

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
  object_refs:
    - object_id: rum_bottle_cuban
      source: objects/appartment_vallon/living_room/rum_bottle.yaml

  present:
    named_characters: [veronique, michel, annette, alain]

  preconditions:
    inherited_from_previous_step:
      - rum_in_four_glasses
      - meeting_to_salon_conversion_irreversible

  mandatory_beats:

    - id: veronique_re_asserts_two_teeth
      order: 1
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: re_assert_two_teeth_louder
        required_facts: ["two_teeth_louder_token: two incisors, one of them permanently"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_new_teeth
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "five or six words, louder than before"
      player_status: observer_window_open

    - id: alain_caring_parent_crap_repeat
      order: 2
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: repeat_caring_parent_crap_with_emphasis
        required_facts:
          - "crap_repeat_token: this caring-parent crap again"
          - "bickering_token: and the bickering"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_caring_parent_crap
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two short clauses, openly contemptuous"
        tone_hint: defensive_lawyer_cracking
      player_status: observer_window_open

    - id: veronique_visible_breath_intake
      order: 3
      duration_target_seconds: 3
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Veronique sets her glass down with a hard click."
      player_status: observer_window_open

    - id: alain_quartermaster_on_slave_ship
      order: 4
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: jibe_about_screaming_quartermaster_on_slave_ship
        required_facts:
          - "screaming_token: she is screaming"
          - "slave_ship_token: a quartermaster on a slave ship"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_quartermaster
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two short clauses, cruel-clever"
        forbidden_drift: [apologetic_pullback, smile_warmly]
      forces_response_chain:
        target_actor: veronique
        target_intent: what_about_her_she_isnt_screaming
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: veronique_what_about_her
      order: 5
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: counter_what_about_her_she_screamed_too
        required_facts:
          - "what_about_her_token: what about her"
          - "she_screamed_too_token: she just screamed too"
          - "their_kid_was_right_token: that their kid was right to beat ours"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_their_kid_right
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "three clauses, raised voice"
      forces_response_chain:
        target_actor: annette
        target_intent: defend_he_was_right_at_least_not_a_wimp
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: annette_he_was_right_no_wimpy_faggot
      order: 6
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: defend_son_was_right_at_least_not_wimpy
        required_facts:
          - "he_was_right_token: he was right"
          - "at_least_not_wimp_token: at least our kid isn't a wimp"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_at_least_not_wimp
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two short clauses, harsh-defensive"
        forbidden_drift: [reflective_softening]
      forces_response_chain:
        target_actor: veronique
        target_intent: yours_is_a_snitch_isnt_that_better
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: veronique_yours_is_a_snitch_better
      order: 7
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: counter_yours_is_a_snitch_supposed_to_be_better
        required_facts: ["snitch_better_token: yours is a snitch, that is supposed to be better"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_snitch_remark
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "five to seven words, sarcastic-clean"
      player_status: observer_window_open

    - id: michel_we_are_all_decent_people_mitigating
      order: 8
      duration_target_seconds: 8
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: try_to_calm_we_are_all_decent_people
        required_facts:
          - "decent_token: we are all decent people, all four of us"
          - "unnecessary_token: it is entirely unnecessary"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_decent_people
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, mediating-warm-thinning"
      forces_response_chain:
        target_actor: veronique
        target_intent: stop_mitigating_no_more
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: veronique_stop_mitigating
      order: 9
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: tell_michel_to_stop_mitigating_superficially_fair_minded
        required_facts:
          - "stop_mitigating_token: oh Michel, stop it, enough mitigating"
          - "no_longer_fair_token: let us not be fair-minded at all"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_fairminded
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, principled-hot"
      player_status: observer_window_open

  themes_realized_here:
    - actor: alain
      theme: quartermaster_on_a_slave_ship_jibe
      mechanism: "ironic mocking image of host wife's voice as authoritarian woman"
      evidence_required: [alain_speaks_slave_ship_token]
      blocks_progression_if_missing: true
    - actor: alain
      theme: this_caring_parent_crap_register
      mechanism: "repeated, no longer a slip — explicit register"
      evidence_required: [alain_speaks_crap_repeat_token]
      blocks_progression_if_missing: true

  state_changes_committed:
    - key: runtime_intelligence.civility_crack_count
      to_value: 5
      commit_irreversible: false
    - key: runtime_intelligence.host_unity_question_seeded
      to_value: { trigger: veronique_tells_michel_stop_mitigating }
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 60

  next_point:
    step_id: opening_v2_022_drink_fueled_accusations_peak
    handoff: "Pressure peaks under alcohol. Drink-fueled exchange reaches the brink. Annette's body begins to react."
    carry_forward:
      - host_unity_question_seeded
      - civility_crack_count_five
      - alain_voice_signature_now_defensive_lawyer_cracking
