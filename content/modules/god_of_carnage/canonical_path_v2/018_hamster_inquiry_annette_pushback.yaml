canonical_path_step:
  sequence: 18
  id: opening_v2_018_hamster_inquiry_annette_pushback
  path_id: goc_opening_canonical_path_v2
  name: "018 - Hamster moral inquiry returns, Annette's first sharp pushback"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 5
    summary: >-
      Nach Alains zweitem Call kehrt das Hamster-Thema in schärfer zurück.
      Michel macht den Snitch-Witz auf Alain ('außer es stimmt'). Annette
      reagiert spitz, fragt 'Ist mein Sohn ein Snitch?'. Michel weicht aus
      ('Witz'), aber Annette spitzt zu: 'Eurer ist auch einer.' Veronique
      versucht zu schlichten ('wir sind komplett vom Thema ab'). Annettes
      Pushback wird zum ersten echten Bruch der Höflichkeit.

  duration_target_seconds: 70
  duration_max_seconds: 95

  theme_coverage_phase_refs:
    - actor: annette
      phase_id: maternal_defense_first_signal
      realization_step: true
      climax: true
    - actor: michel
      phase_id: defending_pragmatic_realism
      realization_step: true
    - actor: veronique
      phase_id: parental_principle_pressure
      realization_step: true

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
    use_fields: [plausible_actions]

  present:
    named_characters: [veronique, michel, annette, alain]

  preconditions:
    inherited_from_previous_step:
      - first_civility_crack_logged_irreversible
      - alain_call_dependency_visible_to_room

  mandatory_beats:

    - id: alain_call_me_a_snitch
      order: 1
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: drop_remark_about_call_me_a_snitch_gets_a_rise
        required_facts: ["snitch_remark_token: nenn mich einen Snitch, das treibt mich an"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_snitch_remark
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "ein Halbsatz, beim Telefon-Wegstecken"
      player_status: observer_window_open

    - id: michel_unless_its_true
      order: 2
      duration_target_seconds: 2
      beat_pattern_ref: single_word_challenge
      beat_pattern_params:
        actor: michel
        challenge_target_word: snitch
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_snitch_remark
        max_words: 3
      forces_response_chain:
        target_actor: alain
        target_intent: confused_what
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: alain_what
      order: 3
      duration_target_seconds: 1
      beat_pattern_ref: single_word_challenge
      beat_pattern_params:
        actor: alain
        challenge_target_word: what
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_snitch_remark
        max_words: 1
      player_status: observer_window_open

    - id: michel_if_the_shoe_fits
      order: 4
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: complete_the_joke_with_if_the_shoe_fits
        required_facts: ["shoe_fits_token: wenn es passt"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_snitch_remark
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "drei bis vier Wörter, joke-tone, halb defensiv"
      forces_response_chain:
        target_actor: annette
        target_intent: sharp_question_is_my_son_a_snitch
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: annette_my_son_is_a_snitch
      order: 5
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: ask_sharply_my_son_is_a_snitch
        required_facts: ["my_son_snitch_token: mein Sohn ist ein Snitch"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_snitch_remark
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "fünf bis sechs Wörter, harte Frage"
        forbidden_drift: [voice_softens_again]
      forces_response_chain:
        target_actor: michel
        target_intent: retreat_with_was_a_joke
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: michel_was_joking
      order: 6
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: retreat_with_come_on_was_joking
        required_facts: ["joke_retreat_token: komm schon, war ein Witz"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_snitch_remark
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "fünf bis sechs Wörter, defensiv-jovial"
      forces_response_chain:
        target_actor: annette
        target_intent: counter_so_is_yours_anyway
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: annette_so_is_yours_anyway
      order: 7
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: counter_so_is_your_son_anyway
        required_facts: ["yours_is_too_token: eurer ist auch einer"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_snitch_remark
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "fünf Wörter, sharp counter"
      forces_response_chain:
        target_actor: michel
        target_intent: defend_we_coaxed_it_out
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: michel_we_coaxed_it
      order: 8
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: defend_we_coaxed_it_out_of_him
        required_facts: ["coaxed_token: wir haben es ihm abgerungen"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_coaxed
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "fünf bis sechs Wörter, fest"
      player_status: observer_window_open

    - id: veronique_completely_off_point
      order: 9
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: try_to_redirect_we_are_completely_off_point
        required_facts: ["off_point_token: wir sind komplett vom Thema ab"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_off_point
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "vier bis sechs Wörter, mediating"
      player_status: observer_window_open

    - id: annette_maybe_you_coaxed_but_he_snitched
      order: 10
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: insist_with_maybe_you_coaxed_but_he_did_snitch
        required_facts:
          - "maybe_coaxed_token: vielleicht habt ihr ihn dazu gedrängt"
          - "but_he_snitched_token: aber er hat ihn ans Messer geliefert"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_coaxed
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "zwei Halbsätze, scharf-präzisierend"
      forces_response_chain:
        target_actor: alain
        target_intent: try_to_calm_wife_nancy
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: alain_nancy_calming
      order: 11
      duration_target_seconds: 2
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: address_wife_with_name_to_calm
        required_facts: ["name_call_token: Annette"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_coaxed
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "ein Wort"
      forces_response_chain:
        target_actor: annette
        target_intent: rebound_with_what_to_alain
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: annette_what_to_michel
      order: 12
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: turn_to_michel_directly_you_think_my_son_is_a_snitch
        required_facts:
          - "what_token: was"
          - "to_michel_token: zu Michel"
          - "snitch_pressing_token: glaubst du, mein Sohn ist ein Snitch"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_snitch_remark
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "zwei Sätze, harte Konfrontation an Michel adressiert"
      forces_response_chain:
        target_actor: michel
        target_intent: deny_thinking_anything
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: michel_i_dont_think_anything
      order: 13
      duration_target_seconds: 2
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: deny_with_i_dont_think_anything
        required_facts: ["dont_think_token: ich denke gar nichts"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_off_point
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "drei Wörter, defensiv"
      player_status: observer_window_open

    - id: annette_dont_make_insinuations
      order: 14
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: lay_down_dont_make_insinuations_if_no_opinion
        required_facts:
          - "nothing_token: wenn du nichts denkst"
          - "no_insinuations_token: dann mach keine Andeutungen"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_off_point
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "zwei kurze Sätze, hart-prinzipientreu"
      player_status: observer_window_open

  themes_realized_here:
    - actor: annette
      theme: zachary_has_never_been_violent_apology_seed
      mechanism: "verlässt politeness und verteidigt Sohn explizit gegen Snitch-Vorwurf"
      evidence_required: [annette_speaks_my_son_snitch_token, annette_speaks_no_insinuations_token]
      blocks_progression_if_missing: true
    - actor: michel
      theme: we_coaxed_it_out_of_him_about_snitching
      mechanism: "first defense of own son in same room"
      evidence_required: [michel_speaks_coaxed_token]
      blocks_progression_if_missing: true

  state_changes_committed:
    - key: runtime_intelligence.second_civility_crack_logged
      to_value:
        triggered_by: michel_snitch_joke
        owner: annette_first_real_pushback
      commit_irreversible: true
    - key: runtime_intelligence.annette_voice_signature_transition_request
      to_value:
        from: tight_polite_investment_broker
        to: investment_broker_growing_protective
        ready_at_step: "018"
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 60
    escape_via_player_initiative:
      allowed: false

  next_point:
    step_id: opening_v2_019_apology_stalemate_new_teeth
    handoff: >-
      Aus dem Snitch-Pushback wird die offene Apologie-Sackgasse. Veronique
      versucht zu glätten, Alain wirft 'er kriegt neue Zähne' rein, und der
      'caring parent crap'-Ton bricht durch.
    carry_forward:
      - second_civility_crack_logged_irreversible
      - annette_voice_transition_logged
      - alliance_phase_B_still_active_couples_strained
