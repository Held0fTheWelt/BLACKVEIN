canonical_path_step:
  sequence: 10
  id: opening_v2_010_snitch_sense_of_honor
  path_id: goc_opening_canonical_path_v2
  name: "010 - Snitch discussion, 'sense of honor requires social context'"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 3
    continues_scene_from_step: opening_v2_009_root_canal_observation_period
    summary: >-
      Veronique recounts that Bruno did not want to name the attacker at first.
      Michel confirms amiably and adds half-honestly that it was not only a
      sense of honor but also fear of the snitch label. Veronique counters:
      honor requires social context. Annette asks how they finally learned the
      name.

  duration_target_seconds: 70
  duration_max_seconds: 95

  theme_coverage_phase_refs:
    - actor: veronique
      phase_id: parental_principle_pressure
      realization_step: true
    - actor: michel
      phase_id: hospitable_husband_with_first_cracks
      realization_step: true

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
    use_fields: [plausible_actions]

  present:
    named_characters: [veronique, michel, annette, alain]

  mandatory_beats:

    - id: veronique_he_didnt_want_to_tell
      order: 1
      duration_target_seconds: 10
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: state_bruno_did_not_want_to_name_attacker
        required_facts:
          - "reluctance_token: he did not want to talk about Ferdinand"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_didnt_want_to_tell
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "one or two sentences, maternal storytelling tone"
      player_status: observer_window_open

    - id: michel_no_he_didnt
      order: 2
      duration_target_seconds: 3
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: michel
        echoed_phrase_token: "no, he didn't want to"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_didnt_want_to_tell
        word_count_target: 4
      player_status: observer_window_open

    - id: veronique_kid_with_no_face_left
      order: 3
      duration_target_seconds: 12
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: describe_brunos_state_after_attack_and_silence
        required_facts:
          - "no_face_left_token: the child had no face left, no teeth"
          - "still_silent_token: and still would not talk"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_no_face_left
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two sentences, weighted but not melodramatic"
        forbidden_drift: [graphic_injury_description, tearful_register]
      forces_response_chain:
        target_actor: annette
        target_intent: minimal_sympathy_acknowledgement
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: annette_i_can_imagine
      order: 4
      duration_target_seconds: 2
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: annette
        echoed_phrase_token: "I can imagine"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_no_face_left
        word_count_target: 4
        tone: polite_neutral
      player_status: observer_window_open

    - id: michel_snitch_honest_admission
      order: 5
      duration_target_seconds: 10
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: admit_brunos_silence_was_also_fear_of_snitch_label
        required_facts:
          - "snitch_fear_token: fear of being seen as a snitch"
          - "honest_admission_token: honestly, not only a sense of honor"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_snitch_fear
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two sentences, with half self-correction"
        forbidden_drift: [defensive_softening, undermine_veronique_openly]
      player_status: observer_window_open

    - id: veronique_sense_of_honor_social_context
      order: 6
      duration_target_seconds: 10
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: counter_with_sense_of_honor_requires_social_context
        required_facts:
          - "concession_token: that may well be"
          - "principle_token: honor requires social context"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_sense_of_honor
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two sentences, principled tone"
        forbidden_drift: [lecture_on_civilization, sound_pedagogical]
      forces_response_chain:
        target_actor: annette
        target_intent: acknowledge_briefly
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: annette_naturally
      order: 7
      duration_target_seconds: 2
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: annette
        echoed_phrase_token: "of course"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_sense_of_honor
        word_count_target: 1
      player_status: observer_window_open

    - id: annette_how_did_you_get_the_name
      order: 8
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: ask_how_they_got_ferdinand_name
        required_facts:
          - "name_extraction_question_token: how did you finally learn the name"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_how_we_got_name
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "one question, curious and polite"
      forces_response_chain:
        target_actor: veronique
        target_intent: explain_they_explained_to_bruno
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: veronique_we_explained_to_him
      order: 9
      duration_target_seconds: 8
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: explain_we_told_bruno_protecting_attacker_wouldnt_help
        required_facts:
          - "explanation_token: we explained to him"
          - "protect_attacker_no_help_token: protecting that child does no good"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_explained_to_him
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "one or two sentences, composed"
      player_status: observer_window_open

  player_intrusion_windows:
    - beat_pattern_ref: player_intrusion_redirect_strict
      beat_pattern_params:
        between_beat_a: michel_snitch_honest_admission
        between_beat_b: veronique_sense_of_honor_social_context
        allowed: [silent_observation, small_gesture, speak_minimally]
        forbidden: [propose_alternative_for_npc, speak_for_another_npc]
        redirect_kind: narrator_perception_redirect

  themes_realized_here:
    - actor: veronique
      theme: sense_of_honor_requires_social_context
      mechanism: "frames Michel's pragmatic qualification in principled terms"
      evidence_required: [veronique_speaks_principle_token]
      blocks_progression_if_missing: true
    - actor: michel
      theme: hes_eleven_not_an_adult_either
      mechanism: "preparation — first quiet differentiation from Veronique"
      evidence_required: [michel_speaks_snitch_fear_token]
      blocks_progression_if_missing: false

  state_changes_committed:
    - key: runtime_intelligence.snitch_thread_opened
      to_value: true
      commit_irreversible: true
    - key: runtime_intelligence.first_michel_veronique_micro_divergence
      to_value: { topic: brunos_silence_motivation }
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 60
    escape_via_player_initiative:
      allowed: false

  next_point:
    step_id: opening_v2_011_alain_first_walter_call
    handoff: >-
      Midway through the moral explanation, Alain's phone vibrates. First
      Walter call: Lancet/Antril/ataxia. phone_interruption_recurrent pattern
      fires for the first time.
    carry_forward:
      - snitch_thread_opened
      - first_michel_veronique_micro_divergence_logged
      - dental_and_moral_context_both_present_in_room
