canonical_path_step:
  sequence: 16
  id: opening_v2_016_cobbler_eating_recipe_tooth_jab
  path_id: goc_opening_canonical_path_v2
  name: "016 - Cobbler eating, apple/pear recipe, Alain's first tooth-sarcasm jab"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 5
    continues_scene_from_step: opening_v2_015_back_to_living_room_cobbler
    summary: >-
      Veronique asks Alain about sugar (no). Alain asks what kind of cobbler
      it is. Veronique names apple/pear as her own recipe and explains the trick
      detail: cut the pear thicker than the apple. Michel reveals with a grin
      that she is hiding the real trick: gingerbread crumbs. Alain drops 'at
      least we get a new recipe out of it' — Veronique counters sharply: 'I wish
      my son had not lost two teeth in the process.' First visible scratch in
      the civility surface.

  duration_target_seconds: 65
  duration_max_seconds: 90

  theme_coverage_phase_refs:
    - actor: veronique
      phase_id: hospitality_under_strain
      realization_step: true
      climax: true
    - actor: alain
      phase_id: pedantic_corrections_inside_room
      realization_step: true

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
    use_fields: [plausible_actions, sensory_tags]
  object_refs:
    - object_id: cobbler_dish_on_tray
      source: objects/appartment_vallon/kitchen/cobbler.yaml
    - object_id: espresso_cups
      source: objects/appartment_vallon/kitchen/espresso_cup.yaml

  present:
    named_characters: [veronique, michel, annette, alain]

  mandatory_beats:

    - id: veronique_sugar_to_alain
      order: 1
      duration_target_seconds: 2
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: ask_alain_about_sugar
        required_facts: ["sugar_token: sugar"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_recipe
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "one word as a question"
      forces_response_chain:
        target_actor: alain
        target_intent: decline_sugar_then_ask_cobbler_kind
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: alain_no_sugar_what_kind_of_cobbler
      order: 2
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: decline_sugar_then_ask_cobbler_variety
        required_facts:
          - "no_sugar_token: no, no sugar"
          - "cobbler_kind_question_token: what kind of cobbler is this"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_recipe
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "two short statements, neutral"
      forces_response_chain:
        target_actor: veronique
        target_intent: name_apple_pear
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: veronique_apple_and_pear
      order: 3
      duration_target_seconds: 2
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: name_apple_and_pear
        required_facts: ["recipe_kind_token: apple and pear"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_recipe
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "three words"
      player_status: observer_window_open

    - id: annette_apple_and_pear_echo
      order: 4
      duration_target_seconds: 1
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: annette
        echoed_phrase_token: "apple and pear?"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_recipe
        word_count_target: 3
        tone: polite_neutral
      player_status: observer_window_open

    - id: veronique_my_own_recipe_too_cold
      order: 5
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: claim_own_recipe_and_lament_cobbler_cold
        required_facts:
          - "own_recipe_token: my own little recipe"
          - "too_cold_token: it got too cold, a shame"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_recipe
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two half-sentences, light pride with a small laugh"
      player_status: observer_window_open

    - id: annette_apple_pear_new
      order: 6
      duration_target_seconds: 2
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: annette
        echoed_phrase_token: "apple and pear, that is new to me"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_recipe
        word_count_target: 6
        tone: polite_neutral
      player_status: observer_window_open

    - id: veronique_apple_pear_classic_trick
      order: 7
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: explain_pear_thicker_than_apple_trick
        required_facts:
          - "classic_token: apple and pear is a classic"
          - "trick_token: you have to cut the pear thicker than the apple"
          - "pear_cooks_faster_token: because the pear cooks faster"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_recipe
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two sentences, didactic and proud"
      player_status: observer_window_open

    - id: michel_real_secret_grin
      order: 8
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: tease_veronique_didnt_tell_them_the_real_secret
        required_facts: ["real_secret_token: she is not telling you the real trick"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_gingerbread
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "one sentence, warm and teasing"
      player_status: observer_window_open

    - id: veronique_let_them_taste
      order: 9
      duration_target_seconds: 2
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: defer_with_let_them_taste_it
        required_facts: ["taste_token: let them taste it"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_gingerbread
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "three words"
      player_status: observer_window_open

    - id: tasting_silence
      order: 10
      duration_target_seconds: 3
      beat_pattern_ref: silence_perception_pause
      beat_pattern_params:
        trigger_after_beat: veronique_let_them_taste
        silence_duration_seconds: 3
        perception_lines:
          - "Alain tastes."
          - "Annette tastes."
      player_status: observer_window_open

    - id: alain_very_good_very_good
      order: 11
      duration_target_seconds: 2
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: compliment_minimally_twice
        required_facts: ["very_good_token: very good. very good."]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_gingerbread
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "two short repetitions"
      player_status: observer_window_open

    - id: annette_delicious
      order: 12
      duration_target_seconds: 1
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: annette
        echoed_phrase_token: "delicious"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_gingerbread
        word_count_target: 1
        tone: friendly_confirmation
      player_status: observer_window_open

    - id: veronique_gingerbread_crumbs
      order: 13
      duration_target_seconds: 2
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: reveal_secret_gingerbread_crumbs
        required_facts: ["gingerbread_token: gingerbread crumbs"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_gingerbread
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "one word, triumphant"
      player_status: observer_window_open

    - id: annette_oh_my_god
      order: 14
      duration_target_seconds: 1
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: annette
        echoed_phrase_token: "oh my God"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_gingerbread
        word_count_target: 3
        tone: friendly_confirmation
      player_status: observer_window_open

    - id: veronique_betty_crocker_recipe_from_mother_in_law
      order: 15
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: confess_betty_crocker_inspired_from_michels_mother
        required_facts:
          - "betty_crocker_token: jazzed-up Betty Crocker variant"
          - "mother_in_law_token: I got the idea from his mother"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_gingerbread
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "one sentence, confidential and charming"
      player_status: observer_window_open

    - id: alain_at_least_we_get_a_new_recipe
      order: 16
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: insert_sarcastic_at_least_new_recipe_jab
        required_facts:
          - "fantastic_gingerbread_token: gingerbread, fantastic"
          - "at_least_new_recipe_token: at least we get a new recipe out of it"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_at_least_recipe
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two half-sentences, light sarcasm signal"
        forbidden_drift: [open_cruelty_register]
        tone_hint: detached_dry_with_first_sarcasm
      forces_response_chain:
        target_actor: veronique
        target_intent: sharp_counter_about_lost_teeth
        max_delay_seconds: 2
      player_status: observer_window_open

    - id: veronique_wished_son_didnt_lose_two_teeth
      order: 17
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: counter_with_wish_son_didnt_have_to_lose_teeth_in_the_process
        required_facts:
          - "wish_token: I wish"
          - "two_teeth_token: two teeth lost"
          - "in_the_process_token: in the process"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_at_least_recipe
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "one sentence, sharp and calm"
      forces_response_chain:
        target_actor: alain
        target_intent: half_recoil_with_yeah_thats_what_i_meant
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: alain_yeah_thats_what_i_meant
      order: 18
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: half_recoil_with_thats_what_i_meant
        required_facts: ["half_recoil_token: yes, sure, that is what I meant"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_at_least_recipe
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "five or six words, defensive"
      forces_response_chain:
        target_actor: annette
        target_intent: criticize_husband_novel_way_of_expressing_it
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: annette_novel_way_of_expressing
      order: 19
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: criticize_alain_novel_way_of_expressing_himself
        required_facts: ["novel_way_token: you have a novel way of putting that"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_at_least_recipe
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "one sentence, quiet reproach to spouse"
      player_status: observer_window_open

  themes_realized_here:
    - actor: veronique
      theme: apple_pear_thicker_recipe_signature
      mechanism: "proud recipe explanation with trick detail"
      evidence_required: [veronique_speaks_classic_token, veronique_speaks_trick_token]
      blocks_progression_if_missing: true
    - actor: alain
      theme: he_didnt_realize_how_serious_it_was
      mechanism: "sarcasm 'at least we get a new recipe' makes detached_pedantry visible as first_signal_of_cruelty"
      evidence_required: [alain_speaks_at_least_new_recipe_token]
      blocks_progression_if_missing: true

  state_changes_committed:
    - key: runtime_intelligence.first_civility_crack_logged
      to_value:
        triggered_by: alain_at_least_new_recipe_jab
        countered_by: veronique_two_teeth_in_the_process
        spouse_pressure: annette_criticizes_alain_to_him
      commit_irreversible: true
    - key: environment_state.cobbler_state
      to_value: being_eaten
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 55
    escape_via_player_initiative:
      allowed: false

  next_point:
    step_id: opening_v2_017_alain_second_walter_call
    handoff: >-
      Just at the moment of first visible tension, Alain's phone vibrates a
      second time — Walter, this time with strategy questions about the A.S.M.
      and the response line. phone_interruption_recurrent fires again.
    carry_forward:
      - first_civility_crack_logged_irreversible
      - alain_first_sarcasm_signal_logged
      - annette_visible_spouse_pressure_logged
