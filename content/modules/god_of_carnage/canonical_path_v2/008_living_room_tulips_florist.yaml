canonical_path_step:
  sequence: 8
  id: opening_v2_008_living_room_tulips_florist
  path_id: goc_opening_canonical_path_v2
  name: "008 - Living room, Annette compliments tulips, florist talk, tooth question begins"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 3
    summary: >-
      Annette is in the living room fetching her coat. She compliments the
      tulips. Veronique names the florist on a distant street, explains that
      the flowers were flown in directly from Holland. The Cowans drift toward
      the foyer, followed by the Vallon-Houllies. Annette asks the first
      question about the damaged tooth.

  duration_target_seconds: 75
  duration_max_seconds: 110

  theme_coverage_phase_refs:
    - actor: veronique
      phase_id: hospitality_under_strain
      realization_step: true
    - actor: annette
      phase_id: polite_admiration_register
      realization_step: true

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
    use_fields: [description, entrances_exits, sensory_tags, plausible_actions]
  object_refs:
    - object_id: tulips_bouquet
      source: objects/appartment_vallon/living_room/tulips.yaml
    - object_id: coffee_table_art_books
      source: objects/appartment_vallon/living_room/coffee_table.yaml
    - object_id: subway_view_window
      source: objects/appartment_vallon/living_room/window.yaml

  present:
    named_characters: [veronique, michel, annette, alain]

  preconditions:
    inherited_from_previous_step:
      - civility_frame_active_sense_of_community
      - annette_in_living_room_first

  mandatory_beats:

    - id: living_room_first_perception
      order: 1
      duration_target_seconds: 6
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "The living room feels modest and homely, with improvised furniture and a few ethnic accents."
          - "On the coffee table lie art books; in a clear vase stands a large bouquet of tulips."
        sensory_anchors:
          - locations/appartment_vallon/living_room.yaml#sensory_tags
          - objects/appartment_vallon/living_room/tulips.yaml#sensory_tags
      player_status: observer_no_initiative

    - id: annette_compliments_tulips
      order: 2
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: compliment_tulips_simply
        required_facts:
          - "tulips_token: the tulips"
          - "praise_token: gorgeous"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_tulips_gorgeous
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "three to five words, simple admiration"
        forbidden_drift: [elaborate_on_floral_theory]
      forces_response_chain:
        target_actor: veronique
        target_intent: name_the_florist_and_provenance
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: veronique_names_florist
      order: 3
      duration_target_seconds: 10
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: name_florist_with_location_and_invite_recognition
        required_facts:
          - "florist_location_token: small florist on a distant street"
          - "recognition_invite_token: do you know it"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_florist
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two short sentences, hostess pride"
      player_status: observer_window_open

    - id: annette_acknowledges_florist
      order: 4
      duration_target_seconds: 2
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: annette
        echoed_phrase_token: "oh yes"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_florist
        word_count_target: 3
        tone: polite_neutral
      player_status: observer_window_open

    - id: veronique_bulbs_from_holland
      order: 5
      duration_target_seconds: 10
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: brag_tulip_bulbs_flown_from_holland_with_price
        required_facts:
          - "origin_token: flown in directly from Holland"
          - "price_token: twenty dollars per shipment"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_florist
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "one sentence with origin and price"
      player_status: observer_window_open

    - id: annette_acknowledges_facts_pattern
      order: 6
      duration_target_seconds: 3
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: annette
        echoed_phrase_token: "oh I see"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_florist
        word_count_target: 3
        tone: polite_neutral
      player_status: observer_window_open

    - id: veronique_asks_again_if_recognized
      order: 7
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: press_recognition_question_one_more_time
        required_facts:
          - "recognition_repeat_token: do you know it, up at the top"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_florist
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "five to seven words, light insistence"
      player_status: observer_window_open

    - id: annette_acknowledges_third_time
      order: 8
      duration_target_seconds: 2
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: annette
        echoed_phrase_token: "yes yes"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_florist
        word_count_target: 3
        tone: polite_neutral
      player_status: observer_window_open

    - id: cowans_drift_toward_foyer_followed
      order: 9
      duration_target_seconds: 6
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Annette and Alain drift toward the foyer."
          - "Veronique and Michel follow close behind."
        player_status: observer_no_initiative

    - id: annette_asks_about_damaged_tooth
      order: 10
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: ask_about_tooth_with_damaged_nerve
        required_facts:
          - "tooth_token: the tooth with the nerve damage"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_damaged_tooth
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "a short question with concrete injury reference"
        forbidden_drift: [express_pity_in_excess]
      forces_response_chain:
        target_actor: veronique
        target_intent: explain_dental_uncertainty
        max_delay_seconds: 4
      player_status: observer_window_open

  player_intrusion_windows:
    - beat_pattern_ref: player_intrusion_redirect_strict
      beat_pattern_params:
        between_beat_a: cowans_drift_toward_foyer_followed
        between_beat_b: annette_asks_about_damaged_tooth
        allowed: [silent_observation, look_at_named_object, small_gesture, speak_minimally]
        forbidden: [propose_alternative_for_npc, leave_the_room]
        redirect_kind: narrator_perception_redirect

  themes_realized_here:
    - actor: veronique
      theme: hostess_florist_pride
      mechanism: "triple insistence on florist recognition + bulbs-from-Holland detail"
      evidence_required: [veronique_speaks_holland_token, veronique_repeats_recognition_invite]
      blocks_progression_if_missing: true
    - actor: annette
      theme: tulips_are_gorgeous_compliment
      mechanism: "living-room small talk opened by an unprovoked compliment"
      evidence_required: [annette_speaks_tulips_gorgeous_token]
      blocks_progression_if_missing: true
    - actor: annette
      theme: asking_about_tooth_appropriately
      mechanism: "concrete question about nerve damage, not emotional, not evasive"
      evidence_required: [annette_speaks_damaged_tooth_token]
      blocks_progression_if_missing: true

  state_changes_committed:
    - key: environment_state.current_location
      to_value: living_room
      commit_irreversible: false
    - key: runtime_intelligence.civility_extension_logged
      to_value: { mechanism: tulip_compliment_triggered_hosting_loop, by: annette }
      commit_irreversible: false
    - key: runtime_intelligence.dental_topic_opened
      to_value: true
      commit_irreversible: true

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 60
    escape_via_player_initiative:
      allowed: false

  next_point:
    step_id: opening_v2_009_root_canal_observation_period
    handoff: >-
      Annette's tooth question has hijacked the conversation. Veronique must
      now explain the dental situation — nerve damage, observation period.
    carry_forward:
      - dental_topic_open
      - hosting_loop_extended
      - actors_clustered_near_foyer
