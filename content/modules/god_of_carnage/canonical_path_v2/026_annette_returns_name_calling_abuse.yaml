      Annette returns from the bathroom. Veronique meets her in the doorway.
      Apologies exchanged. Annette announces that in the bathroom she
      thought it over: 'Name-calling is a kind of abuse.' Pushback follows.
      Snitch and source-of-problem reappear with Annette pressing 'Zachary
      has never been a violent child, he must have had his reasons.' The
      alliance configuration begins to flip toward women-vs-men.

  duration_target_seconds: 75
  duration_max_seconds: 100

  theme_coverage_phase_refs:
