canonical_path_step:
  sequence: 9
  id: opening_v2_009_root_canal_observation_period
  path_id: goc_opening_canonical_path_v2
  name: "009 - Dental explanation: nerve, observation, root canal, implants"
  mode: scripted_mandatory_dialog

  scene_anchor:
    scene: 3
    continues_scene_from_step: opening_v2_008_living_room_tulips_florist
    summary: >-
      Veronique explains clinically why the nerve damage is not yet final:
      only part of the nerve is exposed, hence an observation period instead
      of immediate root canal treatment. Michel adds amiably. It is mentioned
      that permanent implants are only possible after growth ends. Annette
      voices restrained hope. An uncomfortable pause follows.

  duration_target_seconds: 65
  duration_max_seconds: 95

  theme_coverage_phase_refs:
    - actor: veronique
      phase_id: hospitality_under_strain
      realization_step: true
    - actor: michel
      phase_id: hospitable_husband_with_first_cracks
      realization_step: true

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
    use_fields: [plausible_actions]

  present:
    named_characters: [veronique, michel, annette, alain]

  preconditions:
    inherited_from_previous_step:
      - dental_topic_open
      - injury_facts_visible_to_all

  mandatory_beats:

    - id: veronique_nerve_partially_exposed
      order: 1
      duration_target_seconds: 12
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: explain_nerve_only_partially_exposed
        required_facts:
          - "uncertainty_token: no prognosis yet"
          - "partial_exposure_token: nerve only partially exposed"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_root_canal
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two sentences, clinical and matter-of-fact"
      player_status: observer_window_open

    - id: michel_only_part_is_exposed
      order: 2
      duration_target_seconds: 3
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: michel
        echoed_phrase_token: "only part of it"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_root_canal
        word_count_target: 5
      player_status: observer_window_open

    - id: veronique_no_devitalization_yet
      order: 3
      duration_target_seconds: 10
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: explain_no_devitalization_yet
        required_facts:
          - "no_devitalization_token: no devitalization yet"
          - "exposed_vs_protected_token: part exposed, part protected"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_root_canal
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two sentences, weighing tone"
      player_status: observer_window_open

    - id: michel_give_the_tooth_a_chance
      order: 4
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: offer_the_tooth_a_chance_phrase
        required_facts:
          - "chance_token: give the tooth a chance"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_root_canal
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "five to seven words, warm and hopeful"
      player_status: observer_window_open

    - id: veronique_avoid_root_canal
      order: 5
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: state_wish_to_avoid_root_canal
        required_facts:
          - "avoid_token: avoid root canal if possible"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_root_canal
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "one sentence, quiet"
      forces_response_chain:
        target_actor: annette
        target_intent: acknowledge_with_natural_sympathy
        max_delay_seconds: 3
        target_pattern_ref: amiable_echo
      player_status: observer_window_open

    - id: annette_of_course
      order: 6
      duration_target_seconds: 2
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: annette
        echoed_phrase_token: "of course"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_root_canal
        word_count_target: 1
        tone: polite_neutral
      player_status: observer_window_open

    - id: veronique_observation_period
      order: 7
      duration_target_seconds: 8
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: name_observation_period_for_nerve
        required_facts:
          - "observation_period_token: observation period until the nerve can heal"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_observation_period
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "one sentence, clinical"
      player_status: observer_window_open

    - id: michel_caps_meantime
      order: 8
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: note_caps_in_meantime
        required_facts:
          - "caps_token: caps in the meantime"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_implants
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "one half-sentence, pragmatic"
      player_status: observer_window_open

    - id: veronique_implants_after_eighteen
      order: 9
      duration_target_seconds: 8
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: explain_implants_only_after_growth_ends
        required_facts:
          - "implant_age_token: permanent implants only after growth ends"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_implants
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "one or two sentences, matter-of-fact"
      forces_response_chain:
        target_actor: annette
        target_intent: voice_modest_hope
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: annette_hope_it_turns_out_ok
      order: 10
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: voice_modest_hope_with_visible_hesitation
        required_facts:
          - "hope_token: hopefully it will all turn out fine"
          - "hesitation_marker_token: I hope ... I hope"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_hope_turns_out
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "one half-sentence with visible repetition"
      player_status: observer_window_open

    - id: uncomfortable_beat_silence
      order: 11
      duration_target_seconds: 4
      beat_pattern_ref: silence_perception_pause
      beat_pattern_params:
        trigger_after_beat: annette_hope_it_turns_out_ok
        silence_duration_seconds: 4
        perception_lines:
          - "A slightly uncomfortable pause."
        closes_window_when: duration_elapsed
      player_status: observer_window_open

  themes_realized_here:
    - actor: veronique
      theme: dental_detail_dignified_explanation
      mechanism: "clinical matter-of-factness + wish to avoid root canal"
      evidence_required: [veronique_speaks_observation_period_token, veronique_speaks_avoid_root_canal_token]
      blocks_progression_if_missing: true
    - actor: michel
      theme: houseware_supply_job_register
      mechanism: "not yet active, but pragmatic echo pattern holds"
      evidence_required: [michel_two_amiable_echoes_in_step]
      blocks_progression_if_missing: false

  state_changes_committed:
    - key: runtime_intelligence.dental_facts_explained
      to_value:
        - nerve_partially_exposed
        - observation_period_active
        - caps_meantime
        - permanent_implants_only_after_growth_ends
      commit_irreversible: true
    - key: runtime_intelligence.uncomfortable_beat_logged
      to_value: { kind: post_hope_silence, owner: shared }
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 55
    escape_via_player_initiative:
      allowed: false

  next_point:
    step_id: opening_v2_010_snitch_sense_of_honor
    handoff: >-
      After the medical factual layer, Veronique shifts to the moral frame:
      why Bruno did not want to give the attacker's name at first. That opens
      the snitch discussion and the sense-of-honor debate.
    carry_forward:
      - dental_facts_explained_irreversible
      - uncomfortable_silence_logged
      - hosting_loop_still_active
