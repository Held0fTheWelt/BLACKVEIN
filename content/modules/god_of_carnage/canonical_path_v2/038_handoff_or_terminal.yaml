canonical_path_step:
  sequence: 38
  id: opening_v2_038_handoff_or_terminal
  path_id: goc_opening_canonical_path_v2
  name: "038 - Phase_1 sustained-play handoff or terminal close"
  mode: phase_1_play_handoff

  scene_anchor:
    scene: terminal
    summary: >-
      The opening canonical path is complete. Depending on runtime mode,
      the engine either hands play off to phase_1 sustained play
      (returning to the interior, allowing the player to explore the
      aftermath of the destruction) or executes a terminal close that
      ends the experience with the ironic park reveal as the last
      committed beat.

  duration_target_seconds: 20
  duration_max_seconds: 30

  theme_coverage_phase_refs: []  # all actor arcs already realized through 037

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
    use_fields: [plausible_actions]
  support_refs:
    - location_id: park_edge
      source: locations/exterior/park_edge.yaml
      use_fields: [description]

  present:
    named_characters: [veronique, michel, annette, alain]
    note: >-
      The cut-back to the interior brings all four actors back into frame
      but their positions, voice signatures, and state changes from the
      destruction sequence are intact.

  preconditions:
    inherited_from_previous_step:
      - hamster_alive_irreversible
      - boys_reconciled_irreversible
      - alliance_phase_F_ironic_reset_realized
      - all_destruction_commits_irreversible

  mandatory_beats:

    - id: handoff_decision_perception
      order: 1
      duration_target_seconds: 8
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "The light has changed in the living room."
          - "Nobody has moved much."
          - "The smashed tulips, the dead phone, the warped Kokoschka catalog are all visible."
      player_status: observer_window_open

    - id: handoff_route_selector
      order: 2
      duration_target_seconds: 12
      director_instruction:
        handoff_router:
          mode_dispatch:
            phase_1_sustained_play:
              condition: runtime_mode == continuous_play
              action: hand_off_to_scene_graph_node(phase_1_aftermath_living_room)
              committed_state_carried_forward:
                - all_voice_signatures_in_terminal_states
                - all_alliance_history_irreversible
                - all_object_destruction_states_irreversible
                - hamster_alive_outside
            terminal_close:
              condition: runtime_mode == single_session_terminal
              action: emit_session_close_beat
              terminal_state_recorded: act_one_complete_with_ironic_counter
        player_status: observer_window_open

  themes_realized_here: []

  state_changes_committed:
    - key: runtime_intelligence.opening_canonical_path_v2_complete
      to_value: true
      commit_irreversible: true
    - key: runtime_intelligence.handoff_summary
      to_value:
        total_steps_executed: 38
        irreversible_commits_fired:
          - kokoschka_destroyed_at_023
          - phone_destroyed_at_033
          - tulips_destroyed_at_035
          - hamster_alive_at_037
          - boys_reconciled_at_037
        voice_signature_terminal_states:
          veronique: moral_idealist_screaming_in_collapse
          michel: cynical_pragmatist_unmasked
          annette: drunk_broken_destructive
          alain: cornered_pragmatist_phone_destroyed
        alliance_phases_visited:
          - phase_A_couples_united
          - phase_B_couples_strained
          - phase_C_women_vs_men
          - phase_D_spouses_vs_spouses
          - phase_E_everyone_vs_everyone
          - phase_F_ironic_reset
      commit_irreversible: true

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    minimum_seconds_elapsed: 15

  next_point:
    step_id: null
    handoff: >-
      End of canonical_path_v2 opening. Either scene_graph_node
      phase_1_aftermath_living_room picks up sustained play, or the
      session closes with the act-one terminal commit.
    carry_forward:
      - opening_canonical_path_v2_complete
      - all_destruction_irreversible
      - all_voice_signatures_in_terminal_states
