  # ==================================================================
  # GATE ASSERTIONS  (consumed by tests/gates/test_theme_arc_realization.py)
  # ==================================================================

  gate_assertions:

    test_theme_arc_realization:
      description: >-
        For every actor's arc phase, every theme listed in `themes` must be
        observably realized in at least one beat of one realization_step,
        and at least one theme must fire in the climax_step. If any
        blocking_deadline_step is reached without the corresponding phase
        themes realized, the gate fails with degradation_signal
        `theme_arc_starvation`.

      per_actor_rules:
        veronique:
          - all_blocking_themes_realized_within_deadline_steps
          - voice_signature_consistent_within_phase
          - voice_signature_transitions_only_at_declared_steps
          - irreversible_commit_at_022_for_kokoschka
          - irreversible_commit_at_035_for_tulips_smashing
        michel:
          - all_blocking_themes_realized_within_deadline_steps
          - voice_signature_consistent_within_phase
          - hamster_revelation_lands_by_step_012
          - cynical_unmasking_lands_by_step_030
        annette:
          - all_blocking_themes_realized_within_deadline_steps
          - voice_signature_transitions_only_at_declared_steps
          - kokoschka_destruction_at_023_irreversible
          - phone_destruction_at_033_irreversible
          - drunken_rage_lands_by_step_032
        alain:
          - all_blocking_themes_realized_within_deadline_steps
          - three_phone_calls_fire_at_011_017_027
          - phone_destruction_at_033_irreversible
          - voice_signature_call_register_only_during_phone_beats

      failure_codes:
        - theme_arc_starvation
        - voice_signature_drift_inside_phase
        - voice_signature_transition_outside_allowed_step
        - blocking_deadline_passed_without_realization
        - irreversible_commit_skipped

    test_alliance_configuration_realization:
      description: >-
        Each alliance phase must be observably committed to runtime
        state by the end of its declared step range. Premature shifts
        (e.g. women-vs-men alliance forming before step 024) are
        rejected with degradation_signal `alliance_premature_shift`.

      rules:
        - phase_A_committed_by_step_009
        - phase_B_active_until_step_017
        - phase_C_starts_at_step_024_not_earlier
        - phase_D_starts_at_step_029_not_earlier
        - phase_E_starts_at_step_033_not_earlier
        - phase_F_committed_at_step_037

      runtime_state_keys_checked:
        - runtime_intelligence.alliance_configuration_active
        - runtime_intelligence.alliance_configuration_history
        - environment_state.actors_positioning_clusters

      failure_codes:
        - alliance_premature_shift
        - alliance_skipped_phase
        - alliance_never_committed_in_runtime_state

    test_object_theme_irreversibility:
      description: >-
        Each load-bearing object that gets destroyed in the script must
        have an irreversible state commit at exactly its destruction step.
        Missing commits are rejected with `irreversible_object_skipped`.

      rules:
        - kokoschka_destroyed_at_023_committed_irreversibly
        - tulips_destroyed_at_035_committed_irreversibly
        - phone_destroyed_at_033_committed_irreversibly
        - hamster_alive_at_037_committed_irreversibly

      runtime_state_keys_checked:
        - environment_state.kokoschka_catalog_state
        - environment_state.tulips_bouquet_state
        - environment_state.alain_phone_state
        - environment_state.hamster_state

      failure_codes:
        - irreversible_object_skipped
        - object_destroyed_at_wrong_step
        - object_destroyed_reversibly_when_should_be_irreversible

    test_pattern_signature_per_actor:
      description: >-
        Each actor has at least one pattern_signature (beat_library
        reference) that defines their canonical voice mechanism. The gate
        verifies that the signature pattern fires at least once in the
        actor's entry phase and remains usable until the documented voice
        transition step.

      rules:
        - veronique_uses_paraphrase_required_with_facts_throughout
        - michel_uses_amiable_echo_until_step_028
        - annette_voice_pattern_to_be_defined_in_phase_4_steps
        - alain_uses_single_word_challenge_in_entry
        - alain_uses_phone_interruption_recurrent_at_011_017_027

      failure_codes:
        - signature_pattern_never_fires_in_entry_phase
        - signature_pattern_persists_past_transition_step

  # ==================================================================
  # FAILURE MODES (taxonomy for runtime degradation_signals)
  # ==================================================================

  failure_modes:

    theme_arc_starvation:
      severity: error
      description: >-
        An actor's blocking theme for a phase is not observably realized
        by the phase's blocking_deadline_step.
      recovery_policy: >-
        LDSS regenerates the most recent step output with explicit
        theme-bias toward the starved theme. Up to 2 regenerate attempts
        before marking the step degraded.
      example: >-
        Step 011 ends without alain_visible_facts including ataxia_mention.
        Theme `antril_lancet_ataxia_disclosure` starved. Regenerate the
        phone-call beats with the missing fact tokens forced.

    voice_signature_drift_inside_phase:
      severity: error
      description: >-
        An actor's spoken line in step N uses a voice register that does
        not match the phase's voice_signature_during_phase.
      recovery_policy: >-
        Reject the line, regenerate with the correct register. The
        runtime_voice_consistency_v2 validator carries the enforcement.

    voice_signature_transition_outside_allowed_step:
      severity: error
      description: >-
        An actor's voice register changes at a step not listed in
        voice_signature_transitions. E.g. Michel becomes cynical at
        step 015 instead of step 028.
      recovery_policy: >-
        Reject the transition. Force the prior register. Log the
        attempted-premature-transition to runtime_intelligence for RCA.

    alliance_premature_shift:
      severity: error
      description: >-
        Runtime state shows an alliance configuration active before its
        declared phase start step.
      recovery_policy: >-
        Reject the alliance state mutation. Force the configuration to
        the prior phase's value. Mark step degraded.

    irreversible_object_skipped:
      severity: error
      description: >-
        An object destruction step completes without committing the
        expected irreversible state change.
      recovery_policy: >-
        Force the commit retroactively if the visible output supports it;
        otherwise mark the step degraded and require operator review
        before next-step unlock.

