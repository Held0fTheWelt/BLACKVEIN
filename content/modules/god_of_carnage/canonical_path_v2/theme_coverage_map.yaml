theme_coverage_map:
  id: goc_theme_coverage_map_v1
  version: v1.0.0-phase3
  status: draft
  produced_by_phase: 3
  consumed_by_schema: canonical_path_v2/_schema_v2.yaml
  consumed_by_engine: ai_stack/live_dramatic_scene_simulator.py  # planned Phase 5
  consumed_by_gate: tests/gates/test_theme_arc_realization.py     # planned Phase 6

  purpose: >-
    For each of the four named actors and for the cross-cutting alliance and
    object arcs, declares the complete theme progression across the
    anticipated 38-step canonical_path_v2. Every theme has an entry step,
    one or more realization steps, a climax step, and a blocking deadline:
    if the theme is not observably realized by that deadline, the step does
    not unlock and the gate test fails. This is the script-fidelity
    enforcement layer that prevents the LDSS from substituting plausible
    LLM continuations for the actual play's load-bearing beats.

  scope:
    source_release:
      kind: shooting_script
      release: polanski_2011_carnage
      note: "The canonical_path_v2 is self-contained; the external script source is not bundled."
    total_canonical_steps_anticipated: 38
    canonical_path_v2_pilots_built: [004, 005, 006]
    canonical_path_v2_to_build: [007, 008, 009, 010, 011, 012, 013, 014, 015,
                                   016, 017, 018, 019, 020, 021, 022, 023,
                                   024, 025, 026, 027, 028, 029, 030, 031,
                                   032, 033, 034, 035, 036, 037, 038]
    name_mapping_ref: script_anchor/polanski_to_reza_name_map.yaml

