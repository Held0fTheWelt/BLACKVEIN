canonical_path_step:
  sequence: 22
  id: opening_v2_022_drink_fueled_accusations_peak
  path_id: goc_opening_canonical_path_v2
  name: "022 - Drink-fueled accusations peak, Annette's body begins to react"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 6
    summary: >-
      The accusation cycle peaks. Each couple defends their child, alliances
      remain along couple lines but with louder volume. Veronique becomes
      visibly brittle about books on the coffee table — the Kokoschka
      catalog is foregrounded as a thematic anchor. Annette's body begins
      to react: she puts down her glass, presses her hand to her stomach,
      grows visibly pale.

  duration_target_seconds: 70
  duration_max_seconds: 95

  theme_coverage_phase_refs:
    - actor: veronique
      phase_id: kokoschka_catastrophe
      realization_step: false
      seed: true
    - actor: annette
      phase_id: physical_collapse_kokoschka
      realization_step: false
      seed: true

  location_ref:
    location_id: living_room
    source: locations/appartment_vallon/living_room.yaml
  object_refs:
    - object_id: kokoschka_catalog
      source: objects/appartment_vallon/living_room/art_book_kokoschka.yaml
      use_fields: [description, sensory_tags, current_position]
    - object_id: coffee_table_art_books
      source: objects/appartment_vallon/living_room/coffee_table.yaml
    - object_id: rum_bottle_cuban
      source: objects/appartment_vallon/living_room/rum_bottle.yaml

  present:
    named_characters: [veronique, michel, annette, alain]

  preconditions:
    inherited_from_previous_step:
      - host_unity_question_seeded
      - civility_crack_count_five

  mandatory_beats:

    - id: alain_top_up_self_pour
      order: 1
      duration_target_seconds: 4
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Alain pours himself another glass without asking."
      player_status: observer_window_open

    - id: veronique_kokoschka_highlight
      order: 2
      duration_target_seconds: 8
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: surface_kokoschka_catalog_into_conversation
        required_facts:
          - "kokoschka_token: my Kokoschka catalog"
          - "art_devotion_token: this volume is irreplaceable"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_kokoschka
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, briefly proud-defensive"
      player_status: observer_window_open

    - id: alain_provocation_about_books
      order: 3
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: dismiss_book_pride_with_dry_provocation
        required_facts: ["books_token: books"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_kokoschka
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "three or four words, dry"
        tone_hint: defensive_lawyer_cracking
      player_status: observer_window_open

    - id: annette_physical_signs_perception
      order: 4
      duration_target_seconds: 6
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Annette has stopped drinking."
          - "She presses her hand to her stomach, sets her glass on the coffee table."
          - "Her face has gone pale."
      player_status: observer_window_open

    - id: veronique_attacks_alain_callousness
      order: 5
      duration_target_seconds: 7
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: attack_alain_for_dismissive_attitude
        required_facts:
          - "callous_token: you don't care about anyone but your client"
          - "moral_corruption_token: people like you destroy what little remains"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_dont_give_a_shit
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, accusatory-warmth-gone"
      forces_response_chain:
        target_actor: alain
        target_intent: counter_what_do_i_owe_you
        max_delay_seconds: 3
      player_status: observer_window_open

    - id: alain_what_do_i_owe_you
      order: 6
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: counter_what_do_i_owe_you_lady
        required_facts:
          - "owe_token: what do I owe you"
          - "this_is_your_house_token: we came to your house, not the other way around"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_dont_give_a_shit
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two clauses, lawyer-stripped"
      player_status: observer_window_open

    - id: michel_we_are_all_decent_people_repeat_collapsing
      order: 7
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: weakly_repeat_we_are_all_decent_people
        required_facts: ["decent_repeat_token: we are all decent people"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_decent_people
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "five or six words, weakening"
        tone_hint: amiable_with_first_cynic_edges
      player_status: observer_window_open

    - id: veronique_no_we_are_not
      order: 8
      duration_target_seconds: 3
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: explicitly_reject_we_are_all_decent
        required_facts: ["not_decent_token: no we are not"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_decent_people
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "four words, cold"
      player_status: observer_window_open

    - id: annette_stands_unsteadily
      order: 9
      duration_target_seconds: 6
      beat_pattern_ref: narrator_perception_block
      beat_pattern_params:
        perception_lines:
          - "Annette stands up, unsteadily."
          - "She presses her hand harder to her stomach."
          - "Her face is pale; she struggles for words."
      player_status: observer_window_open

    - id: annette_excuse_me_im_not_well
      order: 10
      duration_target_seconds: 4
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: excuse_self_briefly_im_not_well
        required_facts: ["not_well_token: excuse me, I'm not feeling well"]
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_not_well
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "four to six words, weak but composed"
      player_status: observer_window_open

  themes_realized_here:
    - actor: veronique
      theme: art_devotion_revealed_only_when_destroyed
      mechanism: "seed beat — Kokoschka surfaced explicitly before destruction"
      evidence_required: [veronique_speaks_kokoschka_token]
      blocks_progression_if_missing: false
    - actor: veronique
      theme: art_books_as_devotion
      mechanism: "first time art-book theme is voiced inside the conflict"
      evidence_required: [veronique_speaks_art_devotion_token]
      blocks_progression_if_missing: false
    - actor: annette
      theme: gags_loses_composure
      mechanism: "body begins to react before language can — physical seed for next step"
      evidence_required: [annette_visible_pale_face, annette_glass_set_down]
      blocks_progression_if_missing: true

  state_changes_committed:
    - key: runtime_intelligence.civility_crack_count
      to_value: 7
      commit_irreversible: false
    - key: environment_state.annette_physical_state
      to_value:
        state: pre_gag_pale_unsteady
        location: standing_uneasy
      commit_irreversible: false
    - key: environment_state.kokoschka_catalog_state
      to_value: highlighted_on_coffee_table_within_reach
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 60

  next_point:
    step_id: opening_v2_023_annette_vomits_kokoschka
    handoff: "Annette's body wins. She vomits — on the catalog. Irreversible commit fires."
    carry_forward:
      - annette_pre_gag_state
      - kokoschka_highlighted_within_reach
      - alain_counter_lawyer_register_active
