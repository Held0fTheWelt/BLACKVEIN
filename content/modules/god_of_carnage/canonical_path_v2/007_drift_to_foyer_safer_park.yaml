canonical_path_step:
  sequence: 7
  id: opening_v2_007_drift_to_foyer_safer_park
  path_id: goc_opening_canonical_path_v2
  name: "007 - Drift toward foyer, 'safer park' irony, 'sense of community'"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 2
    continues_scene_from_step: opening_v2_006_armed_vs_carrying
    summary: >-
      Veronique prints the corrected statement and hands it to Annette.
      Alain begins stepping backward toward the foyer. Michel and Veronique
      comment ironically that Parc Montsouris was always thought safe.
      Veronique thanks them for coming, names the adversarial stance they are
      avoiding, invokes a sense of community. Alain undercuts with
      'the children haven't got that yet — our child'. Annette echoes
      'our child' and crosses into the living room.

  duration_target_seconds: 60
  duration_max_seconds: 85

  theme_coverage_phase_refs:
    - actor: veronique
      phase_id: meeting_chair_civility
      realization_step: true
    - actor: alain
      phase_id: ready_to_leave_minimal_speech
      realization_step: true
    - actor: michel
      phase_id: amiable_silent_co_signer
      realization_step: true

  location_ref:
    location_id: longstreet_den
    source: locations/appartment_vallon/den.yaml
    use_fields: [entrances_exits, plausible_actions]
  support_refs:
    - location_id: longstreet_foyer
      source: locations/appartment_vallon/foyer.yaml
      use_fields: [description, entrances_exits, sensory_tags]
  object_refs:
    - object_id: paper_with_statement
      source: objects/appartment_vallon/den/printed_statement.yaml
      use_fields: [interaction_notes]

  present:
    named_characters: [veronique, michel, annette, alain]

  preconditions:
    inherited_from_previous_step:
      - statement_text_corrected_to_carrying
      - first_compromise_logged
      - alain_voice_seed_pedantic_minimal

  mandatory_beats:

    - id: veronique_prints_and_hands_paper
      order: 1
      duration_target_seconds: 6
      director_instruction:
        narrator_perception_only:
          - "Veronique prints the single sheet and hands it to Annette."
          - "Alain begins stepping backward toward the foyer."
        player_status: observer_no_initiative

    - id: veronique_brooklyn_bridge_park_was_safe
      order: 2
      duration_target_seconds: 8
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: state_ironic_reflection_we_thought_the_park_was_safe
        required_facts:
          - "park_token: Parc Montsouris"
          - "comparison_token: unlike other parts of the city"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_safer_park
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "one or two sentences, quiet ironic tone"
        forbidden_drift:
          - turn_irony_into_open_accusation
          - elaborate_on_neighborhood_demographics
      player_status: observer_window_open

    - id: michel_confirms_safer_park
      order: 3
      duration_target_seconds: 4
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: michel
        echoed_phrase_token: "Parc Montsouris was always safe"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_safer_park
        word_count_target: 4
        tone: friendly_confirmation
      player_status: observer_window_open

    - id: michel_extends_with_other_park
      order: 4
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: michel
        intent: extend_safer_park_irony_with_named_other_park
        required_facts:
          - "alternative_park_token: another park as comparison"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_safer_park
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "a short half-sentence, half drifting away"
        forbidden_drift:
          - explicit_demographic_judgement
          - extended_neighborhood_history
      player_status: observer_window_open

    - id: veronique_thanks_and_adversarial_mindset
      order: 5
      duration_target_seconds: 12
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: thank_for_coming_and_name_adversarial_mindset_as_avoided
        required_facts:
          - "thank_token: thank you for coming"
          - "adversarial_mindset_token: no adversarial stance here"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_adversarial_mindset
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two sentences: thanks + naming the adversarial tone being avoided"
        forbidden_drift:
          - thank_excessively
          - moralize_about_litigation_culture
      forces_response_chain:
        source_beat_id: veronique_thanks_and_adversarial_mindset
        target_actor: annette
        target_intent: reciprocate_thanks_with_minimum_register
        max_delay_seconds: 4
        failure_handling: regenerate_target_response
      player_status: observer_window_open

    - id: annette_reciprocates_thanks
      order: 6
      duration_target_seconds: 5
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: annette
        intent: reciprocate_thanks_minimally_with_emphasis
        required_facts:
          - "thank_back_token: but we thank you"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_adversarial_mindset
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "three to six words, emphasized"
        forbidden_drift:
          - elaborate_on_what_she_is_thankful_for
      player_status: observer_window_open

    - id: veronique_we_dont_have_to_thank_each_other_sense_of_community
      order: 7
      duration_target_seconds: 10
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: veronique
        intent: deflect_thanks_and_invoke_sense_of_community
        required_facts:
          - "community_token: we still have a sense of community"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_sense_of_community
        paraphrase_policy: structural_paraphrase_required
        minimum_visible: "two sentences, principled tone"
        forbidden_drift:
          - extended_civics_lecture
          - sound_pedagogical
      player_status: observer_window_open

    - id: alain_kids_havent_got_that_notion_straight
      order: 8
      duration_target_seconds: 6
      beat_pattern_ref: paraphrase_required_with_facts
      beat_pattern_params:
        actor: alain
        intent: undermine_community_claim_via_kids_havent_got_it_yet
        required_facts:
          - "kids_token: the children haven't got that yet"
          - "our_kid_token: our child"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_our_kid
        paraphrase_policy: short_anchor_quote_allowed
        minimum_visible: "two short sentences, the second quieter than the first"
        forbidden_drift:
          - smile_warmly
          - elaborate_on_what_ferdinand_doesnt_get
      forces_response_chain:
        target_actor: annette
        target_intent: echo_the_our_kid_phrase
        max_delay_seconds: 3
        failure_handling: regenerate_target_response
        target_pattern_ref: amiable_echo
      player_status: observer_window_open

    - id: annette_echoes_our_kid
      order: 9
      duration_target_seconds: 3
      beat_pattern_ref: amiable_echo
      beat_pattern_params:
        actor: annette
        echoed_phrase_token: "our child"
        quote_anchor: knowledge/opening_quote_anchors.yaml#quote_our_kid
        word_count_target: 3
        tone: polite_neutral
      player_status: observer_window_open

  optional_micro_beats:

    - id: annette_walks_into_living_room_for_coat
      trigger: after(annette_echoes_our_kid)
      condition: always_fires
      director_instruction:
        narrator_perception_only:
          - "Annette crosses into the living room to fetch her coat."
        player_status: observer_window_open

  player_intrusion_windows:
    - beat_pattern_ref: player_intrusion_redirect_strict
      beat_pattern_params:
        between_beat_a: veronique_we_dont_have_to_thank_each_other_sense_of_community
        between_beat_b: alain_kids_havent_got_that_notion_straight
        allowed: [silent_observation, look_to_spouse, small_gesture]
        forbidden: [propose_alternative_for_npc, leave_the_room]
        redirect_kind: narrator_perception_redirect

  themes_realized_here:
    - actor: veronique
      theme: civility_via_procedure
      mechanism: "polite thanks + naming the adversarial tone avoided + sense-of-community frame"
      evidence_required:
        - veronique_speaks_thank_for_coming_token
        - veronique_speaks_adversarial_mindset_token
        - veronique_speaks_sense_of_community_token
      blocks_progression_if_missing: true
    - actor: alain
      theme: detached_pedantry_first_signal
      mechanism: "subtle undercut of the sense-of-community frame via 'the children haven't got that yet'"
      evidence_required:
        - alain_speaks_our_kid_token
        - alain_does_not_warm_the_undercut
      blocks_progression_if_missing: true
    - actor: michel
      theme: amiable_supporter_posture
      mechanism: "echo of the safer-park theme plus a friendly-toned park-comparison extension of his own"
      evidence_required:
        - michel_echoes_safer_park
      blocks_progression_if_missing: false

  state_changes_committed:
    - key: environment_state.statement_text_state
      to_value: printed_and_handed_to_guests
      commit_irreversible: true
    - key: environment_state.actors_positioning
      to_value:
        veronique: standing_near_desk
        michel: drifting_toward_foyer_with_guests
        annette: walking_into_living_room
        alain: drifting_toward_front_door
      commit_irreversible: false
    - key: runtime_intelligence.civility_frame_active
      to_value:
        frame: sense_of_community
        installed_by: veronique
        underminded_micro_by: alain
      commit_irreversible: false

  next_step_unlock_when:
    all_mandatory_beats_realized: true
    all_blocking_themes_realized: true
    minimum_seconds_elapsed: 50
    escape_via_player_initiative:
      allowed: false

  next_point:
    step_id: opening_v2_008_living_room_tulips_florist
    handoff: >-
      Annette has already crossed into the living room to fetch her coat.
      The planned farewell is now cut short by the tulip compliment and the
      endless civility chain.
    carry_forward:
      - statement_printed_irreversible
      - civility_frame_active_sense_of_community
      - alain_first_undercut_logged
      - annette_in_living_room_first
