canonical_path_step:
  sequence: 19
  id: opening_v2_019_apology_stalemate_new_teeth
  path_id: goc_opening_canonical_path_v2
  name: "019 - Apology stalemate, 'He'll get new teeth!', sarcasm escalation"
  mode: scripted_with_player_window

  scene_anchor:
    scene: 5
    summary: >-
      Veronique tries to redirect toward the apology. Alain blurts out
      'he'll get new teeth, better ones, no one chewed his ear off'.
      Annette tells Alain to go ('coward'). Alain explains he risks losing
      his biggest client. The 'caring parent crap' phrase lands. Veronique
      reasserts the lost incisors fact. Alain says 'right, yeah, I think
      we got that'. Veronique pushes back: 'one of them permanently'.

  duration_target_seconds: 75
  duration_max_seconds: 100

  theme_coverage_phase_refs:
