# God of Carnage Module
# Canonical reference implementation for the World of Shadows system
# A single two-act play scenario structured as a formal content module

module_id: god_of_carnage
title: God of Carnage
description: |-
  Single two-act play scenario: a dinner party escalating from polite negotiation
  to emotional and relational breakdown. Four characters, multiple relationship axes,
  formal trigger recognition system, and defined end states.

# Module versioning
version: "0.1.0"
contract_version: "0.2.0"

# Content specification
content:
  # Duration and structure
  duration_turns_estimated: "12-15"
  scene_phases: 5

  # Player roles and party composition
  num_player_characters: 2
  num_npc_characters: 2
  total_characters: 4

  # Setting and scope
  setting: "Paris apartment, evening dinner party"
  narrative_scope: "Escalation from civility through moral negotiation to breakdown"

  # Formal constraints
  max_escalation_level: 100
  max_emotional_state: 100
  relationship_stability_min: 0
  relationship_stability_max: 100

# Module organization references
files:
  - characters.yaml              # Character definitions and properties
  - relationships.yaml           # Relationship axes and dynamics
  - escalation_axes.yaml         # Escalation dimensions and measurement
  - scenes.yaml                  # Scene structure and sequence
  - transitions.yaml             # Scene transition conditions
  - triggers.yaml                # Trigger definitions and recognition set
  - endings.yaml                 # End state conditions and closure rules
  - direction/system_prompt.md           # LLM system prompt guidance
  - direction/scene_guidance.yaml        # Per-scene constraints and context
  - direction/opening_sequence.yaml      # Session opening: two-part handover + narrator bar (ADR-0035)
  - direction/character_voice.yaml       # Character voice and tone guidance
  - locale/module_strings.yaml           # Shell / diegetic player-visible strings per session_output_language
  - locale/player_input_rules.yaml       # Data-only player-input patterns (greeting imperative, future rules)
  - locale/model_directives/session_output_language_de.md
  - locale/model_directives/session_output_language_en.md
  - apartment_layout.yaml              # Rooms, adjacency, visibility, privacy, offscreen rules (English)
  - apartment_objects.yaml             # Object placement and materiality (English; ids align with locale affordances)
  - actor_pressure_profiles.yaml       # Per-character pressure (English)
  - phase_beat_policy.yaml             # Allowed beats and forbidden early escalations (English)
  - knowledge/premise_and_backstory.yaml
  - knowledge/narrator_sensory_palette.yaml
  - knowledge/opening_scene_sequence.yaml
  - knowledge/hard_forbidden_rules.yaml

# Quality principles
quality_principles:
  - "This module is reference, not exception: all engine logic must work for any similarly-structured module"
  - "No special-case God of Carnage runtime logic in the engine"
  - "All character behavior flows through formal state transitions and validated triggers"
  - "Relationships and escalation governed by explicit axes, not narrative prose"

# Runtime intelligence policy
# Module data opts into generic runtime governance features. The engine consumes
# these generic switches; it must not branch on this module's concrete actors,
# rooms, phases, beats, or prose.
runtime_intelligence:
  action_resolution_short_path:
    enabled: true
    blocked_player_input_kinds:
      - speech
      - question
      - meta
      - mixed
    allowed_player_input_kinds:
      - action
      - movement_action
      - perception
      - perception_action
      - object_interaction
      - physical_action
      - environment_interaction
      - wait_or_observe
    allowed_verbs:
      - activate
      - deactivate
      - listen_to
      - look_at
      - move_to
      - open
      - place
      - stand_up
      - take
  visible_projection:
    enabled: true
    require_origin_metadata: true
    hard_failure_behavior: recover
  capability_gate:
    forbidden_capability_behavior: reject
    missing_required_capability_behavior: recover
  continuity:
    hooks:
      - module_continuity_impacts_on_commit_v1
  callback_web:
    enabled: true
    schema_version: callback_web_policy.v1
    max_edges: 80
    max_observations: 60
    max_graph_edges: 4
    max_evidence_refs_per_candidate: 8
    allowed_continuity_classes:
      - situational_pressure
      - dignity_injury
      - alliance_shift
      - revealed_fact
      - refused_cooperation
      - blame_pressure
      - repair_attempt
      - silent_carry
  scene_energy:
    enabled: true
    schema_version: scene_energy_policy.v1
    default_maximum_visible_density_count: 8
    scene_function_profiles:
      establish_pressure:
        energy_level: contained
        pressure_vector: social
        tempo: standard
        density: focused
        volatility: stable
        target_transition: hold
        minimum_actor_response_count: 1
      escalate_conflict:
        energy_level: rising
        pressure_vector: rupture
        tempo: accelerating
        density: layered
        volatility: unstable
        target_transition: rise
        minimum_actor_response_count: 2
      redirect_blame:
        energy_level: rising
        pressure_vector: social
        tempo: accelerating
        density: layered
        volatility: unstable
        target_transition: rise
        minimum_actor_response_count: 2
      probe_motive:
        energy_level: contained
        pressure_vector: moral
        tempo: compressed
        density: focused
        volatility: unstable
        target_transition: hold
        minimum_actor_response_count: 1
      repair_or_stabilize:
        energy_level: contained
        pressure_vector: repair
        tempo: compressed
        density: focused
        volatility: stable
        target_transition: deescalate
        minimum_actor_response_count: 1
      withhold_or_evade:
        energy_level: contained
        pressure_vector: evasive
        tempo: still
        density: sparse
        volatility: unstable
        target_transition: hold
        minimum_actor_response_count: 0
      reveal_surface:
        energy_level: rising
        pressure_vector: exposure
        tempo: standard
        density: focused
        volatility: unstable
        target_transition: rise
        minimum_actor_response_count: 1
      scene_pivot:
        energy_level: contained
        pressure_vector: social
        tempo: compressed
        density: focused
        volatility: stable
        target_transition: pivot
        minimum_actor_response_count: 1
    pacing_profiles:
      thin_edge:
        tempo: still
        density: sparse
        target_transition: hold
        maximum_visible_density_count: 4
      compressed:
        tempo: compressed
        density: focused
        maximum_visible_density_count: 5
      containment:
        energy_level: contained
        target_transition: pivot
        maximum_visible_density_count: 6
      multi_pressure:
        energy_level: volatile
        density: layered
        volatility: breaking
        target_transition: rise
        minimum_actor_response_count: 2
  dramatic_irony:
    enabled: true
    schema_version: dramatic_irony.v1
    allowed_sources:
      - npc_private_plan_selected
    allowed_surface_modes:
      - behavioral_echo
      - misread_reaction
      - withheld_context
      - subtext_pressure
    forbidden_surface_modes:
      - direct_hidden_intent_reveal
      - omniscient_reveal
    max_opportunities: 3
    direct_reveal_allowed: false
    model_context_visibility: bounded_surface_only
    require_structured_realization: true
    recovery_behavior: recover
    hidden_fact_echo_check: true
