# Quality principles
quality_principles:
  - "This module is reference, not exception: all engine logic must work for any similarly-structured module"
  - "No special-case God of Carnage runtime logic in the engine"
  - "Canonical path directs story order; phase_beat_policy governs coarse dramatic pacing"
  - "Locations, objects, characters, and quote anchors are referenced, not restated as parallel databases"

# Runtime intelligence policy
# Module data opts into generic runtime governance features. The engine consumes
# these generic switches; it must not branch on this module's concrete actors,
# rooms, phases, beats, or prose.
runtime_intelligence:
  action_resolution_short_path:
    enabled: true
    blocked_player_input_kinds:
      - speech
      - question
      - meta
      - mixed
    allowed_player_input_kinds:
      - action
      - movement_action
      - perception
      - perception_action
      - object_interaction
      - physical_action
      - environment_interaction
      - wait_or_observe
    allowed_verbs:
      - activate
      - deactivate
      - listen_to
      - look_at
      - move_to
      - open
      - place
      - stand_up
      - take
  visible_projection:
    enabled: true
    require_origin_metadata: true
    hard_failure_behavior: recover
  capability_gate:
    forbidden_capability_behavior: reject
    missing_required_capability_behavior: recover
  continuity:
    hooks:
      - module_continuity_impacts_on_commit_v1
  callback_web:
    enabled: true
    schema_version: callback_web_policy.v1
    max_edges: 80
    max_observations: 60
    max_graph_edges: 4
    max_evidence_refs_per_candidate: 8
    allowed_continuity_classes:
      - situational_pressure
      - dignity_injury
      - alliance_shift
      - revealed_fact
      - refused_cooperation
      - blame_pressure
      - repair_attempt
      - silent_carry
  consequence_cascade:
    enabled: true
    schema_version: consequence_cascade_policy.v1
    max_atoms: 80
    max_edges: 120
    max_graph_items: 5
    max_evidence_refs_per_consequence: 8
    decay_after_turns: 4
    allowed_continuity_classes:
      - situational_pressure
      - dignity_injury
      - alliance_shift
      - revealed_fact
      - refused_cooperation
      - blame_pressure
      - repair_attempt
      - silent_carry
      - tension_escalation
  temporal_control:
    enabled: true
    schema_version: temporal_control_policy.v1
    allowed_operations:
      - hold_current_moment
      - advance_elapsed_time
      - recall_committed_past
      - summarize_gap
      - resume_present
    require_structured_events: false
    max_recalled_turns: 3
    max_elapsed_turns: 4
    default_commit_impact: recover
    model_context_visibility: bounded_committed_time_refs
  scene_energy:
    enabled: true
    schema_version: scene_energy_policy.v1
    default_maximum_visible_density_count: 8
    scene_function_profiles:
      establish_pressure:
        energy_level: contained
        pressure_vector: social
        tempo: standard
        density: focused
        volatility: stable
        target_transition: hold
        minimum_actor_response_count: 1
      escalate_conflict:
        energy_level: rising
        pressure_vector: rupture
        tempo: accelerating
        density: layered
        volatility: unstable
        target_transition: rise
        minimum_actor_response_count: 2
      redirect_blame:
        energy_level: rising
        pressure_vector: social
        tempo: accelerating
        density: layered
        volatility: unstable
        target_transition: rise
        minimum_actor_response_count: 2
      probe_motive:
        energy_level: contained
        pressure_vector: moral
        tempo: compressed
        density: focused
        volatility: unstable
        target_transition: hold
        minimum_actor_response_count: 1
      repair_or_stabilize:
        energy_level: contained
        pressure_vector: repair
        tempo: compressed
        density: focused
        volatility: stable
        target_transition: deescalate
        minimum_actor_response_count: 1
      withhold_or_evade:
        energy_level: contained
        pressure_vector: evasive
        tempo: still
        density: sparse
        volatility: unstable
        target_transition: hold
        minimum_actor_response_count: 0
      reveal_surface:
        energy_level: rising
        pressure_vector: exposure
        tempo: standard
        density: focused
        volatility: unstable
        target_transition: rise
        minimum_actor_response_count: 1
      scene_pivot:
        energy_level: contained
        pressure_vector: social
        tempo: compressed
        density: focused
        volatility: stable
        target_transition: pivot
        minimum_actor_response_count: 1
    pacing_profiles:
      thin_edge:
        tempo: still
        density: sparse
        target_transition: hold
        maximum_visible_density_count: 4
      compressed:
        tempo: compressed
        density: focused
        maximum_visible_density_count: 5
      containment:
        energy_level: contained
        target_transition: pivot
        maximum_visible_density_count: 6
      multi_pressure:
        energy_level: volatile
        density: layered
        volatility: breaking
        target_transition: rise
        minimum_actor_response_count: 2
  pacing_rhythm:
    enabled: true
    schema_version: pacing_rhythm_policy.v1
    max_repeated_cadence_count: 2
    default_max_visible_blocks: 6
    cadence_profiles:
      breathe:
        tempo_arc: still
        response_shape: pause
        turn_change_policy: silence_or_action_only
        min_visible_blocks: 0
        max_visible_blocks: 3
        min_actor_turns: 0
        max_actor_turns: 1
        requires_pause: true
      hold:
        tempo_arc: standard
        response_shape: single_beat
        turn_change_policy: allow_hold
        min_visible_blocks: 1
        max_visible_blocks: 6
      press:
        tempo_arc: accelerating
        response_shape: exchange
        turn_change_policy: prefer_actor_turn_change
        min_visible_blocks: 1
        max_visible_blocks: 6
        min_actor_turns: 1
      release:
        tempo_arc: releasing
        response_shape: single_beat
        turn_change_policy: allow_hold
        min_visible_blocks: 1
        max_visible_blocks: 5
        max_actor_turns: 2
      pivot:
        tempo_arc: compressed
        response_shape: exchange
        turn_change_policy: prefer_actor_turn_change
        min_visible_blocks: 1
        max_visible_blocks: 6
      interrupt:
        tempo_arc: accelerating
        response_shape: multi_reaction
        turn_change_policy: require_actor_turn_change
        min_visible_blocks: 2
        max_visible_blocks: 8
        min_actor_turns: 2
    pacing_mode_profiles:
      thin_edge:
        max_visible_blocks: 3
        requires_pause: true
      compressed:
        max_visible_blocks: 5
      multi_pressure:
        min_actor_turns: 2
      containment:
        tempo_arc: compressed
        response_shape: exchange
  sensory_context:
    enabled: true
    schema_version: sensory_context_policy.v1
    min_layers_per_turn: 1
    max_layers_per_turn: 3
    require_structured_events: true
    model_context_visibility: bounded_authored_layers
    intensity_by_pressure_band:
