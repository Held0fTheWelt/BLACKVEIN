# God of Carnage Module
# Canonical reference implementation for the World of Shadows system
# A single two-act play scenario structured as a formal content module

module_id: god_of_carnage
title: God of Carnage
description: |-
  Single two-act play scenario: a dinner party escalating from polite negotiation
  to emotional and relational breakdown. Four characters, multiple relationship axes,
  formal trigger recognition system, and defined end states.

# Module versioning
version: "0.1.0"
contract_version: "0.2.0"

# Content specification
content:
  # Duration and structure
  duration_turns_estimated: "12-15"
  scene_phases: 5

  # Player roles and party composition
  num_player_characters: 2
  num_npc_characters: 2
  total_characters: 4

  # Setting and scope
  setting: "Paris apartment, evening dinner party"
  narrative_scope: "Escalation from civility through moral negotiation to breakdown"

  # Formal constraints
  max_escalation_level: 100
  max_emotional_state: 100
  relationship_stability_min: 0
  relationship_stability_max: 100

# Module organization references
files:
  - characters.yaml              # Character definitions and properties
  - relationships.yaml           # Relationship axes and dynamics
  - escalation_axes.yaml         # Escalation dimensions and measurement
  - scenes.yaml                  # Scene structure and sequence
  - transitions.yaml             # Scene transition conditions
  - triggers.yaml                # Trigger definitions and recognition set
  - endings.yaml                 # End state conditions and closure rules
  - direction/system_prompt.md           # LLM system prompt guidance
  - direction/scene_guidance.yaml        # Per-scene constraints and context
  - direction/opening_sequence.yaml      # Session opening: two-part handover + narrator bar (ADR-0035)
  - direction/character_voice.yaml       # Character voice and tone guidance
  - locale/module_strings.yaml           # Shell / diegetic player-visible strings per session_output_language
  - locale/player_input_rules.yaml       # Data-only player-input patterns (greeting imperative, future rules)
  - locale/model_directives/session_output_language_de.md
  - locale/model_directives/session_output_language_en.md
  - apartment_layout.yaml              # Rooms, adjacency, visibility, privacy, offscreen rules (English)
  - apartment_objects.yaml             # Object placement and materiality (English; ids align with locale affordances)
  - actor_pressure_profiles.yaml       # Per-character pressure (English)
  - phase_beat_policy.yaml             # Allowed beats and forbidden early escalations (English)
  - knowledge/premise_and_backstory.yaml
  - knowledge/narrator_sensory_palette.yaml
  - knowledge/opening_scene_sequence.yaml
  - knowledge/hard_forbidden_rules.yaml

# Quality principles
quality_principles:
  - "This module is reference, not exception: all engine logic must work for any similarly-structured module"
  - "No special-case God of Carnage runtime logic in the engine"
  - "All character behavior flows through formal state transitions and validated triggers"
  - "Relationships and escalation governed by explicit axes, not narrative prose"

# Runtime intelligence policy
# Module data opts into generic runtime governance features. The engine consumes
# these generic switches; it must not branch on this module's concrete actors,
# rooms, phases, beats, or prose.
runtime_intelligence:
  action_resolution_short_path:
    enabled: true
    blocked_player_input_kinds:
      - speech
      - question
      - meta
      - mixed
    allowed_player_input_kinds:
      - action
      - movement_action
      - perception
      - perception_action
      - object_interaction
      - physical_action
      - environment_interaction
      - wait_or_observe
    allowed_verbs:
      - activate
      - deactivate
      - listen_to
      - look_at
      - move_to
      - open
      - place
      - stand_up
      - take
  visible_projection:
    enabled: true
    require_origin_metadata: true
    hard_failure_behavior: recover
  capability_gate:
    forbidden_capability_behavior: reject
    missing_required_capability_behavior: recover
  continuity:
    hooks:
      - module_continuity_impacts_on_commit_v1
  callback_web:
    enabled: true
    schema_version: callback_web_policy.v1
    max_edges: 80
    max_observations: 60
    max_graph_edges: 4
    max_evidence_refs_per_candidate: 8
    allowed_continuity_classes:
      - situational_pressure
      - dignity_injury
      - alliance_shift
      - revealed_fact
      - refused_cooperation
      - blame_pressure
      - repair_attempt
      - silent_carry
  consequence_cascade:
    enabled: true
    schema_version: consequence_cascade_policy.v1
    max_atoms: 80
    max_edges: 120
    max_graph_items: 5
    max_evidence_refs_per_consequence: 8
    decay_after_turns: 4
    allowed_continuity_classes:
      - situational_pressure
      - dignity_injury
      - alliance_shift
      - revealed_fact
      - refused_cooperation
      - blame_pressure
      - repair_attempt
      - silent_carry
      - tension_escalation
  temporal_control:
    enabled: true
    schema_version: temporal_control_policy.v1
    allowed_operations:
      - hold_current_moment
      - advance_elapsed_time
      - recall_committed_past
      - summarize_gap
      - resume_present
    require_structured_events: false
    max_recalled_turns: 3
    max_elapsed_turns: 4
    default_commit_impact: recover
    model_context_visibility: bounded_committed_time_refs
  scene_energy:
    enabled: true
    schema_version: scene_energy_policy.v1
    default_maximum_visible_density_count: 8
    scene_function_profiles:
      establish_pressure:
        energy_level: contained
        pressure_vector: social
        tempo: standard
        density: focused
        volatility: stable
        target_transition: hold
        minimum_actor_response_count: 1
      escalate_conflict:
        energy_level: rising
        pressure_vector: rupture
        tempo: accelerating
        density: layered
        volatility: unstable
        target_transition: rise
        minimum_actor_response_count: 2
      redirect_blame:
        energy_level: rising
        pressure_vector: social
        tempo: accelerating
        density: layered
        volatility: unstable
        target_transition: rise
        minimum_actor_response_count: 2
      probe_motive:
        energy_level: contained
        pressure_vector: moral
        tempo: compressed
        density: focused
        volatility: unstable
        target_transition: hold
        minimum_actor_response_count: 1
      repair_or_stabilize:
        energy_level: contained
        pressure_vector: repair
        tempo: compressed
        density: focused
        volatility: stable
        target_transition: deescalate
        minimum_actor_response_count: 1
      withhold_or_evade:
        energy_level: contained
        pressure_vector: evasive
        tempo: still
        density: sparse
        volatility: unstable
        target_transition: hold
        minimum_actor_response_count: 0
      reveal_surface:
        energy_level: rising
        pressure_vector: exposure
        tempo: standard
        density: focused
        volatility: unstable
        target_transition: rise
        minimum_actor_response_count: 1
      scene_pivot:
        energy_level: contained
        pressure_vector: social
        tempo: compressed
        density: focused
        volatility: stable
        target_transition: pivot
        minimum_actor_response_count: 1
    pacing_profiles:
      thin_edge:
        tempo: still
        density: sparse
        target_transition: hold
        maximum_visible_density_count: 4
      compressed:
        tempo: compressed
        density: focused
        maximum_visible_density_count: 5
      containment:
        energy_level: contained
        target_transition: pivot
        maximum_visible_density_count: 6
      multi_pressure:
        energy_level: volatile
        density: layered
        volatility: breaking
        target_transition: rise
        minimum_actor_response_count: 2
  pacing_rhythm:
    enabled: true
    schema_version: pacing_rhythm_policy.v1
    max_repeated_cadence_count: 2
    default_max_visible_blocks: 6
    cadence_profiles:
      breathe:
        tempo_arc: still
        response_shape: pause
        turn_change_policy: silence_or_action_only
        min_visible_blocks: 0
        max_visible_blocks: 3
        min_actor_turns: 0
        max_actor_turns: 1
        requires_pause: true
      hold:
        tempo_arc: standard
        response_shape: single_beat
        turn_change_policy: allow_hold
        min_visible_blocks: 1
        max_visible_blocks: 6
      press:
        tempo_arc: accelerating
        response_shape: exchange
        turn_change_policy: prefer_actor_turn_change
        min_visible_blocks: 1
        max_visible_blocks: 6
        min_actor_turns: 1
      release:
        tempo_arc: releasing
        response_shape: single_beat
        turn_change_policy: allow_hold
        min_visible_blocks: 1
        max_visible_blocks: 5
        max_actor_turns: 2
      pivot:
        tempo_arc: compressed
        response_shape: exchange
        turn_change_policy: prefer_actor_turn_change
        min_visible_blocks: 1
        max_visible_blocks: 6
      interrupt:
        tempo_arc: accelerating
        response_shape: multi_reaction
        turn_change_policy: require_actor_turn_change
        min_visible_blocks: 2
        max_visible_blocks: 8
        min_actor_turns: 2
    pacing_mode_profiles:
      thin_edge:
        max_visible_blocks: 3
        requires_pause: true
      compressed:
        max_visible_blocks: 5
      multi_pressure:
        min_actor_turns: 2
      containment:
        tempo_arc: compressed
        response_shape: exchange
  sensory_context:
    enabled: true
    schema_version: sensory_context_policy.v1
    min_layers_per_turn: 1
    max_layers_per_turn: 3
    require_structured_events: true
    model_context_visibility: bounded_authored_layers
    intensity_by_pressure_band:
      low: low
      medium: medium
      moderate: medium
      high: high
    mood_by_scene_energy:
      low: opening
      contained: mid_tension
      rising: mid_tension
      volatile: late_breakdown
      collapsed: late_breakdown
    mood_by_scene_function:
      establish_pressure: opening
      withhold_or_evade: mid_tension
      repair_or_stabilize: mid_tension
      escalate_conflict: late_breakdown
      redirect_blame: mid_tension
      probe_motive: mid_tension
      reveal_surface: mid_tension
      scene_pivot: mid_tension
  social_pressure:
    enabled: true
    schema_version: social_pressure_policy.v1
    default_score: 0.4
    smoothing_alpha: 0.7
    trend_deadband: 0.05
    max_evidence_refs: 8
    band_thresholds:
      low_max: 0.33
      high_min: 0.67
    source_scores:
      social_risk_band:
        low: 0.2
        moderate: 0.5
        high: 0.78
      scene_pressure_state:
        moderate_tension: 0.52
        stabilization_attempt: 0.56
        high_blame: 0.86
        thread_pressure_high: 0.82
      thread_pressure_state:
        thread_pressure_high: 0.82
        high_unresolved_thread_pressure: 0.9
      scene_energy_transition:
        release: 0.38
        deescalate: 0.36
        hold: 0.48
        pivot: 0.58
        rise: 0.72
        interrupt: 0.86
      scene_energy_pressure_vector:
        repair: 0.38
        evasive: 0.52
        social: 0.58
        moral: 0.62
        exposure: 0.68
        rupture: 0.82
      pacing_cadence:
        breathe: 0.28
        release: 0.36
        hold: 0.48
        pivot: 0.58
        press: 0.72
        interrupt: 0.84
      pressure_shift:
        de-escalated: 0.32
        held: 0.48
        shifted: 0.56
        escalated: 0.78
    increments:
      per_active_thread: 0.04
      prior_high_band: 0.08
      thread_pressure_level: 0.04
  relationship_state_machine:
    enabled: true
    schema_version: relationship_state_policy.v1
    default_tension_score: 0.35
    default_trust_score: 0.65
    default_alliance_score: 0.2
    default_dominance_score: 0.5
    trend_deadband: 0.04
    max_tracked_pairs: 24
    max_tracked_axes: 12
    max_transition_events: 24
    stability_thresholds:
      strained_min: 0.45
      fractured_min: 0.72
    transition_weights:
      blame_pressure:
        tension_delta: 0.18
        trust_delta: -0.08
        alliance_delta: 0.0
        dominance_delta: 0.03
      repair_attempt:
        tension_delta: -0.12
        trust_delta: 0.08
        alliance_delta: 0.02
        dominance_delta: -0.01
      alliance_shift:
        tension_delta: 0.05
        trust_delta: -0.02
        alliance_delta: 0.14
        dominance_delta: 0.02
      social_state_shifted:
        tension_delta: 0.05
        trust_delta: -0.02
        alliance_delta: 0.0
        dominance_delta: 0.0
      high_social_pressure:
        tension_delta: 0.08
        trust_delta: -0.03
        alliance_delta: 0.0
        dominance_delta: 0.0
      npc_initiative_pressure:
        tension_delta: 0.06
        trust_delta: -0.02
        alliance_delta: 0.0
        dominance_delta: 0.04
      relationship_axis_pressure:
        tension_delta: 0.04
        trust_delta: 0.0
        alliance_delta: 0.0
        dominance_delta: 0.0
  improvisational_coherence:
    enabled: true
    schema_version: improvisational_coherence_policy.v1
    allowed_acceptance_modes:
      - accept
      - accept_with_boundary
      - redirect_with_acknowledgement
      - reject_with_playable_reason
    allowed_advance_classes:
      - pressure_raise
      - relationship_shift
      - scene_reframe
      - continuity_carry
      - boundary_containment
      - beat_deepen
    require_structured_events: false
    min_anchor_refs: 1
    max_anchor_refs: 6
    default_commit_impact: recover
    model_context_visibility: bounded_structured_only
    boundary_reason_required: true
  expectation_variation:
    enabled: true
    schema_version: expectation_variation_policy.v1
    allowed_variation_types:
      - social_alignment_shift
      - responder_handoff
      - pressure_reversal
      - consequence_return
      - bounded_reveal
      - ironic_misread
      - sensory_reframe
      - silence_pivot
    require_structured_events: false
    max_variation_units_per_turn: 1
    cooldown_turns: 1
    min_setup_refs: 1
    max_setup_refs: 6
    default_commit_impact: recover
    model_context_visibility: bounded_structured_only
  dramatic_irony:
    enabled: true
    schema_version: dramatic_irony.v1
    allowed_sources:
      - npc_private_plan_selected
    allowed_surface_modes:
      - behavioral_echo
      - misread_reaction
      - withheld_context
      - subtext_pressure
    forbidden_surface_modes:
      - direct_hidden_intent_reveal
      - omniscient_reveal
    max_opportunities: 3
    direct_reveal_allowed: false
    model_context_visibility: bounded_surface_only
    require_structured_realization: true
    recovery_behavior: recover
    hidden_fact_echo_check: true
  meta_narrative_awareness:
    enabled: true
    schema_version: meta_narrative_awareness_policy.v2
    allowed_awareness_tiers:
      - subtle
      - adaptive
      - full
    default_awareness_tier: subtle
    allowed_intensities:
      - subtle
      - moderate
      - full_fourth_wall
    default_intensity: subtle
    allowed_trigger_frequencies:
      - rare
      - occasional
      - frequent
    default_trigger_frequency: rare
    characters_with_awareness:
      - veronique
    allowed_awareness_modes:
      - dramatic_pattern_sense
      - narrative_pressure_sense
      - adaptive_pattern_recognition
      - character_self_model
      - cross_session_memory_reference
      - narrator_negotiation
      - story_form_negotiation
      - direct_player_address
      - fourth_wall_address
    forbidden_awareness_modes:
      - system_prompt_disclosure
      - tool_or_model_disclosure
      - player_control_claim
      - unbounded_rewrite
      - unauthorized_fourth_wall_break
      - private_player_data_disclosure
      - false_cross_session_memory
    allowed_fourth_wall_levels:
      - none
      - subtle
      - direct
      - full_fourth_wall
    max_events_per_turn: 2
    max_direct_addresses_per_turn: 1
    requires_player_consent: true
    allow_player_toggle: true
    allow_direct_player_address: true
    allow_narrator_negotiation: true
    allow_cross_session_memory: true
    allowed_memory_scopes:
      - session
      - actor
      - module
      - long_term
      - cross_session
    default_memory_retention_scope: cross_session
    max_cross_session_memory_refs: 2
    require_verified_memory_refs: true
    privacy_safe_memory_only: true
    model_context_visibility: bounded_structured_only
    default_commit_impact: recover
