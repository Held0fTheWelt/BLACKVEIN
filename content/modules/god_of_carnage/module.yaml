# God of Carnage Module
# Canonical reference implementation for the World of Shadows system
# A single two-act play scenario structured as a formal content module

module_id: god_of_carnage
title: God of Carnage
description: |-
  Single two-act play scenario: a dinner party escalating from polite negotiation
  to emotional and relational breakdown. Four characters, relationship pressure,
  a numbered canonical path, and reference-based locations, objects, and character
  documents.

# Module versioning
version: "0.1.0"
contract_version: "0.2.0"

# Content specification
content:
  # Duration and structure
  duration_turns_estimated: "20-35"
  phase_count: 5
  phase_policy_source: phase_beat_policy.yaml

  # Player roles and party composition
  num_player_characters: 2
  num_npc_characters: 2
  total_characters: 4

  # Setting and scope
  setting: "Paris apartment, evening dinner party"
  narrative_scope: "Escalation from civility through moral negotiation to breakdown"

  # Formal constraints
  max_escalation_level: 100
  max_emotional_state: 100
  relationship_stability_min: 0
  relationship_stability_max: 100

# Module organization references
files:
  - characters/index.yaml        # Character document index; per-character authority lives in characters/definitions/*.yaml
  - characters/definitions/veronique.yaml
