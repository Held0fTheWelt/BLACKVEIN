<!DOCTYPE html>
<html lang="en" class="{% block html_class %}{% endblock %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}World of Shadows{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}World of Shadows – Enter the World of Blackveign.{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

    <a href="#main" class="skip-link">Skip to main content</a>

    <header class="site-header">
        <div class="header-inner">
            <a href="{{ url_for('index') }}" class="logo" aria-label="World of Shadows home">World of Shadows</a>
            <nav class="nav" aria-label="Main">
                <a href="{{ url_for('news_list') }}" class="nav-link">News</a>
                <a href="{{ backend_api_url }}/wiki" class="nav-link">Wiki</a>
                <a href="{{ backend_api_url }}/community" class="nav-link">Community</a>
                <a href="{{ backend_api_url }}/login" class="nav-link">Log in</a>
                <a href="{{ backend_api_url }}/register" class="nav-link nav-link-cta">Register</a>
                <a href="{{ backend_api_url }}/dashboard" class="nav-link">Dashboard</a>
            </nav>
        </div>
    </header>

    <main id="main" class="container" role="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p><span class="footer-brand">World of Shadows</span> – Public site</p>
        </div>
    </footer>

    <script>
        window.__FRONTEND_CONFIG__ = {{ frontend_config | tojson }};
    </script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
