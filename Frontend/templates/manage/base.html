<!DOCTYPE html>
<html lang="{{ current_lang | default('de') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ t.nav_manage | default('Manage') }}{% endblock %} – {{ t.site_name | default('World of Shadows') }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='manage.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="manage-body">
    <header class="manage-header">
        <div class="manage-header-inner">
            <a href="{{ url_for('manage_index') }}" class="manage-logo">{{ t.nav_manage | default('Manage') }}</a>
            <nav class="manage-nav" aria-label="Management">
                <a href="{{ url_for('manage_news') }}" class="manage-nav-link" data-page="news">{{ t.manage_news | default('News') }}</a>
                <a href="{{ url_for('manage_users') }}" class="manage-nav-link" data-page="users" id="manage-nav-users">{{ t.manage_users | default('Users') }}</a>
                <a href="{{ url_for('manage_wiki') }}" class="manage-nav-link" data-page="wiki">{{ t.manage_wiki | default('Wiki') }}</a>
            </nav>
            <div class="manage-auth-bar" id="manage-auth-bar">
                <span class="manage-user-info" id="manage-user-info"></span>
                <button type="button" class="btn btn-ghost btn-sm" id="manage-logout">{{ t.manage_logout | default('Log out') }}</button>
            </div>
        </div>
    </header>
    <main id="main" class="manage-main" role="main">
        {% block content %}{% endblock %}
    </main>
    <script>
        window.__FRONTEND_CONFIG__ = {{ frontend_config | tojson }};
    </script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
    <script src="{{ url_for('static', filename='manage_auth.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
