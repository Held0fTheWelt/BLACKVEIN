{% extends "base.html" %}
{% block title %}Log in – Writers Room{% endblock %}
{% block content %}
<div class="manage-login-wrap">
    <div class="card manage-login-card">
        <h1 class="manage-login-title">Log in</h1>
        <p class="form-hint">Uses the main backend API at <code>{{ backend_base_url }}</code> to obtain a JWT.</p>
        <form method="post" action="{{ url_for('login') }}" class="manage-login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input class="form-input" type="text" name="username" id="username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input class="form-input" type="password" name="password" id="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary">Log in</button>
        </form>
    </div>
</div>
{% endblock %}
